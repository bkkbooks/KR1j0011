body:
  text: 埤雅卷十六音釋薤薤蘪縻芣浮苡以豚屯膾會瑲且揚珩橫葑匪庸薞孫蔔扶福涗始鋭礿之若盞盞樛鳩蘬邱非蓏祼瓞跌稿杲姣狡銚姚芅弋萇除良購古候秣末鬱紆物雚貫蘄芹茝齒虈許嬌臣移呦幽捋蘆活蛙蛙繼繼蠙步田簭筮芀丁聊蕢竒愧桴浮懾章步薍魚惠罛孤啍徒孫璊莫昆􅣞毯計虋莫溫􅨷莫昆緂他甘蔈方燒荂計俱斾蒲蓋蘜居六
