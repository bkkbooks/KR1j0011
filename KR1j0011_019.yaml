body:
  text: 埤雅卷十音釋蟻蟻蠨蕭蛸所交蠋蜀虺乎鬼蚺然蛣起吉蟦扶非蠁許兩窒知乙蚼巨俱踦記鞗條蜎狂兗蟺市衍蠆丑介荓平螫式螸弋木閧胡絳􅏑螽蜮胡國蛻稅齆烏貢蜴亦蝮福翮諧革櫟厯纈頡蹶厥磷力刃􅢊所蜜蛬拱蜉浮聿律攦歷倕是推􅪁䗥從蛗阜蠜樊喓遙躍剔杕第玁顯狁允駛史去聲蠀資蛹勇螝衛蟅之夜鶝福樗丑於螒汗
