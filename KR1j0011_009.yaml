body:
  text: 埤雅卷五音釋羜文與宁治旅佇除吕藇徐與麷豐蕡扶云歜燭醓毯蓛桑卜羝丁兮觝抵䍮雉矯牸字緎于力䌰尼輒緵粽襚穗嘷豪繢㑹麢零麠京蹙促羱原追羦胡官羠因以餔布喙許穢獫力贍帨稅鋂梅蹢擲很恨上聲􅘻核牿古督豶墳杙弋睫接􅛊然猨猿􅍜覔薻子到駹莫江腯徒本豢祛緩筴古洽㹖患猣子公豻岸麛迷􅎭坦椹猪金
