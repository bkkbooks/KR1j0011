body:
  text: 埤雅卷十一音釋臝祼飼似䌰攝蟓象蚢杭􅠸子六蒦穫噲夬噦火外蜱毗噉啖蠛亡結蟘得蟊謀秠痞秬巨菀苑嘒許惠菌窘罅赫􅣒於凝額額螇胡雞螰力木蚞木蛷求檐言以朱溼濕螾引􅥿斛膢力侯螲知栗瘻漏䗜流䖵昆甿英綳瞀木蠸巨袁噆錯感䶆錐鼷下雞鼫市亦䶂之勺悖輩鼬右鼪所敬䶉留鼩劬鼱子盈即容鼯吾蠝雷鴺啼鶮鶴蜼余救鰈它臘鶼兼岠其呂蝘偃蠑榮螈原蠦爐􅨦直連䗂虎䗔侯鼃蛙澠猛蜙松蝑胥蠵弋規
