body:
  text: 欽定四庫全書埤雅卷一宋陸佃撰釋魚龍鯉魴鱨鱧鰋鱒鮪鱣鯋鰷鮒鱮鮫鰌蛟龍龍八十一鱗具九九之數九陽也鯉三十六鱗具六六之數六隂也龍亦卵生思抱雄鳴上風雌鳴下風而風化有鱗曰蛟龍有翼曰應龍有角曰蚪龍蓋蟲莫智於龍龍之德不為妄者能與細細能與巨巨能與髙髙能與下下故易乾以龍御天坤以馬行地龍天類也馬地類也易曰震為龍震為龍以動故也周易以變者為占故乾六爻皆動皆謂之龍所謂初九九二九三九四九五上九是也蔡墨曰龍水物也周易有之在乾之姤曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍無首吉蓋乾初九變而之姤九二變而之同人九五變而之大有上九變而之夬六者俱動變而之坤是以蔡墨之言如此知此則知震所以為龍之義矣賈誼新書曰亢龍往而不能反故易曰有悔有悔者凶也潛龍入而不能出故易曰勿用勿用者不可也觀誼之言如曰勿用者戒使勿為潛龍也故曰潛之為言也隱而未見行而未成是以君子弗用也蓋止使人無為謂之勿所謂勿用娶女勿用有攸往小人勿用之類皆戒使勿為也俗云龍精於目蓋龍聳故精於目也隂陽自然變化論曰驪龍之眸見百里纎芥又曰龍能變水人能變火又曰龍不見石人不見風魚不見水鬼不見地孫綽子曰髙祖御龍光武御虎龍韓彭之類是也虎耿鄧之類是也法言曰龍以不制為龍聖人以不手為聖人手取也言雖容有飛禍而非其所取詩曰賔載手仇手取也酈元水經曰魚龍以秋日為夜按龍秋分而降則蟄寢於淵龍以秋日為夜豈謂是乎莊子曰朱泙漫學屠龍於支離益殫千金之産三年技成而無所用其巧此言技術雖髙而應世稍疏則無所用之是以君子因時施宜事在於適而已豈必一二以追先王之迹哉舊説鱉畏蔥蛟龍畏鐵又云龍肉以醯漬之則文章生今相家説龍人臣得其一體當至公相曽公亮得龍之脊王安石得龍之睛內典云龍火得水而熾人火得水而滅按葬書以龍言山以虎言水六龍九虎是也直山直水謂之死龍死虎故曰小頓大起宛轉如盤龍奮迅如舞鶴謂之住岡鯉此今之頳鯉也一名鱣鯉脊中鱗一道每鱗上有小黑點文大小皆三十六鱗魚之貴者故爾雅釋魚以鯉冠篇而養魚經曰所以養鯉者鯉不相食易長又貴是也神農書曰鯉最為魚之主今人以盤水養之雖困鱗不反白蓋健魚也詩曰魚麗于罶鱨鯋魚麗于罶魴鱧魚麗于罶鰋鯉蓋鱨魚黃魴魚青鱧魚玄鰋魚白鯉魚赤則五色之魚具備故序以為萬物盛多也俗説魚躍龍門過而為龍唯鯉或然亦其夀有至千嵗者故詹何之釣千嵗之鯉不能避也鱗鄰也鯉里也鯉進於魚矣殆亦龍類是以仙人乘龍亦或騎鯉乃至飛越山湖魴魴一名魾此今之青鯿也郊居賦曰赤鯉青魴細鱗縮項闊腹魚之美者蓋弱魚也其廣方其厚𥚹故一曰魴魚一曰鯿魚魴方也鯿𥚹也詩曰川澤訏訏魴鱮甫甫甫甫美也魴之為美舊矣今更與鱮魚連道以著韓國水土之善者蓋魴魚雖等美而緣水之異則有優劣故里語曰洛鯉伊魴貴於牛羊言洛以渾深宜鯉伊以清淺宜魴也又曰居就糧梁水魴蓋今遼東梁水之魴特肥而厚詩曰豈其食魚必河之魴言無民而不可治豈其取妻必齊之薑言無臣而不可使所以誘掖其君也且河性宜魚故詩曰豈其食魚必河之魴必河之鯉也列女傳曰傅弓以燕牛之角纒弓以荆麋之筋糊弓以河魚之膠説者以為燕角善楚筋細河膠黏詩曰魴魚赬尾以譬君子勞於王事養生經曰魚勞則尾赤人勞則髮白鱨今黃鱨魚是也性浮而善飛躍故一曰揚也陸璣曰今黃頰魚燕頭魚身頰骨正黃魚之有力解飛者一名黃揚舊説魚膽春夏近下秋冬近上鱧今玄鱧是也諸魚中唯此魚膽甘可食有舌鱗細有花文一名文魚與蛇通氣其首戴星夜則北嚮蓋北方之魚也詩曰魚麗于罶鱨鯋其次曰魴鱧又其次曰鰋鯉蓋鱨鯋小魚魴鱧中魚鰋鯉大魚亦其鱨鯋之薑不若魴鱧魴鱧之美不若鰋鯉故其序如此今魚品齊魯之間魴為下色鰋為中色鯉為上色衡門之詩先魴後鯉亦以此故也舊云鱧是公礪蛇所化至難死猶有蛇性故或謂之鰹也爾雅曰鰹大鮦小者鮵鰋今偃額白魚也一名鮎鰋魚偃鯉魚俯鱧魚圓魴魚方魚麗之詩一章曰鱨鯋二章曰魴鱧三章曰鰋鯉蓋鱨鯋長魚也而魴鱧則言其魚一方一圓鰋鯉則言其魚一偃一俯又以著萬物衆多也鱒鱒似鯶魚而鱗細於鯶赤眼詩云九罭之魚鱒魴我覯之子衮衣繡裳蓋鱒魚圓魴魚方君子道以圓內義以方外而周公之德具焉故是詩主以言之然則鱒象公之圓而衮衣者道也魴象公之方而繡裳者義也玄衮纁繡而後可以見周公猶之九罭之取鱒魴也爾雅曰鮅鱒蓋鱒一名鮅孫炎正義曰鱒好獨行制字從尊殆以此也鮪鮪魚似鱣而青黑長鼻體無鱗甲肉色白味不如鱣大者長七八尺岫居至春始出而浮陽北入河西上龍門入漆沮見日而目眩故詩言漆沮及河通道此魚夏小正曰祭鮪祭不必記而記鮪何也鮪者魚之先至者也而其至有時禮曰龍以為畜故魚鮪不淰而序詩者亦曰季冬薦魚春獻鮪則鮪别於魚其來尚矣故鮪仲春從河西上得過龍門便化為龍否則點額而還尸子曰龍門魚之難也太行牛之難也蓋河津一名龍門兩傍有山魚莫能上大魚薄集龍門上則為龍不得上輒暴鰓水次故曰暴鰓龍門垂耳轅下善為魚者不求為龍望禹門輒逝是以無暴鰓點額之患水經曰鮪出鞏穴直穴有渚謂之鮪渚周禮春獻王鮪然非時及他處則無故河自鮪穴已上又兼鮪稱鱣鮪肉白鱣肉黃鱣大魚似鱏口在頷下無鱗長鼻軟骨俗謂之玉板大者長二三丈江東呼為黃魚古今注曰鯉之大者為鮪鱧之大者為鱣非是也案詩曰有鱣有鮪鰷鱨鰋鯉言鮪矣而又言鰋鯉則鮪與鯉異明矣詩曰施罛濊濊鱣鮪發發鱣鮪健魚故其跳躍發發然不麗於罛而碩人以刺莊公詩於鱣鮪言發發於魴鱮言唯唯則魚之健弱可知也義訓曰鱍掉尾口上下噞喁鯋釋魚云鯋鮀今吹沙小魚常張口吹沙故曰吹沙也鯋性善沈大如指狹圓而長有墨點文常沙中行亦於沙中乳子故張衡云縣淵沈之鯋鰡也字指云鰡鯋屬詩曰魚麗于罶鱨鯋魴鱧鰋鯉蓋鱨也魴也鯉也其性浮鯋也鱧也鰋也其性沈而罶則嫠婦之笱其用功寡又以待魚之自至今魚麗于罶鱨鯋魴鱧鰋鯉沈浮小大美惡與其形色之異具有則餘物盛多可知也俗云鯋性沙抱異物志曰吹沙長三寸許背上有刺螫人海物異名記曰鯋似鯽而狹小鰷鰷魚形狹而長若條然故曰鰷也今江淮之間謂之𩽐魚性浮似鱨而白蓋鱨從嘗𩽐謂之飱其義一也詩曰鰷鱨鰋鯉先鰷後鱨先鰋後鯉者鱨大於鰷鯉大於鰋亦其美之遞不如也鮒吕子曰魚之美者洞庭之鮒鮒小魚也即今之鯽魚其魚肉厚而美性不食釣本草所謂鯽魚一名鮒魚形亦似鯉色黑而體促腹大而脊隆所在池澤皆有之是也孟詵云鯽是稷米化之其魚腹上猶有米色易之井曰井谷射鮒甕敝漏蓋九二以陽居隂不正者也不正則旁出而下流以與初矣故曰井谷射鮒以此上行則亦趨乎下而已故曰甕敝漏初六隂也而又居下流且其賴井之功微矣故稱鮒焉莊子曰周顧視車轍中有鮒魚焉曰吾得斗升之水然活爾少牢饋食曰魚用鮒十有五而俎蓋魚水物也故取數於月十有五日而盈淮南子曰月虛而魚腦減今此魚旅行吹沫如星然則以相即也謂之鯽以相附也謂之鮒鱮鱮魚似魴而弱鱗其色白北土皆呼白鱮西征賦曰華魴躍鱗素鱮揚鬐性亦旅行故其制字從與亦或謂之鰱也傳曰連行魚屬若此之類是已失水即死弱魚也今吳越呼鱅鰱魚其頭尤大而肥者徐州人謂之鰱或謂之鱅六韜曰緡隆餌重則嘉魚食之緡調餌芳則庸魚食之鱅庸魚也故其字從庸蓋魚之不美者故里語曰網魚得鱮不如啖茹而鱅讀曰慵者則又以其性慵弱而不健故也詩曰敝笱在梁其魚魴鰥齊子歸止其從如雲敝笱在梁其魚魴鱮齊子歸止其從如雨敝笱在梁其魚唯唯齊子歸止其從如水言笱雖敝尚足以制魴鰥之魚非特制魴鰥而已尚足以制魴鱮之魚非特制魴鱮而已蓋魚無不聽從者以刺魯桓微弱曽敝笱之不如也其從如雲者言雲無定性隨風而已雲升而生雨故如雨繼之雨降而生水故如水繼之言魯桓微弱不能防間文薑其傾從如雨之從天其順從如水之從地者初亦生於如雲積以浸大而已故傳曰如雲言盛也如雨言多也如水言衆也蓋一為盛二為多三為衆鮫鮫海魚也狀似鱉而無足背文粗錯皮間有珠可以飾刀其子驚則入母腹中蓋龍珠在頷鮫珠在皮蛇珠在口鱉珠在足魚珠在眼蚌珠在腹也案天玄主物簿敘魚珠曰魚之懷珠至五十年則無復鼓鰓腦上有汗其鬐鱗口眼皆異鬐當紫色眼當紅色口當赤色又曰懷珠之蛇多喜投暗見人張口向人吐氣如燼是則蛇珠暨魚亦有懷者述異記曰南海有鮫人之室水居如魚不廢機織其眼能泣則出珠鰌鰌今泥鰌也似鱓而短無鱗以涏自染難握與魚而為牝牡莊子所謂麋與鹿交鰌與魚遊一名鰼孫炎爾雅正義曰鰼尋也尋習其泥厭其清水舊説守魚以鱉養魚以鰌蓋鰌性酋健善擾令魚利轉制字從酋豈為是乎恩平郡譜云鰌謂之蝦謂之籠􅣜謂之衫蛇謂之訛案古方有言須用流水煮藥者今鰌鱔入江水輒死則流水與止水果不同韓文公江魚不池活今魚生流水中則背鱗白而味美生止水中則背鱗黑而味惡此亦一驗詩云豈其食魚必河之魴蓋流水之魚品流自異蛟蛟龍屬也其狀似蛇而四足細頸頸有白嬰大者數圍卵生眉交故謂之蛟亦蛟能交首尾束物焉故謂之蛟也俗呼馬絆以其如此述異記曰蟒蛇目圓蛟眉連生連生則交矣相書所謂交眉則蛟蜃之眉是也一説蛟尾有肉環束物則以首貫之舊云鳳骨黑蛟骨青記曰伐蛟取鼉登龜取黿鄭氏謂蛟言伐者以其有兵衛也龜言登尊之按古有蛟鮓又有龍醢夫龍神物也而可豢是亦豕類爾非真龍也犬豕曰豢夫惟可豢是以可醢而食字從肉蓋以此故君子不欲豢於人也俗説虎中有真虎龍中有真龍星禽衍法曰角木蛟亢金龍氐土貉房日兔心月狐尾火虎箕水豹斗木獬牛金牛女土蝠虛日鼠危月燕室火豬壁水羭奎木狼婁金狗胃土雉昴日雞畢月烏觜火猴參水猿井木犴鬼金羊柳土獐星日馬張月鹿翼火蛇軫水蚓獬或作蟹犴或作鴈蓋非是按角木曰蛟亢金為龍奎木曰狼婁金為狗觜火曰猴參水為猿翼火曰蛇軫水為蚓之類是皆以類相從特其氣數有深淺爾然則牛金曰牛斗木宜為獬鬼金曰羊井木宜為犴也埤雅卷一
