body:
  text: 欽定四庫全書埤雅卷七宋陸佃撰釋鳥鷖鳬雎鳩鳲鳩鶌鳩隼孔雀鵜鴟鵂鷓鴣鴟梟鶂鴛鴦鶡鷺鷖鷖鳬屬蒼黑色鳬好沒鷖好浮故鷖一名漚列子曰漚鳥之至者百住而不止今字從鳥後人加之也鳬鷖安樂於水者也故詩以為神祇祖考安樂之譬而周官王后安車鷖總詩曰鳬鷖在涇公尸來燕來寧公尸燕飲福祿來成鳬鷖在沙公尸來燕來宜公尸燕飲福祿來為來成以祖言福祿也來為以考言福祿也傳曰來為言厚為孝子則其為考可知矣又曰鳬鷖在渚公尸來燕來處公尸燕飲福祿來下鳬鷖在潨公尸來燕來宗公尸燕飲福祿來崇來下以天神言福祿也來崇以地示言福祿也蓋天故自上來下地故自卑來崇亦其天道主貴髙地事主冨崇故也於祖曰爾酒既清爾殽既馨於考曰爾酒既多爾殽既嘉則以宗廟尚文故也郊丘則貴質而已故曰爾酒既湑爾殽伊脯也其卒章則又總上四章之詞故曰公尸燕飲無有後艱無有後艱者道也蓋道之至可以祐神非有資於物也孰能福祿之哉故於福祿為不足道也蒼頡解詁曰鷖鷗也今鷗一名水梟形色似白鴿而羣飛風土記曰鷖鷖鴨也以名自呼大如小雞生於荷葉之上鳬釋鳥曰鸍沈鳬沈鳬好沒大小如鴨青色長尾背上有文卑腳短喙水鳥之謹願者也莊子曰鳬脛雖短續之則憂鶴脛雖長斷之則悲此言生理至足無欠無餘自長非所增自短非所損也詩曰女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳬與鴈明星有爛言小星已不見矣故於是時相警以夙興也蓋鳬鴈常以晨飛故是詩如此賦曰晨鳬旦至此之謂也亦其弋不射宿所以為好德又鳬性慤謹鴈有行列而不亂故刺不説德之詩樂正言琴瑟禮正言鳬鴈因以微切之爾也又曰弋言加之與子宜之加與元鶴加加雙鶤之加同意蓋弱弓微矢乘風振之曰弋故楚人好以弱弓微矢加之歸鴈之上楚辭曰寧昻昻若千里之駒乎將汜汜若水中之鳬乎蓋沈鳬善沒而又容與與波上下故昔之散人慕焉雎鳩雎鳩雕類江東呼之為鶚鷙而有别隂陽自然變化論曰雎鳩不再匹蓋言是也詩曰關關雎鳩在河之洲蓋關雎和而摰别而通習水又善捕魚故詩以為后妃之比鳲鳩則一宿均養又居鵲之成巢故為夫人之德而已徐鉉草木蟲魚圖云雎鳩常在河洲之上為儔偶更不移處蓋鶚性好跱故每立更不移處所謂鶚立義取諸此郯子曰少皥氏以鳥名官鳯鳥氏歷正也玄鳥氏司分伯趙氏司至青鳥氏司啓丹鳥氏司閉祝鳩氏司徒雎鳩氏司馬鳲鳩氏司空鷞鳩氏司冦鶻鳩氏司事五鳩鳩民者也鳯知天時故以名歷正之官玄鳥燕也以春分來秋分去故司分伯趙鵙也以夏至鳴冬至止故司至青鳥鶬鷃也以立春鳴立夏止故司啓丹鳥鷩雉也以立秋來立冬去故司閉雎鳩鷙而有别故為司馬主法制鳲鳩平均故為司空平水土隼鳩孝故為司徒主教民藉虞槐賦曰春棲教農之鳥即隼是也俗云雎鳩交則雙翔别則立而異處是謂鷙而有别傳曰鷙鳥不雙是也鳲鳩鳲鳩秸鞠一名摶黍今之布穀江東呼為郭公牝牡飛鳴以翼相拂不自為巢居鵲之成巢有均一之德蓋其哺子朝自上而下暮自下而上者均也其子在梅在棘在榛而已則常在乎桑者一也詩曰維鵲有巢維鳩居之序者以為國君積行纍功以致爵位夫人起家如居有之德如鳲鳩乃可以配焉蓋一者婦道也妻道也均者母道也小君之道也均所以制節一所以謹度故詩以況夫人周官羅氏中春獻鳩以養國老者鳩性不噎食之且復助氣故也續禮儀志曰仲秋案户校年老者授之以杖其端刻鳩形鳩者不噎之鳥也故曰祝鯁在前祝噎在後禽經曰一鳥曰隹二鳥曰雔三鳥曰朋四鳥曰乘五鳥曰雇六鳥曰鶂七鳥曰八鳥曰鸞九鳥曰鳩十鳥曰􅝄九鳥曰鳩其字從九以此故歟馮衍逐婦書曰口如布穀言其多聲也鶌鳩釋鳥云鶌鳩鶻鵃今江東亦呼鶻鵃左傳曰鶻鳩氏司事先儒云鶻鳩春來秋去故為司事一名鳴鳩月令所謂鳴鳩拂其羽者是也一名鷽鳩莊子所謂蜩與鷽鳩笑之者是也蓋此似山鵲而小釋鳥曰鷽山鵲也故此一名鷽鳩又其短尾青黑色多聲故此一名鳴鳩也詩曰宛彼鳴鳩翰飛戾天言鳴鳩小物決起而飛槍榆枋時則不至而控於地而已矣今飛鳴戾天則其聲亦逺聞其勢亦髙至唯勉強故也可以人而不如乎許慎云鳴鳩奮迅其羽直刺上飛數千丈入雲中其勉而飛如此又曰題彼脊令載飛載鳴言脊令亦小物也今飛鳴不有止息雖不能逺聞髙至然亦有首尾相應可以人而不如乎欲其如飛鳩不可得也故望之如此而已夫王尚大者也今幽王曾是之不如故其詩曰小宛也又鶻鳩性食桑椹然過則醉而傷其性故詩云于嗟鳩兮無食桑椹而序以為刺淫泆也陸璣云鶻鳩一名斑鳩蓋斑鳩似鵓鳩而大鵓鳩灰色無繡項隂則屏逐其匹晴則呼之語曰天將雨鳩逐婦者是也斑鳩項有繡文斑然故曰斑鳩則與此鶻鳩全異璣之言非今此鳥喜朝鳴故一曰鶻嘲也凡鳥朝鳴曰嘲夜鳴曰㖡禽經曰林鳥以朝嘲水鳥以夜㖡今林棲多朝鳴水宿多夜叫㖡音夜字見龍龕手鏡隼今鳻鳩也一宿之鳥一宿一於所宿之木一名荆鳩一名楚鳩一名䳕鳩一名乳鳩一名鵴鳩一名􅝣鳩一名𪆴鳩方言曰鳩自關而西秦漢之間謂之鵴鳩其大者謂之鳻鳩其小者謂之􅝣鳩或謂之𪆴鳩或謂之䳕鳩梁宋之間謂之隼隼性慈孝慤謹故聽聲考詳篇曰雀聲慘毒鳩聲慈念而詩以為使臣賢者之況詩曰翩翩者隼蒸然來思言太平君子至誠樂與賢者共之蒸然後得嘉魚一鳥也爾雅曰隹其鳺鴀夫不一宿一宿婦之正也夫或不然故孔子欲多識鳥獸草木之名四牡曰翩翩者隼載飛載下集于苞栩翩翩者隼載飛載止集于苞把蓋孝所以致私恩謹所以致公義故四牡勞使臣之詩而其託況如此傳曰懷歸者私恩也靡盬者公義也一曰祝鳩或曰隼與尸鳩皆一鳥也故有尸祝之號莊子曰庖人雖不治庖尸祝不越樽爼而代之矣尸鳩性一而慈祝鳩性一而孝故一名尸一名祝禮云嘏以慈告祝以孝告今隼類賦尾皆促故其字從隹説文曰隹鳥之短尾總名也禽經曰拙者莫如鳩巧者莫如鶻今鳩纍巢止於數枝才能載身而已鷦巧而危隼拙而安孔雀博物志云孔雀尾多變色或紅或黃喻如雲霞其色無定人拍其尾則舞尾有金翠五年而後成始生三年金翠尚小初春乃生三四月後復凋與花蕚俱衰榮雌者不冠尾短無金翠人採其尾以飾扇拂生取則金翠之色不減南人取其尾者握刀蔽於叢竹潛隱之處伺過急斬其尾若不即斷回首一顧金翠無復光彩性頗妬忌自矜其尾雖馴養已久遇婦人童子服錦綵者必逐而啄之每欲山棲先擇置尾之地故欲生捕者候雨甚往擒之尾霑而重不能髙翔人雖至且愛其尾不復鶱揚也嶺表異録云孔雀翠尾自纍其身比夫雄雞自斷其尾無所稱焉説苑曰君子愛人辨士愛日孔雀愛羽虎豹愛爪此之謂也今畫史雖妙善花鳥猶憚為此物蓋其金翠生動染色有不能似者太玄禮首曰孔鴈之儀利用登于階言孔有文鴈有序而其象皆中禮故利用登于階也鹽鐡論曰南越以孔雀珥門户崑山之旁以璞玉抵鳥鵲此言貴生於少賤生於所有老子曰知我者希則我者貴豈虛言哉南越志曰孔雀不必匹合止以音影相接便孕亦與蛇偶禽經曰鵲見蛇則噪而賁孔見蛇則宛而躍鵜釋鳥云鵜鴮鸅郭璞曰今之鵜鶘也好羣飛沈水食魚故名汙澤鵜形似鶚而大人足其鳴自呼頷下胡大如數升囊因以盛水貯魚淮南子所謂鵜鶘飲水數斗而不足鱣鮪入口若露而死是也蓋魚生水中而口不納水顔之推曰魚不咽水一名淘河一名汙澤莊子曰魚不畏網而畏鵜鶘言鵜以智力取魚故魚不畏網而畏之也詩曰維鵜在梁不濡其翼維鵜在梁不濡其咮蓋鵜性羣飛沈水食魚若遇小澤有魚便各以胡去水令水竭魚露乃共食之故號淘河汙澤則濡其咮翼宜矣今反取飽於梁不濡其翼非特不濡其翼又且不濡其咮故詩以刺小人不食其力無功而受祿也鴟鵂釋鳥所云怪鴟是也其鳴即雨為囮可以聚諸鳥一名隻狐晝無所見夜即飛噉蚊虻梟服鬼車之類莊子所謂鴟鵂夜撮蚤察豪末晝出瞋目而不見邱山者舊説雀目夕昏人有至夕昏不見物者謂之雀瞀即此類也焦贛易林曰雀目燕顙畏昏無光顔之推曰雀奚夕瞽鴟奚晝盲一曰鵂鶹拾人之爪相其凶吉此妄説也鷓鴣鷓鴣自呼其名常向日而飛飛數隨月蓋若正月一飛而止畏霜露早晚稀出有時夜飛飛則以木葉自覆其背古箋云偃鼠飲河止於滿腹鷓鴣銜葉才能覆身此之謂也臆前有白圓點文多對啼志常南嚮不思北徂南越志所謂鷓鴣雖東西回翔然開翅之始必先南翥亦胡馬嘶北之義也本草曰鷓鴣形似母雞鳴云鈎輈格磔嶺表異録云肉白而脆味勝雞雉鴟梟先儒以為鴟梟即今巧婦郭注爾雅獨云鴟類則璞與先儒異意以詩與爾雅考之宜如璞義蓋爾雅言鴟梟鸋鴂繼云狂茅鴟怪鴟梟鴟則鴟梟宜亦鴟類賈誼所謂鸞鳯伏竄鴟梟翶翔是也詩曰鴟梟鴟梟既取我子無毁我室則其語似戒鴟梟之詞正如宣王黃鳥之詩即非鴟梟自道也昔賢云鴟梟恤功愛子及室誤矣其二章曰逮天之未隂雨徹彼桑土綢繆牖户逮天之未隂雨及其間暇之譬也徹彼桑土綢繆牖户明其政刑之譬也孔子曰為此詩者其知道乎及其國家間暇明其政刑孰敢侮之為是故也蓋窘生於隂雨而户牖所以取明故是詩託況如此文子曰百星之明不如一月之光十牖畢開不如一户之明鶂三蒼云蒼鶂也善髙飛似鴈目相擊而孕吐而生子其色蒼白莊子所謂白鶂相視眸子不運而風化者也蓋萬物以風動以風化故國風取名焉序曰風風也教也風以動之教以化之風以動之取其所謂以風動也教以化之取其所謂以風化也今鷺亦雄雌相隨受卵是亦風化諺曰鷺鷥相逐成胎是也西方之書曰濕以合感化以離應春秋書石曰隕石于宋五蓋視之則隕察之則石徐而察之則五書鶂曰六鶂退飛過宋都蓋視之則六察之則鶂徐而察之則退飛此言之法也故經解曰屬辭比事春秋教也而傳以為五石六鶂之辭不設則王道不亢矣博物志曰鶂亦雄鳴上風雌鳴下風而孕揚雄蜀都賦云風胎雨鷇風胎若鶂是也鶂睨而生子又作鷊隔而通者也鴛鴦鴛鴦匹鳥有思者也説文稱鳯言鸛鴛思是已崔豹古今注曰鴛鴦鳬類也雄雌未嘗相離人得其一一思而死故謂之匹鳥鴛性如此故先王慎於取之鴛鴦之詩一章曰鴛鴦于飛畢之羅之言於其飛然後畢之羅之則不毁卵不射宿故也二章曰鴛鴦在梁戢其左翼言以我交於萬物有道故彼於止得其所止也鴛鴦在梁正言左翼者蓋凡鳥左顧則怒作右眄則喜生飛而起則仰左翼飛而下則仰右翼故今鷙鳥下擊皆先側左翅也又是詩初言鴛鴦以著明王交於萬物有道而卒言乘馬以明奉已有節者蓋言匹鳥乘馬雖微且少而古之明王遇之如此則其大於此者可知也揚雄曰江湖之崖渤澥之島乘鴈集不為之多雙鳬飛不為之少亦言雙鳬乘鴈未足以為增損也列子曰周宣王之牧正有役人梁鴦者能養野禽獸雖虎狼雕鶚無不柔馴者王令毛邱園傳之此寓言也所謂梁鴦者即取鴛鴦在梁不驚撓之義故名之曰梁鴦蓋列莊之書嘗所稱引者不必實有其人每詭其名以見義如梁鴦毛邱園無足滿茍得之類是也俗云雄鳴曰鴛雌鳴曰鴦稽聖賦曰雎鳩奚别鴛鴦奚雙一曰鵲好外反鴛好內思鶡鶡似雉而大黃黑色故其名曰褐而鶡賦云揚玄黃之徑羽也有毛角專場健鬬鬬死不却蓋鷙鳥之暴疏者每所擭撮應爪摧碎亦愛其黨郭璞鶡贊所謂疇類被侵雖死不避古者令武士冠之實取諸猛先儒所云虎夫戴鶡是也列子曰黃帝戰于阪泉之野帥熊羆狼豹貙虎為前驅雕鶡鷹鳶為旗幟此以力使禽獸者也堯使夔典樂擊石拊石百獸率舞簫韶九成鳯皇來儀此以聲致禽獸者也先王之於鳥獸或以力使或以聲致如此又況橫目之民乎字説曰奚也曷也皆無知也雞可畜焉以放於死奚物而無知者也鶡善鬬焉以放於死曷物而無知者也禽經曰鶡毅鳥也鷗信鳥也鷺鷺一名舂鋤步於淺水好自低昻故曰舂鋤也方言鶡鴠謂之獨舂與此同意鶡鴠亦其鳴聲如舂鷺色雪白頂上有絲毿毿然長尺餘欲取魚則弭之禽經曰鷺啄則絲偃鷹捕則角弭藏殺機也青腳喜翹髙尺七八寸善蹙捕魚又其翔集必舞而後下故詩以況二王之後曰我客戾止亦有斯容也楚威王時有赤鷺合沓飛翔而舞舊鼓吹朱鷺曲是也今鷺之集每至水面數尺則必低回少盤其勢與飛之時徑起特異蓋其天性舞而後下非朱鷺獨然也故詩於鷺于下曰醉言舞鷺于飛曰醉言歸也禽經曰山禽之咮多短水禽之咮多長山禽之尾多修水禽之尾多促山禽尾修咮短若鵲之類是也水禽尾促咮長若鷺之類是也又曰鸘好霜鷺惡露字從露省以此亦或謂之白露今人畜之極有馴擾者每至白露降日則定飛揚而去不可復畜矣俗説雄雌相眄則産隂陽自然變化論曰鷺目成而受胎鸛影接而懷卵鴛鴦交頸野鵲傳枝物固有是哉鷺白鳥也淮南子曰的的者獲提提者射故詩正言王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯以美文王之德埤雅卷七
