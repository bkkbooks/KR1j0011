body:
  text: 欽定四庫全書埤雅卷十七宋陸佃撰釋草荷菡萏藕荼葵藍莪芹蘜蒺䔧木槿莧茹蘆臺艾虉荷荷揔名也華葉等名具衆義故以不知為問謂之荷也昔人正名百物有是哉故曰萬物有成理而不説郭璞以為芙渠一名芙蓉按説文未發為菡􅣿已發為芙蓉芙蓉華之號也蓋亦通曰芙蕖毛詩傳云荷芙蕖也其華菡􅣿許慎以為其華曰芙蓉其秀曰菡􅣿其實曰蓮蓮之茂者曰華今其的中有青為薏皆倒生兩牙一成芰荷一蕅荷也又生一牙為華蕅荷帖水生蕅者也芰荷無蕅卷荷也與華偶生出乎水上亭亭如繖者是亦或謂之距荷蕅荷一本其支旁行為蕅節生一華一葉詩曰有蒲與荷蓋荷善傾欹蒲無骨幹而柔從字説曰蕅藏於水其自處卑無所加焉其所與汙潔白自若中有空焉不偶不生若此可以偶物矣茄無枝附泥不能汙水不能沒挺出而立若此可以加物矣蓮既有以自日又會而屬焉若此可以連物矣菡􅣿實若臽隨昏昕闔闢焉蕸假根以立而不如蕅之有所偶假莖以出而不如茄之有所加假華以生而不如蓮之有所連菡􅣿之有菡也若此可謂遐矣夫函物者終於吐連物者終於散偶物者或析之加物亦不可為常故遐在此不在彼也蔤退藏於無用而可用可見者本焉若此可謂密矣合此衆美則可以何物可以為夫可以為渠故曰荷芙蕖也荷以何物為義故通於負荷之字菡萏爾雅曰其華菡萏其實蓮蓋荂曰芙蓉秀曰菡萏暢茂曰華古今注曰芙蓉一名荷華華之最秀異者也大者華至百葉然則華亦謂之芙蓉楚辭所謂搴芙蓉兮木末蓋言此也凡物皆先華而後實獨此華果齊生故西域之書多言此詩曰有蒲與荷有蒲與蕑有蒲菡萏荷言其質之柔蕳言其氣之芳菡萏言其色之美拾遺記曰昆流素蓮一房百子凌冬而茂王文公曰蓮華有色有香得日光乃開敷生卑濕淤泥不生髙原陸地雖生於水水不能沒雖在淤泥泥不能汙即華時有實然華事始則實隱華事已則實現實始於黃終於玄而莖葉緑葉始生也乃有微赤實既能生根根又能生實實一而已根則無量一與無量互相生起其根曰蕅常偶而生其中為本華實所出蕅白有空食之心歡本實有黑然其生起為緑為黃為玄為白為青為赤而無有黑無見無用而有見有用皆因以出其名曰蔤退藏於密故也藕爾雅曰其本蔤其根藕蓋莖下白蒻在泥中者曰蔤藕偶生又善耕泥引長故藕之文從耦名之亦曰藕今江左穿池取汲不欲種藕以藕善耕泥壞池也俗云藕生應月月生一節閏輒益一今芋有十二子為衛里俗以為應月之數説文曰大葉實根駭人故謂之芋舊説赤箭根有十二為衛如芋有風不動無風自搖亦其類也趙辟公雜記曰藕能移鯉能飛龜能守凡芙蕖行藕如竹之行鞭爾節生一葉一華華葉常偶生故謂之藕又華初著子首顧在下久之其房倒垂首更在上也荼荼苦菜也苦菜生於寒秋經冬歷春至夏乃秀月令孟夏苦菜秀即此是也此草凌冬不雕故一名遊冬凡此則以四時制名也顔氏家訓曰荼葉似苦苣而細斷之有白汁花黃似菊詩曰出其東門有女如雲出其闉闍有女如荼雲蓋言盛荼蓋言繁也傳曰秦網密於秋荼詩曰堇荼如飴堇毒荼苦故言如飴以著風土之善國語曰置鴆于酒置堇于肉詩曰誰謂荼苦其甘如薺蓋言其事又苦也禮曰昏姻之禮廢則夫婦之道苦而淫辟之罪多矣其此之謂歟葵齊民要術曰今世葵有紫莖白莖二種春必畦種水澆而冬種者有雪勿令從風飛去每雪輒一勞之勞雪令地保澤葉又不蟲掐必待露解收必待霜降傷晚則黃爛傷早則黑澀也詩曰七月烹葵及菽即此是也左傳曰鮑莊子之知不及葵葵猶能衛其足今葵心隨日光所轉輒低覆其根似知孔子曰禾生垂穗向根不忘本也蓋禾之向根仁也葵之衛足知也仁所以守之知所以揆之故葵揆也字説曰草也能揆日嚮焉故又訓揆本草曰葵為百菜之主豈亦以此乎爾雅曰蔠葵蘩露蔠葵一名蘩露此又葵之一種也蔓生葉圓而厚故周官曰大圭長三尺杼上終葵首義取諸此也説文云齊謂之終葵終葵謂於杼上圓廣其首説者以為即珽是也按禮曰天子搢珽方正於天下蓋與大圭終葵首全異相玉書曰珽玉六寸明自照今大圭長三尺知非珽矣周官曰王搢大圭執鎮圭又曰執冒四寸以朝諸侯蓋王執鎮圭則搢大圭天子執冒則搢珽故鎮圭尺有二寸大圭長三尺冒圭四寸珽六寸也大圭圓而仁故於鎮搢之鎮義故也珽方以義故於冒搢之冒仁故也藍爾雅曰葴馬藍染草也即今大葉冬藍為澱者是月令仲夏令民無艾藍以染鄭氏云為傷長氣然則艾藍於夏先王之法禁焉制字從監以此故也由是觀之先賢所云藏冰所以無雹而原蠶惡其害馬豈虛言也哉齊民要術以為種藍一同葵法藍三葉澆之薅治令淨五月中新雨後即拔栽之故夏小正五月蓄蘭灌沐藍蓼灌澆灌也沐剶沐也詩曰終朝采緑不盈一掬終朝采藍不盈一襜藍緑易得之物今以憂思二之故雖終朝采掇而緑不盈一掬藍不盈一襜也藍大於緑又其畦植如鱗則其采之盈襜易矣故詩以為後緑可以染黃藍可以染青則皆婦人致飾之物故詩正言之荀子曰青出之藍而青於藍冰水為之而寒於水説者以為冰藍皆喻學則才過其本性明學不可以已也漢記曰欲以素絲之質附近朱藍蓋亦明就士之多益脈要精微論曰赤欲如白裹朱不欲如赫青欲如蒼璧之澤不欲如藍齊民要術曰蓼中之蟲豈知藍之甘乎人之域於一方何以異此故河伯謂北海若曰吾非至於子之門則殆矣吾長見笑於大方之家是也莪莪亦曰𦾰蒿𦾰之為言髙也莪生澤國漸洳之地葉似斜蒿而細科生可食宿根先於百草一名蘿蒿一名角蒿詩曰菁菁者莪在彼中阿阿大陵也莪微草也言君子之長育人材猶大陵之長育微草也菁菁盛貌蓋草之初生其色玄盛則乃青霜死而後黃落故菁之文從青詩曰何草不玄以言其生何草不黃以言其死也蓋君子有三樂而王天下不與存焉世方太平至誠樂與賢者共之一樂也能得賢者以為邦家立太平之基二樂也得天下之人才而教育之三樂也故序詩者曰南有嘉魚樂與賢也南山有臺樂得賢也菁菁者莪樂育材也爾雅釋蟲曰蛾羅也釋草又曰莪蘿也蓋蛾所以生蠶莪亦所以覆而出之此義亦謂之羅歟字説曰莪以科生而俄詩曰匪莪伊蒿匪莪伊蔚莪俄而蒿直蔚粗而莪細育材之詩正言莪者以此芹詩曰觱沸檻泉言采其芹芹水菜也一名水英爾雅謂之楚葵泮宫曰思樂泮水薄采其芹二章曰薄采其藻三章曰薄采其苑芹取有香藻取有文苑取有味蓋士之於學也攬其芳臭而至則采芹之譬也既至矣於是學文則采藻之譬也及其久也知道之味又嗜而學焉則采苑之譬也苑蓴也葉如荇菜而紫莖大如箸柔滑可羹芹潔白而有節其氣芬芳而味不如蓴之美故列子以為客有獻芹者鄉豪取而嘗之蜇於口慘於腹也齊民要術云蓴性易生種以深淺為候水深則莖肥而葉少水淺則葉多而莖瘦亦逐水而性滑故謂之淳菜蘜爾雅曰蘜治蘠今之秋華鞠也鞠草有華至此而窮焉故謂之鞠一曰鞠如聚金鞠而不落故名鞠蓋鞠不落華蕉不落葉亦蕉一葉舒則一葉焦而不落故謂之蕉也月令季秋云鞠有黃華曰有者非其有之時也春秋傳曰有者不宜有也周官后蠶服鞠衣鞠衣色黃象鞠鞠蓋華於隂中其華則又中之色也后帥內外命婦而蠶則使天下之嬪婦取中焉其所服如此王后六服禕翟取翬揄狄取榆鞠衣又取諸鞠故鳥獸草木之名孔子欲學者之多識而記禮者以為衣服在身而不知其名為罔也鄭氏解周官以為王后六服翬狄玄揄狄青闕狄赤鞠衣黃展衣白褖衣黑若所謂翬狄玄揄狄青鞠衣黃其説是矣所謂闕狄赤展衣白褖衣黑其説非也按毛詩傳言展衣以丹縠為之則展衣赤矣赤則宣布著盡有誠信之道焉故謂之展又或謂之袒也禮記曰內子以袒衣亦通帛為􅎶􅎶絳帛也與此同義鞠衣黃展衣赤則褖衣白矣難者曰褖衣吉服也純白非婦人吉服所宜曰蓋不知褖衣之有纁袡也周官緣衣是已闕狄一名屈狄則視揄狄之制有屈焉爾刻而不畫是也其色宜亦如揄狄也蒺藜蒺藜布地蔓生子有三角刺人狀如菱而小蒺之言疾也一名茨可以茨牆故謂之茨牆有茨序曰國人疾之而不可道也正言蒺藜以此詩曰牆有茨不可掃也言欲掃去之反傷牆也以刺穢礙易曰據于蒺藜六三以柔乘剛故曰據于蒺藜據于蒺藜非所據而據焉者也今兵家乃鑄鐵為之以梗敵路亦呼蒺藜韓詩外傳以為春殖桃李夏得隂其下秋得食其實春殖蒺藜夏不得采其葉秋得其刺焉故君子慎所立也師曠曰歲欲苦苦草先生苦草亭藶也嵗欲旱旱草先生旱草蒺藜也木槿釋草曰椵木槿櫬木槿似李五月始華月令木槿榮是也華如葵朝生夕隕一名舜蓋瞬之義取諸此詩曰顔如舜華又曰顔如舜英顔如舜華則言不可與久也顔如舜英則愈不可與久矣蓋榮而不實者謂之英人物志曰草之精秀者為英獸之將羣者為雄張良是英韓信是雄篤論曰日給之華似奈奈實而日給虛虛偽之與真實相似也羲之法帖曰來禽青李來禽奈屬也言果以美而來禽莧莧有紅莧白莧紫莧三色爾雅曰蕢赤莧即今紅莧是也莖葉皆髙大而見故其字從見指事也易曰莧陸夬夬莧謂上六蓋兌見也而又乘五剛柔脆易除莧之象也九五剛得尊位大中髙大以平而柔生於上莧陸之象也列子曰老韭之為莧也老羭之為猿也言物以老故變有如此者故易以九六為老蓋老則變矣傳曰青泥殺鱉得莧復生今人食鱉忌莧其以此乎字説曰莔除眩莧除翳蓫逐水亦逐蠱茹藘爾雅曰茹蘆茅搜蓋茹藘一名茅搜其葉似棘可以染絳説文曰人血所生故搜從草從鬼齊人謂之茜陶隱居以為東方諸處乃有而少不如西多夫文西草為茜其或又以此乎詩曰東門之墠茹蘆在阪言男女之際以禮則近而易如東門之墠以色則逺而險如茹蘆在阪也又曰縞衣茹藘聊可與娛茹蘆茅搜之染女服也言國人多喪思得室家吉服以相保也蓋縞衣言物而非麻茹藘言色而非素明吉服矣周官庶氏掌除蠱毒以嘉草攻之嘉草若茜之類是也春秋傳曰皿蟲為蠱篆髓以為皿器也蟲諸蟲也指事律説造畜蠱毒謂集合諸蟲置於一器之內久而相食諸蟲皆盡若獨蛇在即為蛇蠱之類故其字指事如此傳曰千畝梔茜千畦薑韭其人皆與千户侯等然則梔茜之利可謂博矣此小人之所以學圃也臺臺夫須夫須莎草也可以為笠又可以為蓑疏而無溫故莎從沙與內司服所謂沙同意詩曰臺笠緇撮又曰南山有臺北山有萊南山有桑北山有楊南山有杞北山有李南山有栲北山有杻山君象也南以象明君北以象暗君蓋太平之君子至誠樂與賢者共之是為與賢之道而已未有以得之也未有以得之則道合則服從不合則去矣惟其子孫雖有昏亂而先君之舊臣不忍去之以自獻於先王者此得賢之道也故此言南山又言北山萊可食桑可衣臺可覆楊可載賢者之類也臺萊草也其生也在物下其成也在物先有基之象故曰樂只君子邦家之基養草以致木養小以致大至有鬱彼之楊沃若之桑以賁乎山則有光之象故曰樂只君子邦家之光基所以安也光所以榮也孟子曰堯以不得舜為己憂舜以不得禹臯陶為己憂此言其大者也小不遺臺萊大不棄桑楊若杞李者猶在所收此言其悉者也桑楊之於山雖大而不能髙雖堅而不能久得賢之盛若栲杻枸楰髙大以不朽成乎山則至矣故於南山曰有杞有栲北山曰有李有杻也李可果杞可茹有養之道故曰民之父母杻可為弓幹栲可為車輻有久之道故曰遐不眉壽且臺可覆桑可衣以象庇下之臣杞可茹以象養下之臣栲可以為車輻以象任重之臣故言之於南山此明君所賴以治者也萊可食舟可載以象濟難之臣李可果以象治賔客之臣杻可為弓幹以象治軍旅之臣故言之於北山此暗君所賴以存者也孔子曰衛靈公之無道仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅奚其喪此北山有萊有楊有李之意也德音不已言有繼也德音是茂言有承也保艾爾後又言燕及子孫稱其壽之如其上猶以為未足也更以言其德稱其今之如其上猶以為未足也更以言其後夫壽考之福算至於無期境至於無疆者又非特頌願之而已蓋古者有道之賢省事以清君之心備物以適君之體心清則生淨體適則生樂此君之所以壽也故初曰萬壽無期次曰萬壽無疆君之遇其臣也何獨不然言聽諫從膏澤下於民使其優為之不迫於禍患者此近壽之道也故始曰遐不眉壽終曰遐不黃耇艾爾雅曰艾冰臺其字從乂草之可以乂病者也一名灸草詩曰彼采蕭兮一日不見如三秋兮彼采艾兮一日不見如三歲兮蕭所以共祭艾所以療疾以言所將滋大其懼讒亦滋甚也曲禮曰十年曰幼學幼者十年之名學者其事也二十曰弱冠弱者二十之名冠者其事也三十曰壯有室壯者三十之名有室者其事也四十曰強而仕強者四十之名仕者其事也壯反幼之詞強反弱之詞壯則能立矣強則能行矣蓋能有所立然後能行能有所行然後能歷能有所歷然後能至故五十曰艾六十曰耆艾歷也耆至也夫以幼故學以弱故冠以壯故有室凡此皆子道也及其十年而德又一進也則非茍知之又能行之矣則於是出而仕焉故曰強而仕仕士也其德又十年而一進則可以為大夫矣故曰艾服官政內則曰五十命為大夫服官政其德又十年而一進則可以為卿矣故曰耆指使卿指使人者也且歷而至之矣然後可以指而使之也其德又十年而一進則可以為公矣故曰七十曰老而傳周官三公謂之鄉老既老矣則又十年而耋既耋矣則又十年而耄故八十曰耋九十曰耄耆者艾之至也耋者老之至也夫文老至為耋如此而已耄惛忘也春秋傳曰謂老將知而耄及之百年則人之大期在是也當致養而已故百年曰期頤博物志曰削冰令圓舉以向日以艾承其影則得火艾曰冰臺其以此乎舊説燕蓐惡艾字説曰艾可乂疾久而彌善故爾雅曰艾長也艾歷也叟以乂災為名艾以乂疾為義皆以所歷長所閲衆故也醫用艾灸一灼謂之一壯者以壯人為法其言若干壯謂壯人當依此數老幼羸弱量力減之虉小草五色似綬故名綬草詩曰卭有旨鷊言欲有文采具備以成條理之臣如虉者不戕賊之而後得焉或曰鷊綬鳥也故虉有雜色似綬其字從鷊釋草曰虉綬也是詩始曰防有鵲巢者言以不驚懼之故防有鵲巢也卒曰卭有旨鷊者言以不戕賊之故邛有旨鷊也且鵲善相其地而纍巢安則致其功用有驚懼之憂則不纍也鷊善相其天而吐綬樂則見其文采有戕賊之疑則不吐也傳曰虞氏之恩被於動植故烏鵲之巢可俯而窺今綬鳥大如鸜鵒頭頰似雉有時吐物長數寸食必蓄嗉臆前大如斗慮觸其嗉行每逺草木古今注云吐綬鳥一名功曹今俗謂之錦囊蓋鵲性多懼就利違害莊子所謂瞿鵲子者義取諸此故曰吾聞諸夫子聖人不從事於務不就利不違害周書又有意而子者意而燕也與鵲反矣蓋燕襲諸人間無所猜懼故問道乎許由而許由曰堯既已黥汝以仁義劓汝以是非矣汝將何以遊夫遙蕩恣睢轉徙之塗乎埤雅卷十七
