body:
  text: 欽定四庫全書埤雅卷六宋陸佃撰釋鳥鵲雞鸛鵝雉鷂雉鳶烏鸇鵰鴈鷹鵁鶄鶴鷀鵲鵲知人喜作巢取在木杪枝不取墮地者皆傳枝受卵故一曰乾鵲而莊子云烏鵲孺魚傅沫也鵲以傳枝少欲故曰孺也列子所謂純雄其名穉蜂者與此同意淮南子曰太隂所建蟄蟲首穴而處鵲巢向而為户又曰蟄蟲鵲巢皆向天一盖鵲巢開户嚮天一而背嵗故愽物志云鵲背太嵗也先儒以為鵲巢居而知風蟻穴居而知雨鵲嵗多風則去喬木巢旁枝故能高而不危也然則彊而不淫知風之自而作其巢知嵗之所在而開其户者鵲也彊而不淫所以成徳成徳故有行知風之自而作其巢知嵗之所在而開其户所以趨時趨時故有功故詩以譬國居積行累功詩曰防有鵲巢卭有㫖苕言不驚懼之故防有鵲巢不殘賊之故卭有㫖苕也俗說鵲巢中必有梁見鵲上梁者必貴今二鵲共銜一木置巢中謂之上梁說文作舄象形通為舄履之舄古之人居欲如燕行不欲如鵲故其字借為舄履之舄所以為行戒也其在相法有之曰鵲行蹌蹌性行弗良篆文作䧿蓋从錯省淮南子曰如鵲之駮一曰从昔昔之言乾也考工記曰穉牛之角直而澤老牛之角紾而昔殷氏子抄曰舄九寫而為烏乕三寫而為帝言書之轉易如此意林曰書三寫魚成魯帝成乕亦是意也相感志曰野雞屬隂先鳴而後鼔翼家雞屬陽先鼓翼而後鳴天𤣥主物簿云鵲啄槐實結玉於腦謂之鵲玉此鵲終嵗不復鳴噪雖巢無胎卵雞鹽鐡論曰雞亷狼吞雞跑而食之每有所擇故曰小亷如雞爾雅云雞大者蜀蜀子雓郭璞曰雞大者蜀今蜀雞也雞有蜀魯荆越諸種越雞小蜀雞大魯雞又其大者莊子曰越雞不能伏鵠卵魯雞固能矣成𤣥英曰越雞荆雞也魯雞今之蜀雞案韓子曰魯雞之不期蜀雞之不支則𤣥英所謂魯雞今之蜀雞非是舊說日中有雞月中有兔按雞正西方之物兔正東方之物大明生於東故雞入之月生於西故兔入之此猶鏡燈西象入東鏡東象入西鏡云爾風雨之詩曰風雨淒淒雞鳴喈喈風雨瀟瀟雞鳴膠膠風雨如晦雞鳴不已言雞之信度如此秋氣慘而淒淒風雨如此則疑於不能和秋物脫而瀟瀟風雨如此則疑於不能固嚮晦則君子入以宴息之時也風雨如此則又疑於已今曰風雨淒淒雞鳴喈喈風雨瀟瀟雞鳴膠膠風雨如晦雞鳴不已則亂世居子不改其度之譬也喈喈言鳴而不失其和膠膠言鳴而不失其固易曰巽為雞兊見而巽伏故為雞雞知時而善伏故也故曰乳狗噬虎伏雞搏貍又曰伏雞日抱其卵伏而未孚始化之時謂之涅王褒曰魚瞰雞睨李善以為魚目不瞑雞好邪視此言是也禽經曰陸鳥曰棲水鳥曰宿獨鳥曰止衆鳥曰集水鳥晚於林棲故曰宿也說文云日在西方而鳥棲因以為東西之西詩曰雞棲于塒日之夕矣言雞棲矣日於是夕夕於是月見故夕象半月未有蟾桂之狀月滿則夜見半則夕見故也故曰朝見曰朝暮見曰夕夕非曛晦之時明矣呉均曰雞有呼羣之徳鹿有食苹之美傳曰雞見食相告者仁也鸛鸛形狀略如鶴其性甘帶每遇巨石知其下有蛇即於石前如術士禹歩其石阞然而轉南方里人學其法者伺其養雛縁木以篾絙縛其巢鸛必作法解之乃於木下鋪沙印其足迹而倣學之天將雨則長鳴而喜盖知雨者也又善羣飛薄霄激雨雨為之散作窠大如車輪卵如三升杯擇礜石以嫗卵鸛水鳥也伏卵時數入水卵則不毈取礜石周圍繞卵以助煖氣故方術家以鸛煖巢中礜石為真物也又泥其巢一傍為池以石宿水今人謂之鸛石飛則將之取魚置池中稍稍以飼其雛俗說鵲梁蔽形鸛石歸酒又曰礜石温鸛石涼故能使卵不􅖁水不臭腐也詩曰鸛鳴于垤婦嘆于室垤蟻冢也鸛知天將雨有見于上蟻知地將雨有見于下鸛鳴于垤將雨之候也將雨則征夫之至不必如期故婦嘆于室也且行百里者半九十言末路之難也則於是時遇雨為尤苦故詩人道此以序其情而序曰三章言室家之望女也禽經曰鸛俯鳴則隂仰鳴則晴仰鳴則晴是有見于上也俯鳴則隂是有見于下也夫文雚見為觀盖取諸此拾遺記曰鸛能聚水巢上故人多聚鸛鳥以禳却火災鵝鴿頸如癭鵝顙如瘤今鵝江東呼鴚長脰善鳴又善轉旋其項古之學書者法以動腕羲之好鵝者以此亦其自然而有行列故聘禮曰出如舒鴈古者兵有鵝鸛之陳也左氏曰鄭翩願為鸛其御願為鵝舊説言江淮謂羣鸛旋飛為鸛井則鸛善旋飛盤薄霄漢與鵝之成列正異故古之陣法或願為鵝或願為鸛也卞子曰羊性淫而很豬性卑而率鵝性頑而傲狗性險而出盖鵝峩首似傲故曰傲也名之曰鵝其謂是歟鵝伏隨日鳱伏隨月説者以為乳鵝伏卵隨日光所轉傳曰鵝飛則蜮沈鵙鳴則蛇結又曰短脚者多伏長脚者多立脚近尾者好歩脚近臆者好躑多伏􅕯鵝之類是也多立鸛鶴之類是也又曰陸生之鳥咮多兊或作銳而善啄水生之鳥咮多圎而善唼善唼亦􅕯鵝之類是也善啄亦鸛鶴之類是也俗云鵝毛柔煖而性冷冝覆嬰兒字說曰鵝飛能俄而已是以不免其身若鴚鵝者可也鴚鵝者鵝也而非鵝禽經曰鵝見異類差翅鳴雞見同類拊翅鳴雉雉死耿介妒壟護疆善鬬雖飛不越分域一界之内要以一雄為長餘者雖衆莫敢鳴雊潘岳所謂畫墳衍以分畿者也周官曰士執雉士死制故執雉所謂二生一死摯者也又其交有時别有倫而其羽文明可用為儀故古者后服三翟詩曰有瀰濟盈有鷕雉鳴濟盈不濡軌雉鳴求其牡言雉宜交有時别有倫今反以雌求雄非特以雌求雄而又求牡焉以雌求雄者淫也非特以雌求雄而又求牡焉者亂也故序曰公與夫人並為淫亂又曰雄雉于飛泄泄其羽言雉交有時别有倫而又性善鬬雖飛不越分域宣公淫亂不恤國事軍旅數起則雉之不如也易曰離為雉離火也其體文明性復猋悍故為雉亦雉雖非辰屬而正是南方之物陶氏所謂丙午日不可食者明王於火也又云麞鹿非辰屬八卦無主故道家聼許為脯禮云雉曰疏趾鴨鴈醜指間有幕其足蹼雞雉醜指間無幕其足䟽故曰䟽趾也簡兮之詩曰左手執籥右手秉翟此大舞也宛丘之詩曰無冬無夏值其鷺羽此小舞也雉取文明鷺則取其有潔白之容所謂大舞者籥舞是也所謂小舞者羽舞是也故樂師云掌教國子小舞一曰羽舞雉飛若矢一徃而墮雉雞類也不能逺飛崇不過丈脩不過三丈故雉高一丈長三丈也古者數數以萬度度以雉爾雅雞雉皆曰絶有力奮雞雉皆不能逺飛故名云化書曰雉不再合信也說文云雷始動雉鳴而雊其頸蔡邕月令以為雷在地中雉性精剛故獨知之應而鳴也禽經曰鵻上無尋鷚上無常雉上有丈鷃上有赤鷂雉釋鳥云江淮而南青質五采皆備成章曰鷂王后六服一曰翬翟畫以翬雉二曰揄翟畫以揄雉三曰闕翟言刻繒為之闕而不畫闕而不畫則其制屈於二翟故一名屈狄也喪大記曰復夫人以屈狄世婦以䄠衣䄠亦信也闕狄一曰屈狄展衣一曰䄠衣其義一也翬素質揄青質青質仁也素質義也備五采焉禮也地道尚義故后妃之徳義以為質而文之以禮或曰闕翟飾以闕雉天子五門一曰雉門雉門畫雉象闕也屈狄以此雉飾之故曰闕翟毛詩傳曰象服尊者所以為飾蓋禕衣也禕衣畫雉故曰象服又曰揄狄闕翟羽飾衣也而說文解禕亦曰畫𫀆其釋䄖翟又以謂翟羽飾衣則禕衣畫翟䄖翟闕翟皆翟羽飾之矣周官二翟曰翟而禕衣變翟曰衣以此故也葛覃之詩曰薄汙我私薄澣我衣曷澣曷否歸寕父母詩傳又以為婦人有副禕盛飾以朝事舅姑接見于宗廟進見于君子其餘則私也私服宜澣公服宜否蓋公服謂禕而已以畫故宜否則二翟以羽飾之雖澣可也且夫服衮冕則婦服副禕而衮之制字从公从衣則公服謂禕理宜然也然則薄汙我私薄澣我衣相備而已故或言私或言衣也鳶釋鳥云鳶烏醜其飛也翔高飛曰翺布翼不動曰翔鳶鴟也摩風囬翔故其飛也翔曲禮曰前有塵埃則載鳴鳶鳶鳴則將風故也禽經曰暮鳩鳴即小雨朝鳶鳴即大風詩曰鳶飛戾天魚躍于淵鳶鈍者也而乗風以風作之則高飛魚濳者也而乗氣以氣作之則深躍故詩以況君子作人之盛昔墨子作木鳶飛三日不集列子所謂班輸之雲梯墨翟之飛鳶是也今人乗風放紙鳶鳶輙引絲而上令小兒張口望視以洩内熱蓋放於此舊説觀魚翼而創櫓視鴟尾而製柂言古之人仰觀俯察取材於物以成舟楫之利如此庚桑子曰人實鴟義而有其國鴟貪殘之鳥善抄盗人詩曰為梟為鴟説文曰鳶从屰干上為屰鳶飛戾天故从屰也易曰飛鳥遺之音不宜上宜下大吉上逆而下順也烏說文曰烏孝鳥也象形林罕以為全象鳥形但不注其目睛萬類目睛皆黒烏體全黒逺而不分别其睛也烏一名鴉其名自呼淮南子曰烏之啞啞鵲之唶唶豈為寒暑燥濕變其聲哉詩曰莫赤匪狐莫黒匪烏蓋狐羣者也烏合者也故詩以况衛之君臣並為威虐其惡如一又曰哀我人斯于何從禄瞻烏爰止于誰之屋言富人之屋利之所在故烏集焉民之從禄將如此矣大夫欲王瞻之也又曰匪手攜之言示之事此之謂也又曰具曰予聖誰知烏之雌雄言幽王君臣俱自謂聖如烏之黑雌雄無以相别也管子曰烏集之交初雖相驩後必相咄詩人每引以刺者非特譏其為惡如一亦以刺其初皆利合不以道也烏又為嘆詞者雀見虎則鳴烏見異則噪故以為烏霍烏霍嘆所異也今人聞鵲噪則喜聞烏噪則唾以烏見異則噪故輙唾其凶也尚書大傳曰愛人者兼其屋上之烏然則惡而知其善愛而知其惡者寡矣孫武子曰鳥起者伏也烏集者虚也言古之善料兵者觀鳥起而知伏視烏集而知遁𫝊曰烏樂空矌鵲樂稠閙世云鴛交頸而感烏傅涎而孕莊子曰烏鵲孺蓋謂是歟故語曰鵲傳枝鵶茹沫又舊說烏性極壽三鹿死後能倒一松三松死後能倒一烏雜俎曰俗候烏飛翅重知天將雨烏陽物也感隂氣而翅重故俗以此占其雨否淮南子曰螣蛇游霧而殆於蝍蛆烏力勝日而服於鵻禮烏陽物也鸇釋鳥曰晨風鸇草木䟽云似鷂黄色燕頷嚮風摇翅乃因風飛急疾擊鳩鴿燕雀食之列子曰鷂之為鸇鸇之為布榖布榖久復為鷂也孟子所謂為叢敺爵者鸇即此是也詩曰鴧彼晨風鬱彼北林言穆公能芘其所頼而賢者赴之如此曾子曰邦有道則突若入焉此之謂也且黄鳥仁晨風義而秦之良士以仁死賢臣以義生故黄鳥曰哀三良也而晨風以刺棄其賢臣禽經曰好風鵏惡雨然則謂之晨風可知也已又曰鸇鸇之信不如鴈周周之智不如鴻今鸇亦去來有時然則制字从亶又可知矣雕雕能食草似鷹而大黒色俗呼皂雕一名其飛上薄雲漢詩曰匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃于淵言人民飛揚竄伏不安如此此序所謂亂也昔之相雕者以為雕首欲長而額狹頂平領大項後毛磔主勁疾目睛大滿瞼長眸子小而近前主明慧爪近肉麤圎其末纎細主多力蹠平潤主巧捷不夭鼻大主長飛不乏膝骨大如蒺藜實者上相骨小無圭角者下也指節大肉少分成十字者上相骨節細平者下也鈍金色青潤者上相淺黒者下也叢林色静白者上相黒膩者下也封厚而管麤者上相細薄者下也背偃而溝深者上相隆起者下也臆圎胅為上相側狹為下相尾狹厚為上相濶軟為下相鶻相同雕唯頭欲小頂臆欲圎旋毛欲深咮欲側薄而短小為異鷹相亦與雕同而鷹又欲其尾長翅短爾雅象謂之鵲玉謂之雕蓋鵠之義出於鴻鵠之鵠雕之義出於雕鶚之雕鵠性勁利雕性刻制故也今大雕翺翔水上扇魚令出沸波攫而食之一名沸河淮南子所謂鳥有沸波者即此是也禽經曰淘河在岸則魚没沸河在岸則魚涌相感志云其毛能食諸鳥羽如羣錯草中有雕毛必衆鳥毛羽自落地顔氏云雕一名鷲其翮可用為箭羽盖雕隼六翮皆乗風輕勁故堪以為箭羽禽經曰雕以周之鷲以就之鴈釋鳥云鳬鴈醜其足蹼其踵企郭璞以為鳬鴈指間有幕蹼屬相著故曰其足蹼是也又曰飛則脚跟企直非是也踵足後也今鳬鴈之醜行則皆前幕布地後踵企故曰其踵企也以今鵝觀鴈行鴨觀鳬行則槩可見矣鴈行斜歩側身故莊子謂士成綺鴈行避影而問老子詩曰鴻飛遵渚公歸無所於女信處鴻飛遵陸公歸不復於女信宿蓋鴻之為物其進也有漸其飛也有序又其羽可用為儀君子之道也故此以况周公易曰漸之進也公歸東都則之進也然未至西都故為不復易曰其羽可用為儀吉不可亂也然則禮有以鴻為儀者取其行列不亂而已禮曰前有車騎則載飛鴻飛鴻則有行列故也載謂合剥皮毛舉之竿首若所謂以鴻脰韜杠者周官以禽作六摯大夫執鴈以知保身又欲有去就之義而不失其序故執鴈也鴈夜泊洲渚令鴈奴圍而警察飛則銜蘆而翔以避矰繳有逺害之道非特取其有去就之義而已鹽鐵論曰噰噰鳴鴈朝日始旦登得前利無蹈後害此言婚姻以禮則有利而無害也故曰貴聘而賤逆之是以君子知出姜之不允於魯矣夏小正曰鴈北鄉鄉者何也郷其居也又曰遰鴻鴈先言遰而後言鴻鴈者何也見遰而後數之則鴻鴈也且曰遰猶曰傳其驛舍云爾非其居也法言曰能來能徃者朱鳥之謂與燕一名𤣥鳥鴈一名朱鳥𤣥鳥以春分來朱鳥以春分去淮南子曰燕鴈代飛此之謂也且鴈霜降南翔冰泮北徂其性惡熱故中國始寒而北至舊說鴻鴈南翔不過衡山今衡山之旁有峯曰囬鴈盖南地極燠人罕識雪者故鴈望衡山而止陳琳曰陸䧟蘂水截輕鴻輕鴻鴻毛也傳曰輕於鴻毛今人試刀劒令髪浮轉於水以刄斷之觀其銛鈍水截輕鴻殆類是也愽物志曰鴻毛為囊可以渡江不漏案昬禮曰摯不用死故詩曰噰噰鳴雁言用生者也禽經曰鴻雁愛力遇風迅舉孔雀愛毛遇雨高止又曰鴈曰翁雞曰鶉曰䳸鷹陶𢎞景曰虎聞聲而深伏鷹見形而高飛鷹鷙鳥也一名鷞鳩左傳曰鷞鳩氏司㓂盖鷹鷙故為司㓂一歳曰黄鷹二歳曰鴘鷹三歳曰鶬鷹鴘次赤也埤倉音披免切鷹鷂二年之色也頂有毛角微起今通謂之角鷹詩曰維師尚父時維鷹揚言其武之奮揚如此樂記所謂𤼵揚蹈厲太公之志也舊說凡鷙鳥雛生而有慧出殻之後即於巢外放條大鷙恐其墜及為日所曝熱暍致損乃取帶葉枝挿其巢畔防其外墜及作隂涼也欲驗雛之大小以所揷枝葉為候若一日二日其葉雖萎尚帶青色至六日七日其葉㣲黄十日後枯悴此時雛大可取說文曰从瘖省蓋从疾省佳之疾捷者故从疾省也隨人所指蹤故从人禽經曰鷹不擊伏鶻不擊妊盖其義性如此裴氏新書曰虎豹無事行歩者若將不勝其軀鷹在衆鳥之間若睡寐然故積怒而後全剛生焉然則越之所以滅吳用此道也蔡邕月令云鷹化為鳩鷹鳩屬也鳩凡五種鷹為鷞鳩應陽而變則喙柔仁而不鷙夏小正曰鷹者其殺之時也鳩者非其殺之時也善其變而之仁也中秋鳩化為鷹變而之不仁故不記也字說曰應从心从心之應物不疾而速不行而至之應物人或使之能疾而已不行不至今三館書有音竹麦反漱三卷皆養鷹鸇及醫療之術鵁鶄鵁鶄一名鵁鸕一名鳽似鳬脚髙毛冠巢於高木生子宂中子銜其母翅飛上下淮賦所謂鸕鷀吐雛於八九鵁鶄銜翼而低昻者也叚氏云鵝警鬼鵁鶄厭火孔雀辟惡舊云此鳥長目其睛交故有鵁鶄之號相如所賦交睛旋目者是也禽經曰旋目其名䴉交目其名鳽方目其名鴋鶴鶴形狀如鵝青脚素翼常夜半鳴故淮南子曰雞知將旦鶴知夜半其鳴高亮聞八九里雌者聲差下舊云此鳥性警至八月白露降流於草上㸃滴有聲因即髙鳴相警移徙所宿處慮有變害也蓋鶴體絜白舉則高至鳴則逺聞性又善警行必依洲嶼止必集林木故詩易以為君子言行之象始生二年落子毛三年産伏七年飛薄雲漢後七年學舞後七年應節後七年晝夜十二鳴中律後六十年不食生物大毛落茸毛生色雪白泥水不能汙百六十年雄雌相視目睛不轉而孕千六百年飲而不食聖人在上則與鳳皇翔於甸其精神氣骨應相故古者相鶴有經蓋鶴陽物也而遊於隂因金氣依火精以自養火數七金數九故七年小變十六年大變六十年變止千六百年形定而色白食於水故喙長軒於前故後短棲於陸故足髙而尾凋翔於雲故毛豐而肉踈大喉以吐故脩頸以納新故壽凡鶴之上相隆鼻短口則少眠髙脚踈節則多力露眼赤睛則視逺囘翎亞膺則體輕鳳翼雀毛則善飛龜背鼈腹則能産輕前重後則善舞洪髀纎趾則能行禽經曰鶴以怨望鴟以貪顧雞以嗔睨鴨以怒瞋雀以猜瞿燕以狂䀪視也鸎以喜囀烏以悲啼鳶以飢鳴鶴以絜唳鳬以凶呌鴟以愁嘯鳴也今鶴雌雄相隨如道士歩斗履其跡而孕内典曰鶴影生禽經曰鶴愛隂而惡陽鴈愛陽而惡隂鷀鸕鷀水鳥似而黒一名鷧觜曲如鈎食魚入喉則爛其熱如湯其骨主鯁及噎盖以類推之者也此鳥吐而生子神農書所謂鸕鷀不卵生口吐其雛獨為一異是也楊孚異物志云鸕鷀能没於深水取魚而食之不生卵而孕雛於池澤既胎而又吐生多者生七八少生五六相連而出若絲緒焉水鳥而巢髙木之上夔州圖經稱峽中人謂鸕鷀為烏鬼蜀人臨水居皆養此鳥繩繫其頸使入捕魚得魚則倒提出之杜甫詩云家家養烏鬼是也埤雅卷六
