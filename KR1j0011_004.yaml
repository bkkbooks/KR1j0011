body:
  text: 埤雅卷二音釋傴郁禹坼恥格亹尾蓍尸筮誓籥樂蚓引緌㽔蝤由蛑謀螖滑鰂疾得矴釘􅖂布族跬犬蘂蹣薄安跚山跛布火炮白交玳帽瑁𪕋留籕胄鶡鶴痱肥磊力罪踦已瞋嗔蛙蛙哇於佳黽眉耿􅪁䗥子公㾭莊救朒肉膲焦蠣蜊拊附壝欲癸概蓋疈壁卣由頠隗蛭質蚹附螔弋支蝓俞螭癡􅕱几喙詡穢礫歷皭在爵醟榮魧杭鰿積貾池蜠求隕􅜽責橢他果鰻莫安鱺離鬛列罩罩汕所諌罺嘲欽定四庫全書埤雅卷三宋陸佃撰釋獸麟兔鹿麝犀塵虎麕兕豺獺熊豹羊牛麟麟土畜也信而應禮以足至者也軒轅大角之獸狼額赤目五蹄含仁懷義音中鍾吕行中規矩不羣居不旅行不入陷穽不罹羅網王者至仁則出蓋太平之符也孔子曰刳胎殺夭則麒麟不至摘巢毁卵則鳳凰不翔角端有肉示有武而不用不踐生草不食生物有愛吝之意故麟從吝牡麒牝麟隂主吝嗇故牝曰麟也詩一章曰麟之趾二章曰麟之定三章曰麟之角始於趾終於角者言德以升進為美也易曰德言盛故是詩每况愈上爾雅云麟麕身牛尾一角蓋麟似麕圓頂一角故西狩獲麟曰有麕而角也或曰麟肉角鳳肉咮皆示有武而不用也傳云麒似麟而無角按爾雅曰驨如馬一角不角者騏然則麒從騏省不角故也或曰序詩以為皆信厚如麟趾之時從吝以厚故也從其以信故也其信也其者指物之詞兔兔口有缺吐而生子故謂之兔兔吐也舊説兔者明月之精視月而孕故楚辭曰顧兔在腹言顧兔居月之腹而天下之兔望焉於是感氣禮曰兔曰明視其以此歟蓋咀嚼者九竅而胎生獨兔雌雄八竅故陶氏書云兔舐雄毫而孕五月而吐子而里俗又謂視顧兔而感氣故卜秋月之明暗以知兔之多寡也今孔雀亦合而先儒以孔雀聞雷而孕則兔雖舐毫其感孕則以月理或然也月缺也故其口缺一曰兔目不瞬視雄毫而孕詩曰肅肅兔罝椓之丁丁肅肅兔罝施子中逵肅肅兔罝施于中林蓋椓之丁丁以有所聞施于中逵以有所見施于中林則無所聞無所見於是焉肅則好德之至也故詩以此為後徐幹中論曰肅肅兔罝施于中林處獨之謂也是詩正言兔罝者先王之化言格於芻蕘行至於雉兔然後為博故序以為莫不好德賢人衆多也俗云兔營窟必背丘相通所謂狡兔三穴古今注曰兔口有缺尻有九孔今尻於文從九蓋生於兔也內則曰兔去尻狐去首狐死亦正丘首不忘本也主物簿云孕環之兔懷於左腋毛有文彩間色至百五十年當轉環於腦能隱形人不復見矣説文無兔字以免為兔兔生自口出宜有留難吐而後免故字又通為免俗則作兔非是也今産乳曰免亦或謂之分娩且免足前卑後倨其形俯故俯又從免也冕亦從免古之説冕者以為位彌髙而志彌俯其以此乎內則曰姆教婉娩聽從蓋婉妻道也娩母道也聽婦道也從姑道也左傳曰姑慈而從婦聽而婉鹿字統曰鹿性警防分背而食以備人物之害蓋鹿萃善走者分背而食食則相呼羣居則環其角外向以防物之害已故詩以況君臣之義而毛詩草蟲經曰鹿欲食皆鳴相召志不忌也周官曰視朝則皮辨服皮辨正以鹿皮為之蓋取諸此鹿愛其類發於天性詩曰王在靈沼於牣魚躍王在靈囿麀鹿攸伏正言魚鹿者言人之與物異類則鳥見之髙飛魚見之深入鹿見之決驟今魚樂於沼鹿安於囿如此則以文王之德行於靈沼靈囿故也爾雅麋曰其迹躔鹿曰其迹速麕曰其迹解兔曰其迹迒豕曰其迹刻狐曰其迹􅚵蓋麋性迷惑故其迹躔而不解麕性散驚故其迹解而不躔鹿善決驟故其迹速而不􅚵狐善遲疑故其迹􅚵而不速豕性追突故其迹刻兔性跳躑故其迹迒今兔將伏輒跳躑擺迹人反以此得之韓子曰譬如兔得迹安用東西跳也小爾雅曰鳥之所乳謂之巢雞雉所乳謂之窠兔之所息謂之窟鹿之所息謂之場詩曰町疃鹿場言町畦村疃之中無人焉故鹿以為場也舊説鹿者仙獸常自能樂性從其雲泉至六十年必懷瓊於角下角有斑痕紫色如點行或有涎出於口不復能急走也蓋鹿戴玉而角斑魚懷珠而鱗紫故有諸中未有不形於外也麝釋獸云麝父廣足麝如小鹿有香故其文從鹿從射虎豹之文來田貍麝之香來射則其皮與臍之為纍也今商汝山中多羣麝所遺糞常就一雖逺逐食必還走其地不敢遺迹他所慮為人獲人反以是從迹其所在必掩羣而取之蓋麝絶愛其香每為人所迫逐勢且急即自投髙巖舉爪剔出其香就縶且死猶拱四足保其臍吳筠玄猿賦以為麝懷香以賈害狙伐巧而招射謂是也陶氏云麝形似獐今俗謂之香獐常食柏葉故養生論云蝨處頭而黑麝食柏而香也又云啖蛇今以蛇蛻裹麝彌香夏月食蛇多至寒香滿入春臍內亟痛即自以足剔出之置屎溺中覆之皆有常處象退齒犀退角麝退香皆輒藏覆知自珍其貨也趙辟公雜説云西北之麝噬虺而食柏故其香結東南山溪有松而無柏故麝不結也犀犀性絶躁似豕一管三毛有鴆處必有之形似水牛大腹卑腳腳有三蹄黑色三角一在頂上一在額上一在鼻上鼻上者即食角也小而不橢好食棘亦有一角者前足直常倚木而息木仆則不能起異物志曰犀體兼五種肉又曰犀舌有棘常食草木棘刺不啖莖葉也舊説犀之通天者惡影常飲濁水重霧厚露之夜不濡裏白星徹端世云犀望星而入角即此也可以破水駭雞蓋犀之美者有光故雞見影而驚其次角理復有正插倒插正插者角腰以上通倒插者角腰以下通亦曰尖花小而根花大謂之倒插故南人以牙為白暗犀為黑暗言難别也犀亦絶愛其角墮角即自埋之王粲遊海賦曰羣犀代角巨象解齒是也交州記曰犀有二角鼻上角長額上角短或曰三角者水犀也二角者山犀也在頂者謂之頂犀在鼻者謂之鼻犀犀有四輩其紋或如桑椹或如狗鼻者上黔犀無紋螺犀紋旋牸犀紋細牯犀紋大而勻周官函人為甲犀甲七屬兕甲六屬犀革差劣於兕故兕甲六屬減一犀甲七屬增一也或曰翡翠屑金人氣粉犀犀最難搗唯鋸犀成小塊以極薄紙裹置懷中令近肉以人氣蒸之候氣蒸潤乘熱投臼中急搗應手如粉麈麈獸似鹿而大其尾辟塵以置蒨帛中能令嵗久紅色不黦又以拂氈令氈不蠧蓋蠅點變白麈尾留紅而狐白貂鼠之類燕見之則毛脫物有相制其異如此今麋鹿醜亦喜紅南人取之則衣絳服而舞麋鹿輒注視不動因以利刀刺之名苑曰鹿之大者曰麈羣鹿隨之皆視麈所往麈尾所轉為準於文主鹿為麈而古之談者揮焉良為是也恩平郡譜曰沈牛謂之回沙牛謂之磨麈謂之荒鹿謂之􆒓虎虎奮衝破又能畫地卜食蓋蛇蟠向壬鵲巢面嵗燕伏戊巳虎奮衝破此亦鳥獸之所以靈也兵法曰將開牙門常背建向破其以此歟類從曰虎行以爪坼地觀竒耦而行今人畫地觀竒耦者曰虎卜云簡兮曰執轡如組有力如虎如組以言其藝如虎以言其勇常武曰進厥虎臣闞如虓虎蓋虎之自怒虓然闞如虓虎則以言將帥之勇發於忠毅非激而怒之也何草不黃曰匪兕匪虎率彼曠野哀我征夫朝夕不暇言兕扺觸虎搏噬先王驅而逺之則率彼曠野兕虎之所宜今征夫如此則可哀矣爾雅曰熊虎醜其子狗絶有力麙漢律曰捕虎一購錢三千其狗半之是也方言虎陳魏宋楚之間謂之李父江淮南楚之間謂之李耳注云虎食物值耳而止以觸其諱故然則仁人之於親也聞名心瞿見似目瞿豈自外至哉禮曰交龍為旗旗東方也鳥隼為旟旟南方也熊虎為旗旗西方也龜蛇為旐旐北方也太常則象天焉環以覆之故繪日月星辰易曰君子豹變大人虎變豹變言變而為豹也楊子曰貍變則豹所謂豹變故象曰君子豹變其文蔚也虎變言變而為虎也楊子曰豹變則虎所謂虎變故象曰大人虎變其文炳也周官服不氏掌養猛獸而教擾之鄭氏謂擾馴也言王者之教無不服也然則教而馴之蓋亦有道矣梁鴦曰且一言我養虎之法夫食虎者不敢以生物與之為其殺之之怒也不敢以全物與之為其碎之之怒也時其飢飽逹其怒心虎之與人異類而媚養已者順也故其殺之逆也吾豈敢逆之使怒哉亦不順之使喜也何則喜之復也必怒故曰不處中和勢極則反必然之數也俗云鳩食桑椹則醉貓食薄荷則醉虎食狗則醉今虎所在麂必鳴以告麕崔豹古今注曰鹿有角而不能觸麞有牙而不能噬麞麕也齊人謂麕為麞麞如小鹿而美故從章也章美也易曰隂雖有美含之以從王事麞從章􅕱從旨其義一也語曰四足之美有麃麃即麞也或曰麞性善驚故從章吳越春秋曰章者慞偟也蓋麕鹿皆健駭而麕性膽尤怯飲水見影輒奔道書曰麞鹿無魂又曰麞鹿白膽善怖為是故也或曰麇喜音聲麞喜文彩故麇從禾麞從章今獵户以彩服舞麞鹿字説曰赤與白為章麞見章而惑者也樂以道和麇可以樂道而獲焉麇不可畜又不健走可縛者也故又訓縛詩曰野有死麕白茅包之言昏禮不以死物故其生摯用鴈而飾羔鴈者以繢今取死麕更以白茅包之則皆非其禮矣雖皆非禮然猶愈於無禮故序云惡無禮也先曰死麕後曰死鹿先曰包後曰束言𬒳文王之化知惡無禮其俗有隆而無殺麞性喜山麋性喜澤鹿性喜林故林屬於山為麓其字從鹿麓者鹿之所在故也鹿林獸也麋澤獸也博物志曰麋掘澤草而食其場成泥名曰糜暖民隨此暖種稻不耕而穫其收百倍麕性善聚善散故從囷囷聚也亦散也國語曰市無赤米而囷鹿空虛先儒以為圓曰囷方曰鹿鹿善聚亦善散故囷或謂之鹿也兕釋獸云兕似牛兕重千斤一角青色其皮堅厚可以制鎧傳曰水剸蛟龍陸斷犀兕蓋取諸此吉日曰發彼小豝殪此大兕言能中微而制大也老子曰兕無所投其角兕善抵觸故先王之制罰爵以兕角為之酒陽物也而善發人之剛其過則在抵觸故先王制此以為酒戒詩曰兕觥其觩旨酒思柔此之謂也四升曰角角觸也與此同意道家云虎千年則牙蛻而角生豺釋獸曰豺狗足豺似狗而長尾白頰髙前廣後其色黃季秋取獸四靣陳之以祀其先世謂之豺祭獸故先王候之以田禮記所謂豺祭獸然後田獵是也詩曰取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊豺虎以殺為性則宜無所不食有北以載為德則宜無所不受今曰豺虎不食有北不受且付昊天制其罪則惡之至也記曰好賢如緇衣惡惡如巷伯為是故也然是詩地於四方正言有北者有北朔地也朔地者寬間之至天於四時正言有昊者有昊南天也南天者辨察之至漢律捕虎一購錢三千捕豺一購錢百豺虎皆害物之尤者故詩併言之俗云豺羣噬虎言其健猛且衆可以窘虎也又曰瘦如豺豺柴也豺體細瘦故謂之豺棘人骨立謂之柴毁義取諸此舊説豺獺祭天又或以謂皆自祭其先云疑此二物祭帝而其先與焉禮曰萬物本乎天人本乎祖故曰人而不祭豺獺乎獺獺獸西方白虎之屬似狐而小青黑色膚如伏翼水居食魚孟子所謂為淵驅魚者獺也亦自祭其先記曰獺祭魚然後漁人入澤梁是也獺取鯉於水裔四方陳之進而弗食世謂之祭魚其字從賴與豺從才同意援神契曰謂多賴故不使超揚賴才也舊説蟾肪合玉獺膽分巵又曰熊食鹽而死獺飲酒而斃此類之所推也淮南子曰鵲巢知風之自獺穴知水之髙下言嵗多風則鵲作巢卑水之所及則獱獺移穴其預知有如此也或曰獺一嵗二祭豺祭方獺祭圓言豺獺之祭皆四靣陳之而獺圓布豺方布唐李商隱善屬文喜鋪陳檢閲時謂之獺祭魚字説曰豺亦獸也乃能獲獸能勝其類又知以時祭可謂才矣獺非能勝其類也然亦知報本反始非無賴者熊熊似豕堅中山居冬蟄當心有白脂如玉味甚美俗呼熊白其膽春在首夏在腹秋在左足冬在右足好舉木而引氣謂之熊經莊子所謂熊經鳥伸是也冬蟄不食飢則自舐其掌故其美在掌而孟子曰熊掌亦我所欲也周官大射諸侯則共熊侯豹侯蓋諸侯服猛下王德一等故其所射共熊豹之侯而已又曰田役則設熊席則以蒞衆尚毅故也亦以其溫傳曰君居則狐裘坐則熊席考工記曰龍旗九斿以象大火也鳥旟七斿以象鶉火也熊旗六斿以象伐也龜蛇四斿以象營室也説者曰龍旗東方也故象蒼龍宿之數其斿九熊旗西方也故象白虎宿之數其斿六鳥旟正南方之物也故象朱鳥宿之數其斿七龜旐正北方之物也故象玄武宿之數其斿四案旗象大火旟象鶉火旗象伐旐象營室義不在斿猶之龍旗養信而荀子曰龍旗九斿以養信也許慎曰熊旗五斿以象伐按熊旗五斿則考功所記六斿誤矣巾車掌王之五路建太常以祀建大旗以賔建大赤以朝建大白以即戎建大麾以田太常象天有日月焉大旗象東方即旗是也大赤象南方即旟是也大白象秋一名旗大麾象冬一名旐太常大旗蓋言其名大赤大白蓋言其色大麾則又以用言互相備也書曰左仗黃鉞右秉白旄以麾以大赤照上則龍旗青可知矣以大白照下則龜旐黑可知矣爾雅曰緇廣充幅長尋曰旐是也鄭云九旗之帛皆用絳不知鄭氏所云何所據而言然鬼谷子曰分威法伏熊説者以為熊之擊搏先伏而後動字説曰熊強毅有所堪能而可以其物火之羆亦熊類而又強焉然可网也豹豹花如錢黑而小於虎文易曰君子豹變小人革靣言能革小人之靣而已召南之事是也古今注曰豹尾車周製也所以象君子豹變尾言謙也晉人刺在位不恤其民其詩一章曰羔裘豹袪自我人居居二章曰羔裘豹褎自我人究究言大夫體柔以剛文之而已今其用暴如此則非所以稱其服也居居以言不通究究以言不恕豹袪下大夫也豹褎上大夫也詩曰羔裘豹飾豹飾又言國君體柔而文之以剛其義上達也玉藻曰狐青裘豹褎玄綃衣以裼之羔裘豹飾緇衣以裼之則豹飾明非褎矣毛詩傳曰節謂緣以豹皮則緣蓋言領人君之服也管子曰上大夫豹飾列大夫豹幨此齊一時之數非古也古云虎豹之駒未成文已有食牛之氣及長退毛然後踈朗煥散蓋亦養而成之傳曰文豹隱霧十日不食欲以澤其衣毛成其文彩殆謂是也語曰豹死留皮人死留名故君子疾沒世而名不稱焉廣志曰狐死首丘豹死首山言不忘本也豹一名程列子曰程生馬古詩曰餓狼食不足飢豹食有餘言狼貪豹廉有所程度而食其字從勺當為是也一曰從勺豹之勺猶虎之擬也字説曰虎豹貍皆能勺物而取焉大者猶勺而取不足為大也小者雖勺而取所取小矣不足言也故於豹言勺博物志云豹死守窟淮南子曰蝟使虎申蛇令豹止物各有所制也羊羊性善羣故於文羊為羣犬為獨也羊每成羣則要以一雄為主舉羣聽之今俗所謂壓羣者是也北人謂之羊頭鄭氏儀禮注云羊取其後帥蓋言此矣詩曰爾羊來思其角濈濈羊前其剛以觸者也故以其角齊聚為善又曰爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升矜矜言羊之愛牧人也兢兢言羊之畏牧人也牧之為道擾之以順其性故能使物愛支之以制其放故能使物畏或降于阿或飲于池或寢或訛所謂擾之以順其性也麾之以肱畢來既升所謂支之以制其放也傳曰騫虧也崩羣疾也羊之為物以瘦為病而又死善耗敗故於不騫不崩本羊言之也禮云羽鳥曰降四足曰漬曰漬者謂死相瀐漬而善耗敗也六畜之死皆善耗敗而羊為甚故是詩如此要術曰羊有疾輒相汙徐鉉曰羊主給膳以瘦為病故羸從羊亦豕善肥羊善瘦故羸從羊也詩曰不騫為是故也易曰兊為羊羊性前止故兊為羊兊隂在上故也羊性前逆牛性前順故傳以為使堯牽一羊舜荷箠而隨之不能前矣又曰今使烏獲藉蕃從後曳牛之尾尾絶而不從者逆也若指之桑條以貫其鼻則五尺童子牽而周四海矣禮曰羊曰柔毛柔毛謂其不疾瘯蠡也詩曰羊牛下來先羊後牛者羊性畏露晚出而早歸常先於牛故也管子曰凡聽商如離羣羊凡聽角如雞登木以鳴音疾以清易曰兊為羊抑又以其聲歟內饔曰羊泠毛而毳羶犬赤股而躁臊蓋言羊泠毛而毳則羶犬赤股而躁則臊矣皆物之不可食者故於文臊從躁省羶從氈省也鄭氏以為泠毛而毳毳謂毛别聚氈不解者是也管子曰山高而不阤則祈羊至矣淵深而不涸則沈玉極矣或言羊或言玉相備也山海經曰縣以吉玉縣山祭也肆師立大祀用玉帛牲牷而今此山川更言玉者則以祈祭故也易林曰羊腸九縈舊説羊春夏早放秋冬晚出字説曰羊大則充實而美美成矣則羊有死之道焉老子曰天下皆知美之為美斯惡已牛孔子曰牛羊之字以形舉也牛象角頭三封尾之形牛土畜也馬火畜也土緩而和火性健決躁速故易坤為牛乾為馬詩曰爾牛來思其耳濕濕濕濕言潤澤也蓋牛之為物病則耳燥安則溫潤而澤故古之視牛者以耳祭義所謂大夫袒而毛牛尚耳是也抱朴子曰鴈銜蘆而捍網牛結陳以却虎牛善角虎環其首外觸則虎雖猛巧不能制也傳曰禘郊之牛角繭栗宗廟之牛角握社稷之牛角尺詩曰殺時犉牡有救其角救長貌社稷之牛角尺故曰有救其角也舊云牛相壁堂欲濶膺廷欲廣豪筋欲就雋骨欲垂插頸欲髙排肋欲密尾不用至地頭不用多肉角欲得細身欲得圓眼欲得大口方易飼鼻廣易牽倚欲如絆馬行欲如羊形欲如卷懸蹄欲如八字亂睫好觸龍頸突目好跳毛拳角冷有病毛少骨多有力岐胡有夀常有似鳴有黃禮云牛曰一元大武六牲之號牛曰一元大武號最為美者牛大牲故也管子曰凡聽官如牛鳴窖中牛含宫聲故栁子以為黃鍾在脰也周官曰牛夜鳴則庮許叔重曰庮久屋朽木牛夜鳴則庮臭如朽木也牛膏曰香故其臭朽則不可食矣列子曰饗香以為朽嘗甘以為苦戎右曰贊牛耳桃茢牛耳無竅以鼻聽也盟者聽於人神故執牛耳而正以不聽為戒焦贛易林曰牛龍耳聵蓋龍亦聾者也先儒以為靣牛鼓簧為聾故也造化權輿云夫乾為馬坤為牛乾陽物也馬故蹄圓坤隂物也牛故蹄坼陽病則隂勝故馬疾則卧隂病則陽勝故牛疾則立馬陽物也故起先前足卧先後足牛隂物也故起先後足卧先前足世之學者以為坤牛取順乾馬取健蓋知其一而已封人曰凡祭祀飾其牛牲即莊子所謂衣之以文繡者也鄭氏以為飾謂刷治潔清之誤矣楚子曰君處北海寡人處南海唯是風馬牛不相及也按牛走順風馬走逆風牛馬風逸往往相及楚是以云爾又舊説正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人日占其日以知其登耗所謂人日以此埤雅卷三
