body:
  text: 欽定四庫全書埤雅卷八宋陸佃撰釋鳥燕翬雉鷮雉黃鳥鶖斫木鸒鴳鶻隼鶩桃蟲鶉燕烏鸞鳯燕九章算術曰五雀六燕飛集于衡衡迥平一雀一燕飛而易處則雀重而燕輕今其疑此一字誤書已己字上宜有戊字其日皆土故燕之往來避社而嗛土不以戊巳籋口布翅枝尾齊人呼鳦蓋取其鳴自呼故曰鳦也一名玄鳥蓋取其色之玄故曰玄鳥也一名鷾鴯莊周所謂鷾鴯者也鳥莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走其畏人也而襲諸人間此燕安之道也故其字又為燕安之燕詩曰鳬鷖在涇公尸來燕來寧燕與鳬鷖皆有安樂之義故其序以為太平之君子能持盈守成神祇祖考安樂之也詩曰天命玄鳥降而生商言天命玄鳥下而生商故簡狄吞其卵而生契淮南子曰契生於卵此之謂也又曰燕燕于飛差池其羽燕燕于飛頡之頏之燕燕于飛下上其音差池其羽言其羽相與差池頡之頏之言其飛一上而一下下上其音言其鳴一下而一上禽經曰烏向啼背棲燕背飛向宿背飛頡頏是也述異記曰燕之千年生胡髯天玄主物簿云戴玉之鵲巢於竹與燕同羣蓋燕能識實元官太仙書云夏小正曰玄鳥至至者入人室屋也一曰衡為鵲虛為燕翬雉釋鳥云伊洛而南素質五采皆備成章曰翬又云鷹隼醜其飛也翬言其鼓翅翬翬然疾故曰翬也翬雉之翬生於翬故詩曰如鳥斯革以言其勢之鶱揚如翬斯飛以言其文之奐散一曰革宜讀如希革之革言其覆之潔齊也宫室之浙自其四中視之則如跂斯翼自其四角視之則如矢斯棘自其上視之則如鳥斯革自其下視之則如翬斯飛左傳曰五雉為五工正翬其一也翬蓋中央之雉南方曰東方曰鶅北方曰鵗西方曰鷷鷮雉薛綜曰雉之健者為鷮尾長六尺字説曰從喬尾長而走且鳴則其首尾喬如也鷮走且鳴行止不能自舍女有取節爾故詩以為淑女之譬而又與鷩冕之義異也詩曰依彼平林有集維鷮言王后無妬忌之行險詖之心能庇其所賴而淑女從焉則如平林之集鷮雉也夫雖等雉也類有不同則其取以擬象亦因以異若王后翬衣夫人揄翟公之服自鷩冕而下是也鷮又下鷩一等故此取況衆妾傳曰四足之美有麃兩足之美有鷮説文以為雉有十四種字或從弟以此故也禽經曰火為鷮亢為鶴黃鳥黃栗留也一名倉庚一名皇齊人謂之摶黍亦或謂之黃袍常椹熟時來在桑間故里語曰黃栗留看我麥黃椹熟亦是應節趨時之鳥也凡詩言黃鳥者興也言倉庚者賦也詩曰倉庚于飛熠耀其羽此賦男女之得以及時而已蓋倉庚鳴於仲春其羽之鮮明在夏則其鳴喈喈者昏姻之時也熠耀其羽非昏姻之時矣以言得及男女之時而已故其序曰四章樂男女之得及時也詩曰綿蠻黃鳥止于丘阿道之云逺我勞如何綿蠻黃鳥止于丘隅豈敢憚行畏不能趨綿蠻黃鳥止于丘側豈敢憚行畏不能極我勞如何即所謂不忘微賤畏不能趨畏不能極則又以言其不遺微賤也黃鳥亦名黎黃其色黎黑而黃也鳴則蠶生詩曰春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑蓋為是也韓子曰以鳥鳴春以蟲鳴秋以鳥鳴春若黃鳥之類其善鳴者也隂陽運祚推移時至氣動不得不爾故先王以候節令倉庚鳴是也蓋立春之節初五日東風解凍次五日蟄蟲始振後五日魚上冰次雨水氣初五日獺祭魚次五日鴻鴈來後五日草木萌動次仲春驚蟄之節初五日小桃華次五日倉庚鳴後五日鷹化為鳩次春分氣初五日玄鳥至次五日雷乃發聲芍藥榮後五日始電次季春清明之節初五日桐始華次五日田鼠化為鴽牡丹華後五日虹始見次穀雨氣初五日萍始生次五日鳴鳩拂其羽後五日戴勝降于桑凡此六氣一十八候皆春陽布發生之令立夏之節初五日螻蟈鳴次五日蚯蚓出後五日赤箭生次小滿氣初五日吳葵華次五日靡草死後五日小暑至次仲夏芒種之節初五日螳螂生次五日鵙始鳴後五日反舌無聲次夏至氣初五日鹿角解次五日蜩始鳴後五日半夏生次季夏小暑之節初五日溫風至次五日蟋蟀居壁後五日鷹乃學習次大暑氣初五日腐草為螢次五日土潤溽暑後五日大雨時行凡此六氣一十八候皆夏氣揚蕃秀之令立秋之節初五日涼風至次五日白露降後五日寒蟬鳴次處暑氣初五日鷹乃祭鳥次五日天地始肅後五日禾乃登次仲秋白露之節初五日鴻鴈來次五日玄鳥歸後五日羣鳥養羞次秋分氣初五日雷乃收聲次五日蟄蟲坯户景天華後五日水始涸次季秋寒露之節初五日鴻鴈來賔次五日雀入大水為蛤後五日菊有黃華次霜降氣初五日豺乃祭獸次五日草木黃落後五日蟄蟲咸俯凡此六氣一十八候皆秋氣正收斂之令立冬之節初五日水始冰次五日地始凍後五日雉入大水為蜃次小雪氣初五日虹藏不見次五日天氣騰地氣降後五日閉塞而成冬次仲冬大雪之節初五日鶡鴠不鳴次五日虎始交後五日荔挺出次冬至氣初五日蚯蚓結次五日麋角解後五日水泉動次季冬小寒之節初五日鴈北鄉次五日鵲始巢後五日雉始雊次大寒氣初五日雞始乳欵冬華次五日鷙鳥厲疾後五日水澤腹堅凡此六氣一十八候皆冬氣正養藏之令鶖鳬鴈醜翁鶖鶴醜鷩鶖性貪惡今俗呼秃鶖一名扶老狀如鶴而大長頸赤目其毛辟水毒頭高八尺善與人鬬好啖蛇詩曰有鶖在梁有鶴在林言鶖宜在梁鶴宜在林各有所宜也劉楨魯都賦曰緑鷁蔥鶖鶖色蓋青也斫木釋鳥云鴷斫木郭璞曰口如錐長數寸常斫木食蟲因名云者是也淮南子曰貍頭愈鼠雞頭已瘻虻散積血斫木愈齲此類之推者也膏之殺鱉鵲矢中蝟爛灰生蠅漆見蟹而不乾此類之不推者也説文曰齒蠧也以類相攝故斫木愈之俗言此鳥善為禁法能曲爪畫地為印則穴之塞自開飛輒以翼墁之今鼠竊用其印以發扄鑰舊云鴷鳥取蠧於深以舌銛之舌長於咮杪有針刺異物志曰舌長五寸此鳥有大有小有褐有斑褐者是雌斑者是雄又有青黑者頭上有紅毛生山中土人呼為山斫木大如鵲五姓祕要曰相山之法欲如生蛇之渡水又欲如斫木之飛翔生蛇渡水取其詰屈斫木飛翔取其一高一下鸒釋鳥云鸒斯鵯鶋郭璞曰雅烏也小而多羣腹下白小爾雅云不反哺者謂之雅烏詩曰辨彼鸒斯歸飛提提言鸒斯烏之不能反哺者尚能歸飛以從其類而不失辨樂今已曽反鸒之不如也法言曰頻頻之黨甚於鸒斯亦賊夫糧食而已矣鸒斯賊夫糧食以衆故也方言曰齊宋之間凡物盛多謂之冦郭注曰今江東有小鳬其多無數俗謂之冦鳬東都賦曰鵯鶋秋棲鶻鳩春鳴今衆鳥秋分多羣集非特烏也然至春分輒兩兩而翔不復羣矣里俗謂之分羣月令仲秋曰羣鳥養羞豈謂是乎鴳鴳鴽屬也其品中膳羞內則所謂雉兔鶉鴳是也莊子曰窮髮之北有鳥焉其名為鵬摶扶搖羊角而上者九萬里然後圖南且適南冥也斥鴳笑之曰我騰躍而上不過數仞而下翶翔蓬蒿之間此亦飛之至也此言大小雖殊安於至足則其於逍遙一也故雖斥鴳之卑無羡雲鵬而榮願有餘矣蓋周之書方祛羡欲之纍因言鵬翼彌大而所以笑之者愈小故前曰蜩與鸒鳩笑之後曰斥鴳笑之也鴳不木處安矣故謂之鴳然又不如燕之燕也白虎通曰一穀不升撤鶉鴳二穀不升撤鳬鴈三穀不升撤雉兔夢書曰鶉鴳為鬬夢見鶉鴳憂鬬辨也一曰鴳亦雀屬所謂鴳上有尺是也鶻鶻拳堅處大如彈丸俯擊鳩鴿食之鳩鴿中其拳隨空中即側身自下承之捷於鷹隼傳云擊鳥先高搏鷙之勢也舊言鶻有義性杜甫所賦義鶻行是也冬撮鳥之盈握者夜以燠其爪掌左右易之旦即縱之令去其往東矣則是日也不東嚮搏物南北亦然蓋其義性有擒有縱如此李雍鶻賦所謂營全鳩以自暖乃詰朝而見釋是也假氏云鶻生三子一為鴟禽經曰鸛生三子一為鶴鳩生三子一為梟造化權輿曰鷹鶚之子或為雕鷢夏雀生鶉楚鳩生梟由是觀之以瞽瞍為父而有舜以舜為兄而有象豈足異哉隼禽經曰鷹好跱隼好翔鳬好沒鷗好浮隼鷂屬也一名雀鷹蓋迅疾之鳥詩曰鴧彼飛隼載飛載止言隼於可飛則飛於可止則止又曰鴧彼飛隼載飛載揚言隼無所定止也又曰鴧彼飛隼率彼中陵言中陵安靜中正此隼之所以率也蓋宣王無海之道故諸侯有沔水之流縱宣王無陵之德故諸侯有隼之散揚虎之搏噬擬隼之搏噬準故準於文從水從隼今鷹之搏噬不能無失獨隼為有準故其每發必中而古之制字者以此法言曰麟之儀儀鳯之師師其至矣乎螭虎桓桓鷹隼䎒䎒未至也言若鷹隼攫撮急疾則是右武而已非所以語至也司常曰鳥隼為旟蓋鳥鳯也畫鳯以象其德畫隼以象其威化書曰烏反哺仁也隼憫胎義也蓋隼之擊物遇懷胎者輒釋不戮也或曰隼􅋧鳥也即今所呼為鶻者是字説云􅧭屰上鴟氏取隼致一􅢟與也鴿合也鵲黑白錯鷼黑白間禽經曰鷹以鷹之鶻以搰之隼以尹之鶩釋鳥云舒鳬鶩雕鶚醜善立鳬鶩醜善趨尸子曰野鴨為鳬家鴨為鶩不能飛翔如庶人守耕稼而已周官庶人執鶩工商執雞工商欲其知時又上之所畜也故執雞庶人雖亦上之所畜欲其不散遷而已故執鶩鄭玄曰鶩取其不飛遷説苑曰鶩無他心故庶人以為摯鶩一名鴨蓋自呼其名曰鴨也或曰雞可系故謂之雞鴨可押故謂之鴨徐鍇曰鳥之孚卵皆如其期不失信也亦鳥以爪覆護其卵愛之誠至也今雞鶩孚卵雞二十日而化鶩三十日而化皆如其期也物類相感志云雞鶩伏卵忌磨若聞礱磨之聲則不生矣曲禮曰庶人之摯匹匹鶩也鶩不散遷而又乘匹不妬故或謂之匹也今雄雞能鳴其雌不能鳴雌鶩能鳴其雄不能鳴蓋類之不可推也廣雅曰􅵒鴄􅝶也鶩音木質木故也蓋鶉性醇鶩性木桃蟲釋鳥云桃蟲鷦其雌鴱陸璣曰今鷦鷯是也似黃雀而小化而為雕故俗語曰鷦鷯生雕説苑曰鷦鷯巢於葦苕繫之以髮鳩性拙鷦性巧故鷦俗呼巧婦一名工雀一名女匠其喙尖利如錐取茅秀為巢巢至精密以麻紩之如刺襪然故又一名襪雀其化輒為雕鶚蓋鳥之始小終大者詩曰肇允彼桃蟲拚飛維鳥言成王懲管蔡之亂於是始信小物之能成大不敢不毖也鶉鶉無常居而有常匹故尸子曰堯鶉居莊子曰聖人鶉居而鷇食詩曰鶉之奔奔鵲之疆疆奔奔鬬也疆疆剛也言鶉不能亂其匹鵲不能淫其匹故序云衛人以為宣薑鶉鵲之不若也一章曰我以為兄兄女兄也二章曰我以為君君女君也故曰刺宣薑也曰兄者娣刺宣薑之詞曰君者妾刺宣薑之詞詩曰不狩不獵胡瞻爾庭有縣鶉兮鶉小物也以言在位貪鄙小禽尚公之如此莊子曰吾未嘗為牧而牂生於奧未嘗好田而鶉生於宎若勿怪何邪俗言此鳥性淳憃不越橫草所遇小草橫其前即旋行避礙名之曰淳以此亦其性淳之易熟故曰鶉也筆談曰古人取象不必大物天文家朱鳥乃取象於鶉故南方朱鳥七宿曰鶉首鶉火鶉尾是也鶉有兩種有丹鶉有白鶉此丹鶉也色赤黃而又鋭上秃下夏出秋藏飛必附草皆火類也或有魚所化者魚鱗蟲龍類火之所自生也天文東方蒼龍七宿有角有亢有尾南方朱鳥七宿有喙有嗉有翼而無尾此其取象於鶉歟燕烏釋鳥曰燕白脰烏廣雅云純黑而反哺者謂之烏小而腹下白不反哺者謂之雅烏白項而羣飛者謂之燕烏燕烏白脰烏也雅烏鸒也鸞説文云赤神靈之精也赤色五采雞形鳴中五音頌聲作則至一曰青鳯為鸞孔頴逹曰燕雀有啁噍之感鸞鳯有歌舞之容是也鸞雌曰和雄曰鸞禮云在輿則聞鸞和之音蓋取諸此乘車和在衡鸞在軾而輶車置鸞於鑣異於乘車者驅逆之車則尚輕疾故也庭燎之詩一章曰鸞聲將將二章曰鸞聲噦噦將將大聲聲大則近故也噦噦小聲聲小則逺故也郊特牲曰割刀之用而鸞刀之貴貴其義也鸞刀刀有鸞者也以言割牲中節而和蓋易曰利者義之和也利物足以和義先王寓之於禮則刀之所以有鸞也又曰君子黃中通理正位居體美在其中而暢於四支發於事業美之至也先王寓之於禮則瓉之所以有鬯也鸞取和鬯取暢在易則為道在禮則為器其義一也舊云鸞血作膠可以續弓弩琴瑟之弦或曰鸞鳯之亞也鸞善歌鳯善舞山海經曰鸞鳥自歌鳯鳥自舞鸞始生類鳯久則五采變易當上古時鸞輿順動此鳥輒集車上雄鳴於前雌應於後後世不能致作和鸞以象之因謂之鸞仗葬書曰若龍若鸞或鶱或盤言山形若龍之盤伏鸞之鶱翔也故曰玄武垂頭朱雀翔舞青龍蜿蜒白虎蹲踞鳯鳯神鳥也俗呼鳥王羽蟲三百六十而鳯為之長鴻前麟後蛇頸魚尾鸛顙鴛思龍文龜背燕頷雞喙五色備舉出於東方君子之國翶翔四海之外過崑崙飲砥柱濯羽弱水莫宿風穴見即天下大安寧夫文凡鳥為鳯鳯總衆鳥者也古文作象形蓋四靈唯鳯能鳩其類故以為朋黨之字同門曰朋其類不一所從者一而已首文曰德翼文曰禮背文曰義膺文曰仁腸文曰信王文公曰鳯鳥有文河圖有畫非人為也舊云鳯皇其翼若干其聲若簫不啄生蟲不折生草不羣居不旅行不罹羅網非梧桐不棲非竹實不食非醴泉不飲詩曰鳯皇鳴矣于彼髙岡梧桐生矣于彼朝陽此之謂也一説東方曰發明南方曰焦明西方曰鷫鷞北方曰幽昌中央曰鳯皇按師曠禽經曰青鳯謂之鶡赤鳯謂之鶉黃鳯謂之焉白鳯謂之鷫紫鳯謂之鷟又曰乾臯斷舌則坐歌孔雀拍尾則立舞人勝之也鸞入夜而歌鳯入朝而舞天勝之也爾雅曰鶠鳯其雌皇鳯鳥之美者能君其類而知時雌則美而不大故曰其雌皇又龍乘雲鳯乘風故謂之鶠鶠偃也亦鳥偃服焉傳曰鳯鳥乘於風是也地理新書曰狀如豬鼠勿取鳯皇貴胸魚貴尾龜貴頭鱉貴背虎貴前馬貴脊牛貴領埤雅卷八
