body:
  text: 欽定四庫全書埤雅卷十宋陸佃撰釋蟲蟻蠅蠨蛸蠋蜂螽螣蛇蛇虺蚺蛇蝍蛆螢蟋蟀蛣蜣阜螽蟦蠐蛾蠁蝶莎雞蟻莊子曰道在螻蟻蟻有君臣之義故其字從豈亦或從義善鬬力舉等身鐵鬬輒酣戰不解有行列隊伍化書曰螻蟻之有君也一拳之宫與衆處之一粒之食與衆蓄之一罪無疑與衆戮之書曰王麻冕黼裳卿士邦君麻冕蟻裳黼裳明王於此斷恩而蟻裳則言以申君臣之義也詩曰鸛鳴于垤垤蟻冡也蟻將雨則出而壅土成峯鸛鳥見之長鳴而喜方言曰其場謂之坻亦或謂之垤垤從至以蟻之微而能為垤用其至故也今蟻取小蟲入穴輒壞垤窒穴蓋防其逸亦以窒雨易占所謂蟻封其穴大雨將至是也一名蟻封傳曰蟻封盤馬孟子曰泰山之於丘垤趙岐曰垤蟻封也今朔地蟻封其高大有如冡者所謂蟻冡蓋出於此莊子曰於蟻棄知於魚得計於羊棄意言慕人與使人慕之皆不可為也故至人之計在於物我兼忘其藏也不厭深眇而已矣又曰堯非有人非見有於人也故曰得時則蟻行失時則鵲起蟻行逶遲有序需而不速故君子之得時其廉於進如此夏小正曰玄蚼賁玄蚼也者蟻也方言曰梁益之間謂之玄蚼符子曰鼇之冠山蟻之戴粒其於逍遙一也此即南華鵬鴳之義言大小雖殊而理各至足豈容勝負於其間哉蠅蠅好交其前足有絞繩之象故繩之為字從蠅省準生於隼繩生於蠅其義一也亦好交其後足搖翅自扇故爾雅曰蠅醜扇也段氏云蒼蠅聲雄壯青蠅聲清聒其聲皆在翼又曰青蠅糞尤能敗物雖玉猶不免所謂蠅糞點玉是也蓋青蠅善亂色蒼蠅善亂聲故詩以青蠅刺讒而雞鳴曰匪雞則鳴蒼蠅之聲也一章曰蒼蠅之聲言耳聞疑而起也二章曰月出之光言目見似而起也青蠅首赤如火背若負金蒼蠅又其大者肌色正蒼今俗謂之麻蠅傳曰以氷致蠅蠅逐臭者懷蛆縈利常喜暖而惡寒故遇氷輒側翅逺引所謂夏蟲不可與語氷者也類從曰蠅生於灰蓋蠅值水溺死以置灰中須臾即活淮南子以為爛灰生蠅正此謂也張敞書曰蒼蠅之飛不過十步託於騏驥之髮則致千里此言附善之益有如此也蠨蛸釋蟲云蠨蛸長踦蕭梢長踦之貌因以名云郭璞曰今小蜘蛛長股者俗呼喜子亦如蜘蛛布網垂絲著人衣當有親客至荆州河內之人謂之喜母陸子曰乾鵲噪而行人至蜘蛛集而百事喜蓋謂是也詩曰蠨蛸在户蠋大蟲如指似蠶一名厄詩曰鞗革金厄金取其堅厄取其完也又曰蜎蜎者蠋蒸在桑野言蠋以絲自裹又久在桑野雖獨而已然其自營也完矣故詩以此託況序曰一章言其完也韓非子曰蟺似蛇蠶似蠋人見蛇則驚駭見蠋則毛起然婦人拾蠶而漁者握蟺故利之所在皆為賁育莊子曰奔蜂不能化藿蠋以言材之有大小故孟公綽為趙魏老則優不可以為滕薛大夫管子曰夫龍欲小則化為蠶蠋此言龍化為蠋而已然抱朴子以為有蛇蠋化成之龍意者天下有自然之龍有蛇蠋化成之龍乎故曰或生而知之或學而知之及其成功一也蜂蜂有兩衙應潮其主之所在衆蜂為之旋繞如衛誅罰徵令絶嚴有君臣之義化書曰蜂有君禮也其毒在尾垂頴如鋒故謂之蜂傳曰蜂蠆垂芒此之謂也詩曰莫豫荓蜂自求辛螫荓使也荓蜂使人為辛螫之譬也言蜂善辛螫藏精育毒雖小不可不慎採取百芳釀蜜其房如脾今謂之蜜脾其王之所居疊積如臺語曰蜂臺蟻樓言蜂居如臺蟻居如樓也一名蠟蜂蠟生於蜜而天下之味莫甘於蜜莫淡於蠟蓋厚於此者必薄於彼理之固然也西方之書曰味如嚼蠟舊説蜂之化蜜必取匽豬之水注之蠟房而後蜜成故謂之蠟者蜜之跖也方言曰其大而蜜謂之壺蜂即今黑蜂蓋亦釀蜜楚辭所謂赤蟻若象玄蜂若壺者也黃蜂亦其一種無蜜纎長其窠仰綴於屋銜漆以固其蒂隂陽在尾喜合末端有岐者牝鋭者牡也爾雅曰蜂醜螸螸垂腴也一名萬其字象形蓋蜂類衆多動以萬計故借為萬億之萬舊説數人以千數物以萬莊子所謂號物之數謂之萬也抱朴子曰雞有專棲之雄雉有擅澤之驕蟻有兼弱之智蜂有攻寡之計援理觀之人之強弱相制衆寡相役何以異此是故齊與魏閧而莊周以為戰於蝸角也束晳發蒙記曰蠅生積灰蜂出蜘蛛自然論曰蜂無王而盡死螽螽斯蟲之不妬忌一母百子者也故詩以為子孫衆多之況鵲巢言夫人德如鳲鳩能均養七子而已是詩乃稱后妃之子孫衆多如此者蓋太姒則百斯男文王之所以聖也文王之所以聖者天道也召南則人道而已何足以與此華封人曰祝聖人多男子堯曰辭多男子則多懼華封人曰始也我以汝為聖人邪今然君子也螽斯一名舂黍亦或謂之舂箕草木疏云蝗類青色長角長股股鳴者也或曰似蝗而小股黑有文五月中以兩股相切作聲聞數步者是也詩曰五月斯螽動股言螽斯股成而奮迅之也爾雅曰螽醜奮蓋於是時股成而奮迅之則方春尚弱也故列子以為臣力折春螽之股堪秋蟬之翼蔡雍月令曰其類乳於土中深埋其卵江東謂之蚱蜢善害田稚公羊曰􅏑何以書記災也蜮何以書記異也字蓋從冬冬終也至冬而終故謂之螽魯十月而有螽孔子曰火伏而後蟄者畢今火猶西流再失閏也螣蛇螣蛇龍類也雄鳴於上風雌鳴於下風而風化能興雲霧而遊其中慎子曰螣蛇遊霧飛龍乘雲雲罷霧除與蚯蚓同失其所乘故也螣蛇能騰蟲之自勝者也荀子曰螣蛇無足而飛梧鼠五枝而窮言梧鼠之技雖多不如螣蛇結於一也鬼谷子曰分威法伏熊實意法螣蛇實意言致一也螣蛇一名神蛇亦曰靈蛇墨子曰靈龜近灼神蛇近暴傳曰靈蛇棄鱗神龍解角以言至人達士超世拔俗委蛻萬物之上抱朴子曰兔不牝牡螣蛇不交不可謂貞今孔雀以影相接而孕又雌見雄舞而有子皆物性自然也隂陽自然變化論曰蛇聽而有孕白鷺視而有胎蛇魚屬連行蛇屬紆行詩曰委蛇蓋取諸此左傳曰退食自公委蛇委蛇謂從者也衡而委蛇必折故序以言正直洪範三德一曰正直中德也其行委蛇是以其德在剛柔之中大史曰大直若屈道固委蛇有是哉此之謂也舊説蛇盤常向壬地壬北方也周官曰龜蛇為旐先儒以為龜蛇象其捍難避害龜甲者也而蛇擊前則尾應擊後則首應自腰擊之則首尾俱應有兵之象故龜蛇合體謂之玄武易曰一隂一陽之謂道而玄朔者道之所在隂陽之理具焉故物有玄龜纁蛇臟有左腎右命方有朔有北器有準有繩其為卦也名之曰習坎習猶重也舊説牛以鼻聽蛇以眼聽語曰蛇聾虎齆其以此乎莊子曰蛇憐風風憐目目憐心其言蓋展轉輕妙述異記曰凡珠有龍珠龍所吐也蛇珠蛇所吐也語曰蛇珠千枚不如一玫瑰言蛇珠賤也變化序曰鵠之為猿蛇之為鱉一曰麋鹿易蹄蛇類易皮鱉類易殼稽聖賦曰蛇曉方藥鴆善禁呪蓋鴆能禁呪大石使起取蛇食之其禁石時舉翅行前却如道士禹步則石起也按十二子辰為龍已為蛇已六陽具不為龍而為蛇者龍至此而亢故也宜為蛇而已故曰亢之為言也知進而不知退知存而不知亡知得而不知喪虺虺狀似蛇而小銘曰為虺弗摧為蛇奈何以此故也正月之詩曰哀今之人胡為虺蝪虺一名蝮博三寸首大如擘舊説蝮蛇怒時毒在頭尾螫手則斷手螫足則斷足蛇之尤毒烈者也一曰蝮與虺異虺如土色所在有之蝮蛇鼻反其上有針錦文衆蛇之中此獨胎産生輒圻副母腹亦有與地同色者段氏云凡禽獸必藏形匿影同於物類是以蛇色逐地茅兔必赤鷹色隨木字説曰蛇螫人也而亦逃人也是為有它蝮觸之則復其害人也人亦復焉舊云鴆食此類鳥似鷹而紫黑喙長七八寸作銅色食蛇蛇入口即爛屎溺著石石亦為之爛其轉巨石作法亦如鸛鳥禹步然羽翮有毒以櫟酒飲之殺人惟犀角可以解故有鴆處必有犀也蚺蛇大蛇可食尾圓無鱗身有斑文如故暗錦纈難死似鼉行地常俯其首膽隨日轉上旬近頭中旬在心下旬近尾南人云俗取其膽以充藥材即以線合其瘡縱之後遇捕者輒自見金瘡以明無膽亦其知也南越志曰蚺蛇牙有長五六寸者土人重之云辟邪利逺行也一云蚺蛇之膽取而還生又云巴蛇吞象蚺蛇吞鹿蝍蛆爾雅曰蒺藜蝍蛆廣雅曰蝍蛆蜈蚣性能制蛇卒見大蛇便緣而啖其腦莊子曰蝍蛆甘帶是也今俗謂之百足魯連子曰百足之蟲三斷不蹶則其所持者衆也故曰諸侯有爭臣五人雖無道不失其國一名蚿方言曰馬蚿北燕謂之蛆蟝其大者謂之馬陸莊子曰夔憐蚿蚿憐蛇言夔以少而羡多蚿以有而羡無此非造極之言蓋蛇無足亦足夔一足亦足蚿百足亦足豈容歆羡於其間哉一名商距莊子曰使蚉負山商距馳河三教珠英曰蜈蚣見蛇能以氣禁之蓋土勝水故蝍蛆搏蛇舊説蟾蜍食蝍蛆蝍蛆食蛇蛇食蟾蜍三物相值莫敢先動是亦騎虎之義不得下也螢夜飛腹下有火故字從熒省熒小火也月令季夏曰腐草為螢不言化者不復為腐草也後世屠者饜於藜藿而市扇者常苦暍傳曰螢戴火而寒有是哉秋隂數雨螢火夜飛之時一名挾火一名據火一名熠耀詩曰熠耀宵行今西北多螢大者如棗行而有光正曰宵行以此故也毛詩傳曰熠耀磷也磷螢火也先儒以為老槐生火久血為磷磷非螢火誤矣蓋磷者火之微名故此兩者通謂之磷爾雅曰螢火即照磷也古今注亦以為螢食蚊蚋一名夜光一名宵燭一名磷然則磷亦螢火明矣崇有論曰鳥無胃而生螢無胃而育一説螢非熠耀熠耀行蟲爾今卑濕處有蟲如蠶蠋尾後載火行而有光俗謂之熠耀蟋蟀隂陽率萬物以出入至於悉􅢊帥之為悉蟋􅢊能帥隂陽之悉者也似蝗而小善跳正黑有光澤如漆一名蛬一名促織語曰促織鳴懶婦驚曺奢而茍唐儉以勤故詩一以蜉蝣一以蟋蟀刺之詩曰蟋蟀在堂嵗聿其莫蟋蟀在堂九月之時也九月建戌於文禾千為年步戌為嵗蓋年取禾之一熟而歲騎兩稔故步戌至戌謂之歲也一章曰職思其居言於行思其居也二章曰職思其外言於內思其外也三章曰職思其憂言於樂思其憂也詩序所謂憂深思逺有堯之遺風者此也詩曰十月蟋蟀入我牀下言蟋蟀微物也猶知隨時可以人而不如乎故曰物有微而志信人有賤而言忠也傳曰蟋蟀之蟲隨隂迎陽一名吟蛬秋初生得寒乃鳴詩義問曰蟋蟀食蠅而化蛣蜣蛣蜣一名蜣蜋爾雅所謂蛣蜣蜣蜋是也衝波傳曰蛣蜣無鼻而聞香黑甲翅在甲下五六月之間經營穢場之下車走糞丸一前挽之一後推之若僕人轉車久之輒羽化如尸解仙去也莊子曰蛣蜣之知在於轉丸夫以蜘蛛蛣蜣之知而猶能布網轉丸則萬物付之自然各有能矣此列莊之徒所以欲攦工倕之指也淮南子曰周鼎著倕使銜其指以明大巧之不可為正為是爾抱朴子曰玄蟬潔飢不羡蜣蜋穢飽故回之簞瓢有以輕猗頓之富也古今注曰一名弄丸阜螽今謂之􅪁䗥示跳示飛飛不能逺青色爾雅曰蛗螽蠜草蟲負蠜蓋草蟲鳴阜螽躍而從之故阜螽曰蠜草蟲謂之負蠜也詩曰喓喓草蟲躍躍阜螽言大夫妻求而往疾於聽從如此杕杜之詩亦云者蓋言赫赫南仲薄伐西戎故從役之大夫婚姻得以及時如召南之世也夫豈特大夫而已蓋其下者歸亦以時得及婚姻祭祀耕蠶之事故曰春日遲遲卉木萋萋倉庚喈喈采蘩祁祁赫赫南仲玁狁于夷也一曰蚯蚓即負螽也亦以離應草蟲鳴于上風負螽鳴於下風而風化博物志云蜾螺亦取阜螽子呪而成已子蟦蠐爾雅曰蟦蠐螬蝤蠐蝎蓋蟦蠐一名螬蝤蠐一名蝎本草亦曰一名蟦蠐舊説蝤蠐生於木中內外潔白符子所謂石生金木生蝎是也蟦蠐在糞草中外黃內黑亦或謂之蠐螬列子所謂烏足之根為蠐螬是也蠐螬大者如足大指以背行乃駛於腳造化權輿云蛇豸腹竄蠐螬背行今俗謂之蠀螬方言曰蠀螬謂之蟦自關而東謂之蝤螬舊云蠐螬化為復育復育轉而為蟬蓋蟬之去復育龜之解甲蛇之脫皮可謂尸解矣三教珠英曰蒿成蠐螬蛾繭生蛾蛾生卵博物志曰食桑者有緒而蛾蛾類者先孕而後交蓋蛹者蠶之所化蛾者蛹之所化荀子曰蛹以為母蛾以為父是也蛹一名螝蛾一名羅孫炎爾雅正義以為螝即是雄蛹即是雌羅即是雄蛾即是雌蛾似黃蝶而小其眉句曲如畫故詩以譬莊薑碩人曰螓首蛾眉今一種善拂燈火夜飛謂之飛蛾一名慕光符子曰不安其昧而樂其明是猶文蛾去暗赴燈而死亦其類也與蟅而為牝牡蟅一名過街言逢申日則過街殆與鶝忌庚申燕避戊巳無異周人設官覆夭鳥之巢以方書十日之號十有二辰之號十有二月之號十有二歲之號二十有八星之號縣其巢上則去之言夭鳥見此五者而去良有以也變化論曰蝙蝠夜值庚申乃伏蠁爾雅曰國貉蟲蠁郭璞云今呼蛹蟲為蠁廣雅曰土蛹蠁蟲也蠁蓋蟲之知聲者也字從響省或曰蠁善令人不迷故從嚮也類從云帶蠁醒迷繞祠解惑是也説文亦云司馬説蠁從向舊説蠅於蠶身乳子既繭化而成蛆俗呼蠁子入土為蠅韓詩外傳曰齒如編蠁非此所謂蠁蟲也蝶蛺蝶粉翅有鬚一名胡蝶列子曰烏足之根為蠐螬其葉為胡蝶胡蝶胥也嘗見園蔬其葉有為蝶者三分二已蝶矣其一尚葉也干寶云稻成蛬麥成蛺蝶豈虛語哉續古今注曰龜鱉之類無雄蜂蝶之類無雌一説蜂蝶醜皆以鬚嗅鬚蓋其鼻也杜甫詩曰花蘂上蜂鬚以此今絡緯蟷蠰之類亦以其鬚當鼻爾莎雞小蟲黑身赤首一名莎雞一名樗雞一名天雞爾雅曰螒天雞蓋其鳴以時故有雞之號詩曰六月莎雞振羽言於是時莎雞羽成而振迅之也爾雅曰螽醜奮草木疏云如蝗斑色毛翅數重其翅正赤六月中飛而振羽索索作聲幽州人謂之蒲錯古今注曰莎雞一名絡緯謂其鳴如紡緯也促織一名投機謂其聲如急織也俗云絡緯雄鳴於上風雌鳴於下風而風化埤雅卷十
