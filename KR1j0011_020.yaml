body:
  text: 欽定四庫全書埤雅卷十一宋陸佃撰釋蟲蠶蜘蛛蚇蠖螳蜋蜉蝣蝤蠐蠓螟螗寒蜩蟪蛄蜮蛜蝛蚯蚓果臝螻蛄蜻蝏蚊鼠易蠶蠶陽物也惡水食而不飲淮南子曰蠶食而不飲蟬飲而不食蜉蝣不食不飲再蠶謂之原蠶一名魏蠶今以晚葉養之先王之法禁焉淮南子曰原蠶再登非不利也然王者之法禁之為其殘桑也鄭云蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁原蠶者為害馬歟然則原蠶有禁非特欲以護桑又以害馬故也今蠶負馬迹亦其驗歟里俗謂之夏蠶亦曰熱蠶亦曰晚蠶自世衰道微先王之禁不行而民間一嵗至有三蠶者矣是以桑弱而馬耗也蠶書曰飼蠶勿用雨露濕葉蓋蠶性惡濕故禮云桑于公桑風戾以食之也今俗飼蠶以葉洒之欲其勻厚故古者王親耕三推而止王后親蠶三洒而止舊云蠶之所吐為忽十忽為絲五絲為䌰十絲為升二十絲為緎四十絲為紀八十絲為總詩曰素絲五緎又曰五總其絲之數蓋如此太𤣥曰紅蠶縁于枯桑其繭不黄蓋蠶足於葉三俯三起二十七日而蠶已老則紅故謂之紅蠶紅蠶以繭自衣亦或謂之室易林曰飢蠶作室是也爾雅釋蟲曰蟓桑繭雔由樗繭棘繭欒繭蚢蕭繭蜘蛛論衡曰蜘蛛結絲以網飛蟲人之用計安能過之亦掃其網置衣領中令人知巧辟忘世云蜘蛛布網如罾其絲右繞令磨旋蔓生皆循右而轉亦自然之理也易曰作結繩而為網罟以佃以漁蓋取諸離重門擊柝以待暴客蓋取諸豫説者又以謂放蜘蛛而結網法螺蚌而閉户則古之知者創物其兼取愽矣蓋昔者聖人之作易也既曰仰觀於天俯察於地而又觀鳥獸之文與地之宜則所謂取才於物雖非所以先者然亦豈可少哉字説曰設一面之網物觸而後誅之知誅義者也蚇蠖蚇蠖屈伸蟲也一名蝍􅠸又呼步屈方言曰蝍􅠸謂之蚇蠖賦曰龍伸蠖屈蠖屈蓋將以求伸也易曰尺蠖之屈以求信也言以屈道致伸漢志曰尺者蒦也蠖之義蓋取諸尺蚓之義蓋取諸引引者伸也蒦於尺伸於引今人布指求尺一縮一伸如蠖之步謂之尺蠖豈放是乎亢桑子曰夫俗隨國政之方圓猶蚇蠖之於葉也食黄則身黄食蒼則身蒼蚇蠖似蠶食葉老亦吐絲作室舊説蚇蠖之繭化而為蝶此猶蛹之變蛾爾賦曰蟭螟飛而生風蚇蠖動而成響言屋之空曠深静易以生風荅響如此詩曰噲噲其正噦噦其冥是也螳蜋螳蜋有斧蟲也兗人謂之拒斧其臂如斧奮之當轍不避莊子所謂猶螳蜋之怒臂以當車轍者也一名不過以此爾雅曰不過蟷蠰其子蜱蛸捕蟬而食執木葉以自蔽蟬將去而未飛為之一前一却莊子曰螳蜋執翳而搏之見得而忘其形葢謂是也世云螳蜋所執之翳可以蔽形類從曰螳蜋之氣含之生火蚯蚓之塵背洒起霧未知其審月令曰螳蜋生蓋是月升隂始起殺蟲應而生焉孫炎爾雅正義云螳蜋深秋乳子至夏之初迺生是也亦生百子如螽斯云蜉蝣蟲似天牛而小有甲角長三四寸黄黒色甲下有翅能飛燒而噉之美於蟬也翕然生覆水上尋死隨流梁宋之間曰渠略叢生鬱棲中朝生暮殞有浮游之義故曰蜉蝣也詩曰蜉蝣掘閱麻衣如雪如雪以刺其奢而掘閱言掘土使解閱也管子曰掘閱得玉蓋言羔裘如膏則其好絜可知矣麻衣如雪則其好奢可知矣子曰麻冕禮也今也純儉夏小正云蜉蝣有殷殷衆也蜉蝣殷之時也言有有見也蝤蠐爾雅曰蝎蛣􅔒又曰蝤蠐蝎蓋蝎一名蝤蠐一名蛣􅔒佶屈曲貌以形舉也方言曰闗東謂之蝤蠐梁益之間謂之蝎詩曰領如蝤蠐蓋蝤蠐之體有豐絜且白者故詩以況莊姜之領七辯曰蝤蠐之領阿那宜顧是也化書曰燥濕相育不母而生蝤蠐此即木中蠧蟲亦曰桑蠧故古者譖從中起謂之蝎譖曹植籍田論曰昔三苗共工讙兠非堯之蝎歟齊之諸田晉之六卿魯之三桓非諸侯之蝎歟蠓小蟲似蜹亂飛者也一名醯雞列子曰醯雞生乎酒又曰食醯頤輅生乎食醯黄軌食醯頤輅即蠓是也孔子曰人之於道也其猶醯雞與微夫子之𤼵吾覆也吾不知天地之大全制字从蒙音謂之懵以此爾雅曰蠓蠛蠓孫炎注云蠛蠓此蟲微細羣飛郭璞亦曰蠓飛磑則天風舂則天雨此言蠛蠓將風則旋飛如磑一上一下如舂則雨矣然其圖贊又曰風舂雨磑二説不同也螟食心曰螟食葉曰蟘食節曰賊食根曰蟊爾雅所謂食苗心螟食葉蟘食節賊食根蟊許慎説文以為吏冥冥犯法即生螟乞貸則生蟘抵冒取民財則生蟊然則靈芝朱草秠秬之鍾其美與螟蟘之鍾其惡雖不同其繫王者之政一也淮南子曰枉法令即多蟲螟其以此乎蟘則蝗也蝗字从皇今其首腹皆有王字未燭厥理也或曰蝗即魚卵所化列子曰魚卵之為蟲葢謂是也俗云春魚遺子如粟埋於泥中明年水及故岸則皆化而為魚如遇旱乾水縮不及故岸則其子久閣為日所暴乃生飛蝗故詩曰衆維魚矣實維豐年説者以為隂陽和則魚衆多矣故豐年夢魚理或然也詩曰去其螟螣及其蟊賊無害我田穉苗而未秀為穉韓詩曰穉幼稼也蓋蟊賊螟蟘尤為穉禾之害字說云蟘食苗葉無傷於實若蟘可貸也賊食苗節賊苗蟊食根如句所植螟食心不可見螗螗一名蝘其首方廣有冠夏小正曰蜋蜩者五采具螗蜩者蝘是也俗呼胡蟬似蟬而小鳴聲清亮者江南謂之螗􅡻詩曰如蜩如螗如沸如羮言天下讙譁沸騰不安如此此序所謂無綱紀文章者也又曰菀彼柳斯鳴蜩嘒嘒言蜩與柳異類今蜩託䕃其上鳴聲嘒嘒則王之於已不如菀柳之餘亦芘其蜩也鄒陽栁賦以為蜩螗厲響蜘蛛吐絲蓋蟬得美䕃則其鳴聲尤清厲方言曰楚謂之蜩宋衛之閒謂之螗蜩陳鄭之閒謂之蜋蜩按詩云如蜩如螗則蜩與螗異實非一物蓋蜩亦蟬之一種形大而黑昔人啖之禮有雀鷃蜩范是也一名蟬為其變蛻而禪故曰蟬亦其通名蟬舎卑穢趨髙絜其禪足道也鹽鐵論曰以所不覩而不信若蟬不知雪也又況道常無所而不可覩者乎是故聞而不笑者寡矣故曰道無問無問問之是責空也舊説朽木化為蟬壞裙化為蝶腐菌化為蜂又曰蠶二十日而化蟬三十日而化寒蜩寒蜩似蟬而小青赤一名蜺一名寒蟬蔡邕月令云鳴則天涼故謂之寒蟬其生坼裂母背故釋蟲云翥醜罅蓋蟬善飛翥故謂之翥醜論衡曰蟬生於復育開背而出方言曰黑而赤者謂之蜺又曰􅣒謂之寒蜩寒蜩瘖蜩郭氏云按爾雅以蜺為寒蜩月令亦曰寒蟬鳴則知寒蜩非瘖者也寒蜩即今啞蟬啞蟬初瘖及得寒露冷風乃鳴故篘蕘論云秋風至而寒蟬吟正謂此也然則方言原其始故謂之瘖蟬今雌蟬亦啞陶隱居所謂啞蟬雌蟬也不能鳴者然與寒蜩初瘖又異矣又一種似蟬而小緑色北人謂之螓額廣且深即詩所謂螓首蛾眉是也蟪蛄廣雅云蟪蛄蟧蛁莊子曰朝菌不知晦朔蟪蛄不知春秋蟪蛄夏蟬也是故不知春秋按離騷曰蟪蛄鳴兮啾啾嵗暮兮不自聊則蟪蛄亦秋蟬矣一曰春生者死於夏夏生者死於秋故曰不知春秋也方言曰齊謂之螇螰楚謂之蟪蛄釋蟲云蜓蚞螇螰即此是也莊子音義以為此即楚辭所謂寒螿者也按風土記曰蟪蛄鳴於朝寒螿鳴於夕則寒螿蟪蛄又為兩物孔子曰違山十里蟪蛄之聲猶在於耳故政事莫如應之言政事惡譁而善肅以靜應之而已稽聖賦曰蠐螬行以其背蟪蛄鳴非其口按山海經有獸以其尾飛有鳥以其鬚飛則覆載之間負類反倫何所不有可勝言哉蜮蜮短狐也似鼈三足含水射人一曰含沙射人之影其瘡如疥稽聖賦所謂蛷旋於影蜮射於光是也一名射工一名溪毒有長角横在口前如弩檐臨其角端曲如上弩以氣為矢因水勢以射人故俗呼水弩春秋曰秋有蜮即此是也然畏鵝鵝能食之禽經所謂鵝飛則蜮沉鵙鳴則蛇結詩曰為鬼為蜮則不可得言鬼無形而蜮性陰害射人之影則皆莫可究矣五行傳曰南越淫惑之氣生蜮蜮之猶言惑也字説曰蜮不可得也故或之今蛷螋溺人之影亦是類爾造化權輿曰短狐射氣蛷螋遺溺中影則疾人氣數感之故也周官曰凡隙屋除其貍蟲貍蟲䗪蛷螋之屬蛷螋言搜而去之也亦言求而去之也蛜蝛詩曰伊威在室伊威甕器底蟲形似白魚而大爾雅曰伊威委黍一名鼠婦食之令人善淫術曰鼠婦淫婦是也亦曰鼠負陶隱居云鼠在坎中背則負之今作鼠婦如似乖理誤矣蓋鼠婦一名鼠姑亦或謂之鼠粘鼠婦猶鼠姑也鼠粘猶鼠負也因溼化生今俗謂之溼生蚯蚓考工記注云却行螾屬蚓土精也其為物不息引而後伸蝝善縁蚓善引蛤介合蠏介解蚓或从寅志曰引達於寅一名蜿蟺一名曲蟺一名土龍善長吟於地中江東謂之歌女亦曰鳴砌孟子曰若仲子者蚓而後充其操者也言若仲子之操則蚓而後可不可以入仁義之域月令云蚯蚓結言蚯蚓穴居首陽下嚮陽動則穴而上首故其身結而屈也傳曰魚無耳蟬無口蛇無足蚓無筋舊說蚯蚓土精無心之蟲與蛗螽交有一種白項是其老者也果臝即今細腰土蠭好禁蜘蛛説文云天地之性細腰純雄無子列子曰純雄其名穉蜂蓋其類也摙泥作房如併竹管取桑蟲負之七日而化為子其祝聲可聴法言曰祝之曰類我蓋其音云也莊子曰細要者化今呼大蠭啖子地中作房者亦曰土蠭非此細腰土蠭也果臝一名螉一名蒲盧中庸曰政也者蒲盧也化書曰嬰兒似乳母斯不逺矣螻蛄螻蛄臭蟲一名􅥿一名天螻夏小正曰􅥿則鳴􅥿天螻也孫炎爾雅正義以為􅥿是雄者喜鳴善飛雌者腹大羽小不能飛翔食風與土要以前甚澁要以後甚利類從曰磨鐵致蛄汗韉引兔蜄灰除蠧蛤陽去伏言物之相闗感有如此者法言曰狐貍螻螾不膢臘也與言若牛羊之用人則螻螾不膢狐貍不臘矣方言云螻螲謂之螻蛄周官曰馬黑脊而般臂螻先儒云螻蛄臭也傳所謂腥螻而不可饗膻惡而不可親蓋出於此一曰螻宜讀如螻蟻之螻吕子曰流水不腐户樞不螻螻者蟻也醫經以為狐貍螻蟻之餘勿食食之令人生瘻豈近是乎廣志小學篇曰螻蛄㑹稽謂之䗜蛄蜻蝏蜻蝏飲露六足四翼其翅輕薄如蟬晝取蚊䖟食之遇雨即多好集水上欵飛尾端亭午則亭名之曰蝏以此字或作蜓廷亦直也一名蜻蛉方言曰蜻蛉謂之蝍蛉淮南又呼䗧蛜亦曰䗓也造化權輿曰水蠆為䗓字説云蛉蜻蜓也動止常廷故又謂之蛉令出於廷者也古今註曰蜻蛉一曰青亭色青而大者是也賦云塗青蚨而還錢埋蜻蛉而變珠説者以為五月五日取其首正中門埋之皆成青珠故類從曰青蛉之首瘞而為珠也蚊説文云齧人飛蟲从䖵民聲亦或从昬以昬時出也俗云蚊有昬市葢蠅成市於朝蚊成市於暮傳曰聚蟁成雷謂其市之時也蟁民蟲䖟毗蟲田牧者病焉一曰䖟肓故謂之䖟揚子或問貨殖曰蚊蓋蚊之取利雖小然而善撓令人通夕不寐故雄以此託況説文曰秦晉謂之蜹楚謂之蚊蓋蜹喜亂飛似蚊而小望之如霧荀子所謂酸而蜹聚者也因雨而生與蚊實異一名瞀芮列子曰瞀芮生乎腐蠸蠸即黄甲小蟲一名輿父一名守𤓰爾雅云蠸輿父守𤓰鶡冠子曰一蜹噆膚不寐至旦半糠入目四方弗治言物茍為害不必在大蓋亦不在多也蚊性惡煙以艾熏之則潰長喙如針善螫鼠説文曰鼠穴蟲之緫名也象形行露之詩一章曰誰謂雀無角二章曰誰謂鼠無牙説者以為雀角以無為有鼠牙似是而非按雀角鼠牙皆言以無為有似是而非也蓋雀有咮而無角鼠有齒而無牙傳曰不思物變而推其類雀之穿屋似有角者又曰視墉之穿推其類可謂鼠有牙明鼠無牙者也夫雀之為物依人又晝動而無角在其首且所穿者屋事之易察也鼠之為物畏人又夜動而無牙在其口且所穿者墉事之難知也召南之初事之易察者至於獄而後明及其久也衰亂之俗已微貞信之教已興則雖事之難知者不待獄而明矣故於雀言獄鼠言訟也鼠一名䶆南陽呼鼠為䶆廣雅曰䶆鼠是也今一種鼠見人則交其前足而拱謂之禮鼠亦或謂之拱鼠詩曰相鼠有體人而無禮其或取諸此乎傳曰窮鼠齧貍蓋鼠窮則鬬也故兵法曰歸師勿遏圍師必闕鼷鼠有螫毒者甘口齧人及鳥獸皆不痛春秋所書食郊牛之角者也愽物志云鼠之最小者或云甘鼠是也莊子曰載鼷以車馬樂鴳以鐘鼓鼷小鼠也鴳小雀也傳曰稷蜂不熏社鼷不灌蓋其所託有如此者鼫鼠兔首似鼠而大能人立交前兩足而舞害稼者一名雀鼠廣雅云䶂鼠鼫鼠是也易曰晉如鼫鼠蓋晉進也順而麗乎大明柔進而上行今九以剛進處四失順而又麗乎隂則拂晉之道矣故曰進如鼫鼠無所守焉貪而畏人又比乎隂九四之象也碩大也詩序所謂貪而畏人若大鼠也且五之所以審錫而康四之所以貪竊而懼者亦豈有他哉五以柔進順而麗乎明四以剛進悖而麗乎暗故也鼬鼠健於捕鼠似貂赤黄色大尾今俗謂之鼠狼廣雅曰鼠狼鼬是也一名鼪莊子所謂騏驥驊騮捕鼠不如貍狌今栗鼠似之蒼黑而小取其毫於尾可以製筆世所謂鼠鬚栗尾者也其鋒乃健於兔栗鼠若今竹䶉之類蓋鼠食竹故曰竹䶉燕山録曰煮羊以䶉煮鼈以蚊言其性類相感省火易熟有如此者鼩鼠一名鼱鼩一名鼩似鼠而小東方朔曰譬猶鼱鼩之襲狗者也鼯鼠爾雅所謂鼯鼠夷由狀如小狐肉翅翅尾項脅毛皆紫赤色脚短爪長飛且乳者亦或謂之飛生或曰一名飛蠝其狀如兔而鼠首以其髯飛性食火煙能從髙赴下不能從下升髙禽經曰鴺鳥不登山鶮鳥不踏土鴺鳥不能從下上髙然則鶮之制字从髙鴺之从夷其義可知也荀子曰鼯鼠五技而窮即此是也馬融曰猨蜼晝吟鼯鼠夜呌舊説鼠性疑出穴多不果故持兩端謂之首鼠韓子曰狐鼠進退又鼠類最壽俗謂之老鼠是也若老鸛老鴟老烏之類以老稱亦如此爾雅曰東方有比目魚焉不比不行其名謂之鰈南方有比翼鳥焉不比不飛其名謂之鶼鶼西方有比肩獸焉與卭卭岠虛比為卭卭岠虛齧甘草即有難卭卭岠虛負而走其名謂之蟨北方有比肩民焉迭食而迭望中有枳首蛇焉此四方中國之異氣也按蟨鼠前而兔後趨則頓走則顛今契丹北境有跳兔前足纔寸許後足㡬一尺行則用足跳一躍數尺止則蹶然仆地即所謂蟨又有鳥鼠同穴者與鳥為雌雄似鼠而短尾鼠在内鳥在外杜甫詩曰水落魚龍夜山空鳥鼠秋魚龍水名鳥鼠山名亦鳥鼠秋而魚龍夜是詩兩句而含三事也易説文曰蜥易蝘蜓守宮也象形愽物志云以朱飼之其體盡赤擣之萬杵以點女人終身不滅如赤誌偶則落故曰守宮也周易之義疑出於此取其隂陽構合而易一曰蜥易日十二時變色故曰易也舊説蜥易嘔雹蓋龍善變蜥易善易故乾以龍況爻其書謂之易爻者言乎其變也象之義出於象彖之義出於豕易之義出於易皆取諸物也周官太卜掌三易之法夏曰連山殷曰歸藏周曰周易連山始於艮故曰連山易曰兼山艮是也先儒以為象雲氣之出於山連連不絶非是歸藏始於坤故曰歸藏周易始於乾故曰周易乾始萬物坤終萬物艮者終始萬物故三代之易各首一焉易曰終萬物始萬物者莫盛乎艮蜥易一名蛇醫字林所謂蠑螈蛇醫是也舊説蛇體有傷此輒銜草傅之故有醫之號也東方朔曰是非守宮則蜥蜴如此守宮乃蝘蜓也今俗謂之蠍虎喜縁籬壁者是按爾雅云蠑螈蜥易蜥易蝘蜓蝘蜓守宮本草亦曰一名蜥蜴一名守宮則蠑螈蜥蜴蝘蜓守宮異名而通者也方言曰守宮秦晉西夏謂之守宮或謂之蠦􅨦或謂之刺易其在澤中者謂之易蜥南楚謂之蛇醫或謂之蠑螈東齊海岱之間謂之䗂䗔北燕謂之祝蜒考工記注云脰鳴鼃黽屬注鳴精列屬旁鳴蜩蜺屬翼鳴發皇屬股鳴蜙蝑屬胷鳴榮螈屬馬融周官作以胃鳴干寶周官作以骨鳴説者以為三字相近雖容有誤而馬鄭與干皆前世名儒或所授師説不同按説文蠵大龜也以胃鳴者則馬本作以胃鳴當謂蠵屬三教珠英云守宮鱗色如蛇而四足亦與魚合埤雅卷十一
