body:
  text: 欽定四庫全書埤雅卷四宋陸佃撰釋獸象貉貍狼蝟狐貙貓駝麋狨猴貘羆貂猨象象南越大獸長鼻牙望前如後三年一乳行孕肉兼十牛命在其鼻其所食物皆以鼻取之盖獸之象以鼻致用而不以口天之象以氣致用而不以言故天之象與獸之象同字且今服馴巨象以小斧刄斵之其金瘡見星月即合又若與垂象宜應其理抑有不可得而推者舊說象之所在其土必豐又云象性久識能浮水出没體具十二少肉唯鼻是其夲肉膽不附肝隨月轉在諸肉假令正月建寅即膽在虎肉鼻端有小爪可以拾鍼或曰膽隨四時在足春在前膊左夏在前膊右如龜定體也其牙生花必因雷聲故古者以為器飾左傳曰象有齒以焚其身賄也字說曰象齒感雷莫之為而文生天象亦感氣莫之為而文生人於象齒也服而象焉於天象也象而服焉像象之也周官玉路以祀象路以朝玉仁也象義也仁者人也義者道也故象路一名道車弁師掌皮弁㑹五采玉璂象邸玉璂以况基徳而象邸即莊周所謂託宿於義者也詩曰佩其象揥正言象揥者明有義也以駮其君𥚹急趨利無徳以將之袁子曰虎頭髙峙貉頭尖銳鹿頭側長犀頭高廣一曰龍象六十嵗骨方足今荆象色黑兩牙江豬也貉字林曰貉似貍善睡狐善疑貉善睡故狐貉之厚以居也其營窟與貛皆為曲穴以避雨暘亦以防患故淮南子曰螘知為垤貛貉為曲穴虎豹有茂草野彘有艽莦隂以防雨景以蔽日此亦鳥獸之所以智也俗云貛貉同穴而異處貛之出穴以貉為導詩曰一之日于貉取彼狐貍為公子裘言徃祭表貉因取狐貍之皮為裘故傳曰于貉謂取狐貍皮也周官所謂祭表貉即此于貉是也考工記曰貉踰汶則死此言邦域殊氣各有所宜故周官以土宜之法辨十有二土以蕃鳥獸以毓草木也釋獸云貈子貆貒子貗而伐檀之詩一章曰胡瞻爾庭有縣貆兮二章曰特三章曰鶉貆小而特大鶉則尤小以言在位貪殘無功而受禄其後已悉如此南方異物志曰傳言貉不踰汶鸜鵒不踰濟狐不渡江而南橘不越江而北區宇之内咫尺不同而况分之華夷限以山海魁詭俶怪可勝言哉字說曰貈善睡則於宜作而無作於宜覺而無覺不可以渉難矣舟以渉難利則渉否則止貈舟在右能止者也又作貉貉之為道宜辨而各故孔子狐貉之厚以居貉辨而各故少乎什一謂之大貉小貉無諸侯幣帛饔飱百官有司以為貉道也貍貍豸在里者里人所居也貍穴而薶焉故貍又通於薶字論衡曰小盗貍歩䑕竊貍之伺物卑身而伏以候敖者似貙而小文彩斑然異於貒貉故法言曰辨人貍别其文萃也性善擬度故大射以貍歩張三侯鄭氏云貍善愽者也行則止而擬度焉其𤼵必獲是以量侯道取象焉詩曰取彼狐貍為公子裘言狐善疑貍善擬不可以有為故古者以為燕居之裘齊大夫東郭書衣貍製是也爾雅曰貍狐貒貈醜其足蹯其跡􅚵蓋貍狐貒貉其性一而貍又伏獸好擬度故其跡皆􅚵而不速也袁狎曰河氷上有貍迹便堪人渡崔劼以為貍當作狐狐性好疑故渡氷輙聼蓋不知所謂聼氷非狐性獨然貍亦有之也述征記曰盟津寒則氷厚數丈氷合車馬未敢過要須狐行云此物善聼氷下無水聲乃過人見狐行方渡内饔曰鳥皫色而沙鳴貍馬黑春而般臂螻貍言其氣臭如貍也内則作鬱蓋物宜露而反鬱則臭矣螻言其氣臭如螻也内則作漏蓋物宜覆而反漏則臭矣今貍脊間有黑理一道如界或曰字从理省以此與鯉之制字同義龍八十一鱗能變者也鯉三十六鱗雖無變而有理焉理者里也可以數度者也狼狼大如狗青色作聲諸竅皆沸蓋今訓狐鳴則亦後竅應之豺祭狼卜又善逐獸皆獸之有才智者故豺从才狼从良作也里語曰狼卜食狼將逺逐食必先倒立以卜所向故今獵師遇狼輙喜蓋狼之所嚮獸之所在也其靈智如此故古之造式者木用槐癭棗瘤而以狼牙為柱取其靈智也詩美周公不失其聖正言狼者虎善擬其前狼善顧其後而又其靈智有才故雖䟦胡疐尾而能不失其猛此周大夫之所以譬周公也還之詩一章曰並驅從兩肩兮二章曰從兩牡兮三章曰從兩狼兮狼物之尤暴戾者故詩以為後也古之烽火用狼糞取其煙直而聚雖風吹之不斜玉藻曰君之右虎裘厥左狼裘明以武猛衛上如此或曰狼駢脅腸直其糞煙直為是故也内則曰狼去腸豈以此歟孟子曰養其一指而失其肩背則為狼疾人也狼性貪暴爭食以養口體而常以害其身者管子曰舉龍章則水行舉虎章則林行舉鳥章則陂行舉蛇章則澤行舉鵲章則陸行舉狼章則山行詩曰織文鳥章舉鳥章則陂行陂易野也易野以車為主元戎十乗以先啓行所謂以車為主也爾雅曰鄭有圃田周有焦護皆易野也故此詩正言焦護毛詩草蟲經云老狼項下有袋求食滿腹向前行乃觸之退後又自踏踐上㚄其尾進退有患故詩以况跋前㚄後蝟蝟可以治胃疾炙轂子曰刺端分兩岐者曰蝟如棘針者曰䖶蝟狀似䑕性極鈍物少犯近則毛刺攅起如矢爾雅所謂彚毛刺者即此也見鵲便仰腹受啄中其矢輙爛故淮南子云鵲矢中蝟此理之不可推也舊說豹食豺豺食蝟又曰蝟皮能整紕纇染師用之刷紕物易曰㧞茅茹以其彚征吉彚之為物以類行以類止故又為以其彚征以其彚貞之彚許慎曰蟲似豪豬者盖豪豬毛如笄而端黒附毛有鈴大略如蝟也傳曰蝟膽甘楝蜜苦一曰火鑠金故鵲啄蝟蝟能制虎鵲能制蝟蓋物之相制迭為君臣如此莊子所謂是其時為帝者也狐䄏獸也鬼所乗之有三徳其色中和小前大後死則丘首狐性好疑貈性好睡又皆藏獸故狐貉之厚以居而蜡祭息民以狐裘也素問曰其主狐貉變化不藏終南一章曰錦衣狐裘二章曰黻衣繡裳錦衣狐裘言燕服也黻衣繡裳言祭服也爾雅曰衮黻也衮衣謂之黻衣猶衮冕謂之黻冕也襄公能取周地始為諸侯受顯服故是詩卒章言衮衣衮衣即序所謂顯服舊說狐有媚珠又曰狐禮北斗而靈善變化其為物妖淫故詩又以刺惡所謂雄狐綏綏是也雄狐說者以為牡狐非是宜讀如狐不二雄之雄雄狐君之象也又曰有狐綏綏在彼淇梁在彼淇厲在彼淇側言狐之為物在山者也今反在淇梁淇厲淇側則失其常居矣雖失其常居然猶不失其常匹衛之男女失時喪其妃耦則曾反狐之不若也易曰小狐汔濟濡其尾小者材不足也狐者志不果也材不足志不果是以幾濟而有濡尾之難故彖曰不續終也亦其尾重善濡溺故易正以為象里語曰狐欲渡河無如尾何是也禮曰君衣狐白裘錦衣以禓之不曰白狐裘而曰衣狐白者蓋天下無粹白狐而有粹白之裘者掇之衆白也故傳曰良裘非一狐之腋顔師古曰狐白謂狐腋下之皮其毛純白集以為裘輕柔難得故貴也管子曰狐白應隂陽之變六月而一見然則白狐蓋有之矣非常有也說文曰狐从孤省狐性疑疑則不可以合類故从孤省也犬性獨狐性孤羊性羣鹿性麗說文曰鹿之性見食急則必旅行麗旅行也詩曰儦儦俟俟或羣或友則以鹿性旅行故趨則儦儦行則俟俟也毛詩傳云獸三曰羣二曰友類從曰燕識戊巳不銜泥狐潜上伏不越度阡陌又曰狐狼知虚實虎豹識衝破蓋實即孤也狐狼摶物皆以虛撃孤狐从孤省又或以此故也音胡疑詞也貙或曰虎五指為貙柳子曰貙畏虎虎畏羆釋獸曰貙似貍兕似牛犀似豕又曰貙獌似貍貙虎屬也獌狼屬也古者田獵必有所祭故周祭貈漢祭貙漢書音義曰貙以立秋日祭獸故漢於是時祭焉祭貈其義未聞也貓䑕善害苗而貓能捕䑕去苗之害故貓之字从苗詩曰有貓有虎貓食田䑕虎食田彘故詩以譽韓樂而記曰迎貓為其食田䑕也迎虎為其食田豕也舊傳貓旦暮目睛皆圎及午即從歛如線其鼻端當冷唯夏至一日煖蓋貓隂類也故其應隂氣如此世云薄荷醉貓死貓引竹物有相感者出於自然非人智慮所及如薄荷醉貓死貓引竹之類乃因舊俗而知爾貓亦如虎畫地卜食今俗謂之卜䑕傳曰騏驥驊騮捕䑕於深宫之中曾不如跛貓言殊技也是故天下之材在於因任淮南子曰伊尹之興土功也脩脛者使之跖钁強者使之負土眇者使之準傴者使之塗蓋如是矣近人有收牡丹圖者叢下有一貓未知其精粗有别畫者曰此正午牡丹也何以明之其花枝哆而色燥此日中時花也貓眼黑睛如線此正午貓眼也有帶露花則房歛而色澤貓眼早暮則圎日漸午則狹長正午則如一線爾駝義訓曰牛之聲曰牟駝之聲曰􅕫駝卧腹不帖地屈足漏明則行千里背有肉鞍如峯長頸高脚善負知泉脉所在遇處輙停不行其糞煙直上如狼煙也又知風候叚氏云駝亦齝今其毛縟温厚煖於狐貈極堪禦寒遇夏常退毛至盡乃能避熱故古者冬取皮於狐類而裘成夏取毛於駝類而褐成也金柯要訣曰行之善者如龜如龍如馬如駝如鷹如鴈麋白虎通曰熊為獸巧猛麋為獸迷惑故天子射熊諸侯射麋麋水獸也青黑色肉蹄一牡能乗十牝鹿屬也故麋之文从鹿从米則以麋性善迷故也麋善迷而害稼故周官大夫供麋侯麋言討惑除害也大夫以智帥人故所射如此獸又云冬獻狼夏獻麋者冬物成之時狼殘物之尤者夏稼生之時麋害稼之衆者春秋書多麋為是故也各於其尤害物之時罟而獻之明設官主以除民物之害月令仲夏曰鹿角解仲冬曰麋角解鹿以夏至隕角而應隂麋以冬至隕角而應陽淮南子曰日至而麋鹿解是也說者以為鹿角者挾隂之陽也故應隂而隕角麋角者挾陽之隂也故應陽而隕角蓋鹿肉食之燠以陽為體也麋肉食之寒以隂為體也以陽為體者以隂為末以隂為體者以陽為末角末也故其應隂陽如此淮南子曰孕婦見兔而子缺脣見麋而子四目物有似然而似不然者麋有四目其二夜目也類從所謂目下有竅夜即能視之是也藥議曰按月令冬至麋角解夏至鹿角解隂陽相反如此今人用麋鹿茸作一種殆踈也又用刺麋鹿血以代茸者云茸亦血爾此大誤也竊詳古人之意凡含血之物肉羗易長其次角難長最後骨難長故人自胚胎至成人二十年骨髄方堅唯麋角自生至堅無兩月之久大者乃重二十餘斤其堅如石計一夜須生數兩凡骨之頓成生長神速無甚於此雖草木至易生者亦無能及之此骨血之至強者所以能補骨血堅陽道強精髓也頭者諸陽之㑹衆陽之聚上鍾于角豈可與凡血為比哉麋茸利補陽鹿茸利補隂凡茸無樂太嫰世謂之茄子茸但珍其難得爾其實少力堅者又太老惟長數寸破之肌如朽木茸端如馬腦紅玉者最善又北方戎狄中有麋鹿駝鹿極大而色蒼尻黄而無斑亦鹿之類角大而有文堅瑩如玉其茸亦可用狨狨蓋猿狖之屬輕捷善縁木大小類猿長尾尾作金色今俗謂之金線狨者是也生川峽深山中人以藥矢射殺之取其尾為卧褥鞍𬒳坐毯狨甚愛其尾中矢毒即自齧斷其尾以擲之惡其為深患也氂牛出西域尾長而勁中國以為纓人或射之亦自斷其尾左氏所謂雄雞自斷其尾而莊周以為牛之白顙豚之亢鼻者巫祝不以適河乃無用之為大祥也古者於旌旗干首注氂尾之毛焉而謂之旄凡建旄皆首物者也示使愛尾焉狨一名猱詩曰無教猱升木顔氏以為其尾柔長可藉然則制字从柔以此故也猴吕子曰狗似玃玃似母猴母猴似人猴善候其字从侯白虎通曰侯候也楚人謂之沐猴舊云此獸無脾以行消食蓋猿之徳靜以緩猴之徳躁以囂故古者造字為象母猴之形柳子曰猨類仁讓孝慈居相愛食相先行有列飲有序有難則内其柔弱者不踐稼蔬木實未熟相與視之謹既熟嘯呼羣萃然後食山之小草木必環而行遂其植猴之徳勃諍號呶雖羣不相善也食相噬齧行無列飲無序有難則推其柔弱者以免好踐稼𬞞所過狼籍披攘木實未熟輙齕齩投注竊取人食皆以自實其嗛山之小草木必陵挫折撓之猿性靜夜嘯常風月肅然猴性動每至林木皆振響演義曰狼籍者物雜亂之貎言狼起卧㳺戱多籍其草而草皆穢亂故曰狼籍狼籍一曰狼扈貘貘獸似熊象鼻犀目師首豺髪小頭庳脚黒白駁能䑛食銅鐡及竹銳鬐骨實無髓皮辟温濕以為坐毯卧褥則消膜外之氣字从膜省蓋以此也爾雅曰貘白豹虪黒虎蜀都賦云㦸食鐡之獸即貘是也劉子曰飛鼯甘煙走貘美鐡所居隔絶嗜好不同未足怪也舊云貘糞為兵可以切玉其溺又能消鐡為水羆釋獸云羆如熊黄白文羆似熊而大為獸亦堅中長首髙脚從目能縁能立遇人則擘而攫之俗云熊羆眼直惡人横目淮南子曰熊羆之動以攫搏兕牛之動以觝觸是也其白生於心之下肓之上亦如熊白而麤秋冬則有春夏則亡猛憨多力能拔大木故書曰以有熊羆之士不二心之臣熊羆之士以力言也詩曰維熊維羆男子之祥維虺維蛇女子之祥熊羆陽物也強力壯毅故為男子之祥虺蛇隂物也柔弱隱伏故為女子之祥盖人之精神與天地隂陽流通故夣之吉凶各以其類至俗說熊羆富脂至春臕癢即登高木自墜謂之撲臕今人畜熊以梃撻之更致壯長蓋放於此舊說師子虎見之而伏豹見之而瞑羆見之而躍貂貂亦䑕類縟毛者也其皮燠於狐貉取以為㡌得風則煖其毛拂靣如熖朔地苦寒人以其皮温額後代效之因以金璫飾首前揷貂尾至漢因焉加以附蟬為文侍中揷左常侍揷右應劭漢官儀云金取堅剛百鍊而不耗蟬取居髙飲露而不食貂取内勁捍而外温潤其色紫蔚而不耀太𤣥曰狐鼦之毛躬之賊此言以表自累莊子曰豐狐文豹是何罪之有哉其皮為之災也故曰匹夫無罪懷璧其罪字說曰貂或凋之毛自召也猨猨臂通肩刻之可以為笛聲圎於竹猨猴屬長臂善嘯便攀援故其字从援省而爾雅云猱蝯善援玃父善顧也淮南子曰虎豹之文來射猨狖之捷來措置之於檻曰措家語曰五九四十五五為音音主猨故猨五月而生四九三十六六為律律主鹿故鹿六月而生或曰猴性躁急猨性靜緩故猨从爰爰緩也論衡曰鹿制於犬猨伏於䑕今人取䑕以繋猨頸猨不復動管子曰墜岸三仞人之所大難也而猱蝯飲焉今猨不復踐土好上茂木渇則接臂而飲類從曰獨一呌而猨散鼉一鳴而龜伏或曰鼉鳴夜獨鳴曉獨猨類也似猨而大食猨今俗謂之獨猨盖猨性羣獨性特猨鳴三獨鳴一是以謂之獨也相法曰手如雞足者𥚹廹手如猨掌者勤勞舊說猨鳴而獺候之故束晳𤼵蒙記曰獺以猨為婦也莊子曰猨猵狙以為雌猵蓋言獺埤雅卷四
