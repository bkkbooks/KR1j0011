body:
  text: 埤雅卷四音釋璂基揥掣貛火丸艽勤牛貈乎各貆丸貒湍貗其禹薶埋貙樞劼胡八皫浮沼癭於郢疐帝駢胼陂披䖶豕祅夭蠟子亦汔許訖裼錫儦被梟獌萬跖之石傴舉哆處紙􅕫烏黠齝丑之罟古狨戎狖羊就齧孽氂毛猱乃刀玃居縳囂五刀呶女交齕紇嗛胡簟貘陌膜密各虪式六鼯吾粗粗臕標猵普年狙且余稨鞭
