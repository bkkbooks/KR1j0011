body:
  text: 埤雅卷十八音釋鉶刑璁匆繱干公􅣀别居月忡丑中惙陟雷蔦都了蕕猶蹂仁栁蓀孫茝齒㡆荒襏芳末襫施隻簦登綯大刀稊題荑夷洵旬悴在季酢醋繅先刀草草刈魚廢蕳間紉女鎮溱臻洧委祓芳末瀏溜穜童稑陸秬巨鬯唱扱初洽椈居六酳余振鎬胡道檾頃綌隙滸虎藟纍蘞斂諼喧苨你䌰攝緎于力緵宗檖遂菅堅陔垓俾補弭謔虛虐擫於叶緡民鬻育鞓庭馲步各趺方俱墅野
