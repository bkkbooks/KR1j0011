body:
  text: 埤雅卷八音釋鷮驕斫捉鸒預隼筍嗛謙籋聶鳦乙鷾意鴯而頡血頏杭浙浙疇鶅緇鵗希鷷遵詖比揄頭麃白交爰袁鴽如蜃時軫雊姤啖淡槇真鷁益鴷列瘻漏齲炬驅雨銛思廉鵯卑鷢厥鴆振沔免噬世䎒莊善􅧭以專鷳間搰骨鍇諧孚俘􅵒未鴄匹􅝶鴨鴱艾紩秩拚辨毖祕宎夭月鑣摽噦誨踞據麟麟砥紙鳳鷫肅鷞雙鷟族鶠偃
