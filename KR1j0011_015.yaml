body:
  text: 埤雅卷八音釋鷮驕斵捉鸒預隼筍嗛謙籋聶鳦乙鷾意鴯而頡血頏杭淛浙疇鶅緇鵗希鷷遵詖比揄頭麃白交爰袁鴽如蜃時軫雊姤㗖淡槙真鷁益鴷列瘻漏齲炬驅雨銛思廉鵯卑鷢厥鴆振沔免噬世䎒莊善􅧭以專鷳閒搰骨鍇諧孚俘􅵒未鴄匹􅝶鴨鴱艾紩秩拚弁毖秘宎夭月鑣摽噦誨踞據麐麟砥紙鳳鷫肅鷞雙鷟族鶠偃
