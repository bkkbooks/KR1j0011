body:
  text: 埤雅卷十二音釋駂布老馵之喻驖徒結騵原駽胡絹駰一人駁騋力才駥而弓豔艷袤茂夾何夾駑乃乎襮剝騅之誰毳芮菼毯韎妹緇側其韐合絰徒結騧假華徒馭魚據馵之戍馽知立囗圍駢部田鬛列嘽啖駻何旦驈余橘縓七絹赬丑真騂思營駉古熒駜皮筆猗於宜􅠋宜寄駓普悲駵力由􅏋髯蹴就騲草輈竹留驒它雒洛騢胡加驔徒點驎力振骭遐諫駣徒髙􅦩布戛齧蘖
