body:
  text: 欽定四庫全書埤雅卷十二宋陸佃撰釋馬馬駂騏馵駱白顛驖騵黃駽駰駁騋駒駥馬説文云馬怒也武也象馬頭髦尾四足之形石建曰書馬者與尾而五今四不具是也然則緯書以為王者駕馬故字以王為馬誤矣且王無駕馬之制蓋古者天子乘龍諸侯乘馬故易以龍敘乾以馬明坤而天子乘龍駕六諸侯乘馬駕四白虎通曰天子駕六者示有事於天地四方也漢書曰乾文車坤六馬列子亦云六轡不亂而二十四蹄所投無差則古有駕六之制者矣故書曰懷乎若朽索之馭六馬今文以竹策龍為籠以竹策馬為篤蓋良馬見鞭影而行則鞭策之於龍是以籠之非以篤之也列子曰聖人以知籠羣愚蓋籠之道如此舊説相馬肝欲得小耳小則肝小肺欲得大鼻大則肺大脾欲得小膁小則脾小心欲得大目大則心大又曰眼欲得有紫豔口欲得有紅光上脣欲得緩下脣欲得急上齒欲鈎鈎則壽下齒欲鋸鋸則怒脊欲大而抗額欲方而平喉欲曲而深胸欲直而出兔間欲開虎口欲開升肉欲大而明輔肉欲大而明耳欲如劈竹睛欲如懸鈴頭欲髙如剝兔項欲起如飛龍又曰人眼鳥目麋背麟腹虎胸龜尾擎頭如鷹垂尾如彗又曰望之大就之小筋馬也望之小就之大肉馬也前視見目旁視見腹後視見足駿馬也毛束皮皮束筋筋束肉肉束骨五者兼備天下之馬也又曰口中紅白間色者壽鼻中紅色如朱點書者壽眼中赤色如字形者壽易曰賁如皤如白馬翰如言未受飾於物也詩曰皎皎白駒賁然來思賁然來思則言受飾於物矣受飾於物則與在彼空谷生芻一束者異矣故戒之以愛日母為優遊於此勉之以遁思也曲禮曰立視五巂式視馬尾小俯為式蓋立視視車之衡則平視馬之尾則俯矣故平視或謂之衡視鄭云巂謂輪轉之度蓋當謂其徑也言乘車之輪六尺有六寸五六三十積尺為三丈積寸為三尺則五巂之袤三丈三尺荀子曰立視前六尺而大之六六三十六三丈六尺即此是也又曰坐視膝立視足言坐則視膝立則視足也又曰應對言語視面言應對言語則無上於面亦不下於帶也曲禮曰天子視不上於夾不下於帶國君綏視大夫衡視士視五步此即言語應對視面髙下之度國君綏視大夫衡視相備也綏視則言俯不下於帶衡視則言仰不上於面蓋國馬之衡髙八尺有七寸田馬之衡髙七尺有七寸駑馬之衡髙六尺有七寸以中言之衡髙七尺七寸人長七尺則髙與人目略平故曰前有錯衡所以養目也又曰執天子之器則上衡上衡謂齊首矣國君則平衡平衡謂齊眉矣大夫則綏之謂當心矣士則提之謂當帶矣禮曰提者當帶而國君綏視不下於帶則綏之當心提之當帶明矣或曰凡物有當提者有當捧者今以貴賤之等而令當提者捧當捧者提可乎曰是禮也非是之謂也蓋曰執天子之器上衡國君平衡則正為執器者言之而已非謂當提之器使捧當捧之器使提也荀子又曰平衡曰拜下衡曰稽首至地曰稽顙蓋亦準車之衡言之朝野僉載曰伯樂令其子執馬經以求馬經年無有似者歸以告父更令求之出見大蝦蟆謂其父曰得一馬略與相同而不能具伯樂曰何也對曰其馬隆顙跌目但蹄不如纍麴爾伯樂笑曰此馬好跳擲不堪御也括母曰括徒能讀其父書不知合變亦近之爾駂今之烏驄也爾雅曰驪白雜毛駂蓋取諸鴇也今駂其色驪白詩曰乘乘馬乘乘黃乘乘駂六尺已上為馬黃純色駂雜色古者大夫乘駒乘馬則僭諸侯之禮矣蓋亂生於衣服車馬之間而已大叔于田乘乘馬而沃之大夫素衣朱襮此晉鄭之所由亂也騅亦駂類取隼之色一曰蒼白雜毛騅一曰蒼黑雜毛騅今隼色在青黑之間亦在青白之間詩曰毳衣如菼傳曰菼隼也然則色在青白之間騏毛詩傳曰青黑曰騏蓋騏蒼艾色一曰馬青驪文如博棊也詩曰其帶伊絲其辨伊騏辨皮辨也司服曰凡兵事韋辨服視朝則皮辨服韋辨以韎韋為之故曰韋辨一名爵辨其色則象爵故也皮辨以鹿皮為之故曰皮辨一名騏辨其文則象騏故也亦或謂之綦辨鄭氏以為爵辨似冕又謂韋辨韎韋為辨又以為其衣裳又曰韋辨蓋韎布為衣而素裳皆誤矣按士冠禮爵辨服纁裳純衣緇帶韎韐則韋辨服純衣纁裳矣凡辨爵辨為上皮辨次之故司服初一曰韋辨服次二曰皮辨服次三曰冠辨服次四曰服辨服次五曰辨絰服蓋冠辨服辨皮辨服也辨絰則服皮辨而加絰故其序如此喪服小記曰諸侯弔必皮辨錫衰服問曰公為卿大夫錫衰當事則辨絰足相參證也左傳曰衛獻公戒孫文子寧惠子食而射鴻於圃二子從之不釋皮冠而與之言皮冠辨也説者以為田獵之冠則凡甸事冠辨服即皮辨又明矣詩曰騏騮是中騧驪是驂蓋騏騮中駟騧驪上駟故服以騏騮驂以騧驪淮南子曰驂欲馳服欲步宣王之詩北伐舉四驪南征舉四騏者言方是時馬政愈修其所以執駒綱馬教攻特臧僕講馭夫之法滋廣故雖騏亦間習任為用矣非獨四驪也馵爾雅曰後右足白驤左白馵易曰震為馵足蓋取其躁以躁故二絆其足作足言縱之而動也馵足言制之而動也今字𩡧從馬一絆其足馵從馬二絆其足馽從馬囗其足詩曰縶之維之囗者維之也淮南子曰是猶兩絆騏驥而求其致千里也兩絆言馵其足詩曰駕我騏馵王肅謂駕兩馬者下云騏騮是中騧驪是驂明此駕兩者也蓋古者庶人駕一士駕二大夫駕三諸侯駕四天子駕六説文曰駢駕二馬也尚書大傳曰命於其君然後得乘駢馬驂駕三馬也駟駕四馬也詩曰載驂載駟驂以言大夫駟以言諸侯馬政論曰後足偏白者凶若馵之類是也此士之所以駕也歟駱爾雅曰白馬黑鬛駱廣雅曰白馬朱鬛駱今呼黃馬尾鬛一道通黑如界者為駱蓋馬無分於黃白皆謂之駱若今衣脊絡縫故曰駱也明堂位曰夏后氏駱馬黑鬛此以别白馬朱鬛之駱也月令曰孟秋駕白駱此以别黃馬黑鬛之駱也俗云駱馬善奈勞苦詩曰嘽嘽駱馬言駱性善勞而今取息不平如此則以甚勞故也古者天子之卿純駟故詩曰駕彼四駱又曰乘其四駱若諸侯之卿則不能具純駟矣詩曰駕我騏馵蓋言秦之士也又曰騏騮是中騧驪是驂蓋言秦之卿也白顛爾雅曰的顙白顛今之戴星馬也詩曰有車鄰鄰有馬白顛鄰鄰衆比貌於車言其衆於馬言其特相備也覲禮曰奉束帛匹馬卓上九馬隨之説者以為卓即的顙故以為上列而九馬隨其後莊子曰齊之以月題蓋月題額上當顱如月者所以象顛之白然則馬之貴的顙也可知矣易曰其於馬也為的顙蓋震二隂在上故為的顙夫文入二為白白隂色也二隂數也馬政論曰顙有白毛謂之的盧又曰準上有旋毛及白毛者謂之的吻凶俗云的顱非也驖説文曰馬深黑色驪馬赤黑色驖先儒云取其馬色如鐵非特有取於色蓋亦取其堅壯如鐵故曰驖也月令孟冬乘鐵驪即此是也詩曰駟驖孔阜六轡在手以美襄公田狩之事蓋馬之族不一而駻馬則喜前駑馬則喜後故古之御者駑馬以鞭為主駻馬以轡為主驖性堅駻則疑於難御而有繁手之勞矣今其六轡在手而已則是無事於轡故詩以美之也陸子曰三皇垂策五帝繁手唐虞按轡禹湯馳轅騵驪馬白跨驈騮馬白腹騵騵從縓省禮曰練而縓縓淺赤也一染謂之縓再染謂之赬三染謂之纁周人尚赤戎事乘騵赤馬白腹曰騵言上周下殷也詩曰駟騵彭彭此言尚父之乘然則戎事乘騵蓋特其長而已或曰方叔率止乘其四騏則於戎事乘騵之説害矣曰序詩者曰宣王南征則蠻荆之事正之而已故言兵則非伐人之兵也言車則非戎車也言馬則非戎馬也黃黃騂曰黃黃亦馬之上色故駉頌首章曰有驪有黃也列子曰牝而黃牡而驪馬至果天下之馬也有駜曰乘黃矣然後乃言乘牡卒言青驪之駽則黃牝驪牡剛柔之質具矣明堂位曰周人黃馬蕃鬛言吉事乘此詩曰四黃既駕兩驂不猗是也至於戎事則乘騵檀弓曰周人尚赤戎事乘騵或曰天子之馬盛則駕六常則駕四詩曰四黃既駕兩驂不猗此駕六之證也穆王命八駿之乘右服華騮而左緑耳右驂赤驥而左白􅠋次車之乘右服渠黃而左踰輪左驂盜驪而右山子此駕四之證也駽青驪曰駽今之驖驄也詩曰駜彼乘黃駜彼乘牡駜彼乘駽言臣有柔順之德剛健之材又被文以成之則臣之道備矣於乘黃曰在公明明於乘牡曰在公飲酒於乘駽曰在公載燕在公明明則禮所謂在明明德也夙夜在公在公明明於是飲酒以載燕則亦以有道故也鹿鳴之道和樂而已非君臣之道也故六月之序至言四牡然後曰君臣缺矣今言在公飲酒在公載燕而更以為頌君臣之有道者蓋夙夜在公在公飲酒則臣有餘敬君有餘惠臣有餘敬君有餘惠則非特若鹿鳴正言賔主之道而已是乃所以為君臣有道也駰爾雅曰黃白雜毛駓隂白雜毛駰駓今之桃花馬駰今之泥驄也詩曰我馬維駒我馬維騏我馬維駱我馬維駰其先後與駉之序合則駰不如駱駱不如騏矣然是詩乃卒言駰者以明馬雖彌劣所以御之滋善駁駵白駁徐鉉曰疑象駮文晉侯乘駁乳虎見之而伏則象駮之文理或然也駁亦馬之上色故古者國君乘之文王曰昔者寡人夢見良人黑色而􅏋乘駁馬而偏朱蹄諸大夫蹴然曰先君王也詩曰皇駁其馬亦言皇駁者士昏禮攝盛故也爾雅所謂駮如馬倨牙食虎豹詩所謂隰有六駮者字從交作字説曰駮類馬食虎而虎食馬凡類已也而能除害己者在所交也則駮非此駁也騋馬善騋牝驪牡爾雅曰騋牝驪牡以罕稱也騋之字從來言進於馬矣宜有來而無往易曰知進而不知退亢龍也凡馬六尺以上為馬七尺以上為騋八尺以上為龍詩曰騋牝三千三千言多騋牝取其大也蓋騲馬常小今俗謂之小馬以此凡馬宗廟用龍戎事用駥田事用騋騋田馬也考工記曰國馬之輈深四尺有七寸田馬之輈深四尺鄭云國馬髙八尺衡髙八尺有七寸除馬之髙則餘七寸為衡頸之間也田馬髙七尺衡髙七尺有七寸除馬之髙則餘七寸為衡頸之間也校人曰邦國六間馬四種家四間馬二種大夫曰家其種又自田馬而下則所謂國馬者無大夫之馬矣蓋諸侯有良馬有戎馬無齊道大夫有田馬有駑馬無種戎或曰正言國馬者非特以别大夫亦以約天下之馬也伯樂曰良馬可以形容筋骨相也天下之馬若滅若沒若亡若失良馬即國馬也故駉頌以為諸侯有良馬有戎馬有田馬有駑馬變種曰良者以此也歟廋人曰八尺以上為龍此種馬也豈所謂天下之馬者耶蓋馬八尺以上則疑於龍矣是故謂之龍也坤之上六稱龍與此同義駉之頌一章曰有驈有皇有驪有黃二章曰有騅有駓有騂有騏三章曰有驒有駱有騮有雒四章曰有駰有騢有驔有魚按驪馬白跨曰驈黃白曰皇純黑曰驪黃騂曰黃蒼白雜毛曰騅黃白雜毛曰駓赤黃曰騂青黑曰騏青驪驎曰驒白馬黑鬛曰駱赤身黑鬛曰騮黑身白鬛曰雒隂白雜毛曰駰彤白雜毛曰騢豪骭曰驔二目白曰魚魚今謂之環眼馬馬之最下者也言有驪有黃於前言有驔有魚於後每章愈下則以言僖公至誠成物有加而無已莊子曰百里奚爵祿不入於心故飯牛而牛肥思無邪思馬斯徂殆此之謂也駒馬二嵗曰駒三嵗曰駣八嵗曰􅦩馬八嵗一變故從八也語曰七驄八白言馬至八嵗驄變而白矣傳曰大夫乘駒蓋駒血氣未定則有蹄齧之虞故大夫乘之荀子曰大路之馬必倍至於教順然後乘之所以養安也倍言年長以倍今羣牧選馬十六嵗以上乃以進御此遺象也曲禮曰齒路馬有誅路馬之齒髙矣故齒路馬有誅所以廣敬也詩曰我馬維駒六轡如濡而後言維騏維駱維駰則騏也駱也駰也蒙上之文宜皆為駒大夫乘駒駕三今曰六轡者上大夫卿奉使故也禮曰上大夫卿卿與諸侯駕四説文從句字音拘則以駒血氣未定宜拘執之焉爾詩曰縶之維之義蓋取此一章曰皎皎白駒食我場苗縶之維之以永今朝所謂伊人於焉逍遙二章曰皎皎白駒食我場藿縶之維之以永今夕所謂伊人於焉嘉客古者朝食曰饔夕食曰飧飧薄食也故是詩於苗曰以永今朝於藿曰以永今夕逍遙以道言之也嘉客以禮言之也清人曰二矛重英河上乎翺翔二矛重喬河上乎逍遙翺翔禮之事也逍遙道之事也河上非所宜然因以微切其上故序者曰公子素惡髙克進之不以禮文公退之不以道也舊説繫馬曰維繫牛曰縷公羊曰牛馬維縷駥周官馬八尺以上為龍戎馬之髙蓋亦準此故爾雅曰馬八尺為駥也駥即戎馬故其字指事而戎事齊力尚強故爾雅又曰絶有力駥也校人云種馬一物戎馬一物戎馬即駥是也種馬即龍是也史言良馬謂之龍種蓋出於此埤雅卷十二
