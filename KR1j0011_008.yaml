body:
  text: 欽定四庫全書埤雅卷五宋陸佃撰釋獸羜羝羔羚羊羱羊狗豝豕􅛊豚騶虞犬犴羜釋畜曰未成羊羜羜未成羊也故從寧寧佇也寧其美成而後足用詩曰既有肥羜而後言既有肥牡明其禮有加而無已且其一章曰伐木許許釃酒有藇既有肥羜以速諸父言燕禮也二章曰陳饋八簋言食禮也三章曰籩豆有踐言饗禮也周禮朝事之籩其實麷蕡白黑形鹽豆實韭菹醓醢昌夲而傳謂饗有昌歜白黑形鹽其言應禮則籩豆有踐為饗可知矣蓋禮以爵言之謂之朝獻以籩豆言之謂之朝踐朝踐即踐朝事之豆籩也謂之朝事以象朝事其親所進也朝事象朝時所進則饋食象食時所進矣詩於八簋言饋籩豆言踐則其為食饗又明矣朝踐之豆籩當饗饋食之豆籩當食則加豆加籩蓋當燕矣加豆之實深蒲醓醢筍菹魚醢適當燕禮故詩曰其蔌維何維筍及蒲籩豆有且侯氏燕胥也然則饗具四豆四籩之實食禮則自饋食而下無朝事之豆籩也燕禮則自加豆加籩而下無饋食之豆籩也故禮莫重於饗食次之燕又次之聘義曰一食再饗燕與時賜無數羝羝性好抵突故從抵省字從抵省音從低者以低其角然後能抵突故也易曰羝羊觸藩羸其角九三重剛而不中又動以進也故有羝羊之象然則上六亦曰羝羊何也蓋大壯之極疑於羝羊猶坤之上六疑於龍爾博雅曰吳羊牡一嵗曰牡䍮三嵗曰羝牝一歲曰牸䍮三歲曰牂諺曰智如禹湯不如更嘗是以樊遲請學稼孔子曰吾不如老農然則聖賢之智猶有所未達而况於凡庸者乎故曰三折肱知為良醫又曰亡羊治牢未為晚也羔大曰羊小曰羔羔性羣而不黨又皆跪乳象禮其德冝施於朝故古者以為朝服詩曰羔裘如膏日出有曜言日出有曜然後見其如膏且亦聼朝之時也而反以遊燕又與狐裘以朝狐裘在堂異矣故是詩後之也玉藻曰朝辨色始入君日出而視之退適路寢聽政詩曰羔羊之皮素絲五紽素絲五紽所以英裘其制然也此言其節羔羊之革素絲五緎革者言敝而因故以改造也此言其儉羔羊之縫素絲五總革而又敝則補緝以縫之此言其儉之至西京雜記曰五絲為䌰倍䌰為升倍升為緎倍緎為紀倍紀為緵倍緵為禭此乃自少之多自微至著也紽今無所考據以類反之緎寡於總紽蓋宜寡於緎也周官曰卿執羔説者以為羔取羣而不黨卿執羔非特為其羣而不黨繁露曰凡贄卿用羔羔有角而不用類仁者執之不鳴殺之不嘷類死義者羔飲其母必跪類知禮者禮曰飾羔鴈者以繢以言其德足以衣被而又有文章也字説曰羔從羊從火羊火畜也羔火在下若火始然可進而大也又曰羮從美從羔羊大而美成羔未成也美成為下和羮是也未成為上大羮是也禮豆先大羮羚羊釋獸云麢大羊麠大麃􅕱大麕羚羊似羊而大角有圎繞蹙文夜則懸角木上以防患語曰麢羊挂角此之謂也今以其角為馬排沫特善字説云鹿比其類環其角外嚮以自防麢獨棲其角木上是所謂霝夫其如此亦以逺害其霝也亦所以為靈也羱羊羱羊似吳羊而大角角橢善鬭至死釋獸所謂驨如馬羱如羊者即此是也羱羊之在原不可牢畜者也一云狀若騾而羣行暑天塵露在其角上生草戴行愛之獨寢代都賦所謂羱羊養草以盤旋是也廣志曰羊角重於肉舊云羱羠並以時墮角其羱角尤大狗爾雅曰未成毫狗家獸也孔子曰狗叩也叩氣吠以守也許慎以為從犬句聲蓋狗從苟韓子曰蠅營狗茍狗茍故從茍也爾雅曰犬未成毫狗又曰尨狗也然則狗非田犬亦犬子也非田犬者不自搏食茍食而已若犬子則雖田犬亦然故皆曰狗熊虎醜其子謂之狗亦以待餔如狗也易曰艮為狗狗善警吠止禦又其性前趨故艮為狗艮陽在上故也釋畜曰長喙獫短喙猲獢長喙善獵短喙善吠以守莊子曰狗不以善吠為良凡犬長喙上短喙次之傳曰狡兔死良犬烹良犬即今細狗長喙曰獫者是所謂不以善吠為良也詩曰不狩不獵胡瞻爾庭有縣特兮蓋獵以逐之狩以守之而長喙善逐短喙善吠以守詩曰載獫歇驕獫以田獵歇驕以狩故也故序曰始命有田狩之事園囿之樂焉傳曰狗性險而出獫從險省其以此乎詩又曰無感我帨兮無使尨也吠爾雅曰尨狗也狗善猜警非禮相陵則警吠故詩以惡無禮屈子曰邑犬羣吠吠所怪也詩一章曰盧令令二章曰盧重環三章曰盧重鋂者言田事彌飾而彌以有制所以刺荒也令令鈴聲也鈴以令之環以制之重鋂又言貫制之衆説文曰旗有衆鈴以令衆也傳曰賜之環則反賜之玦則絶且盧犬也正言犬者又以刺好畢弋義訓曰良犬韓有盧宋有鵲盧黑色鵲黑白色淮南子曰若鵲之駁言黑白雜也荆楚記曰雞寒狗熱豝牝豕曰豝説文云二歲曰豝能相把拏也詩曰彼茁者葭一發五豝彼茁者蓬一發五豵正言豝與豵者豝把拏豵叢聚皆蕃殖之意也葭茁於下蓬茁於上豝獲於前豵獲於後以言上下草木鳥獸蕃殖豕彘也竭其尾故謂之豕犬喜雪馬喜風豕喜雨故天將久雨則豕進涉水波詩曰有豕白蹢蒸涉波矣月離于畢俾雱𩃱矣此之謂也牛順羊很豕躁有豕白蹢則又其躁者故詩以况夷狄橫猾難制之強四蹢白曰􅘻即此是也説卦曰坎為豕坎性趨下豕能俯其首又喜卑穢亦水畜也故坎為豕大畜六四曰童牛之牿六五曰豶豕之牙牢謂之牿牙者所以畜豶豕之杙也今東齊海岱之間以杙繫豕謂之牙賦曰置牙擺牲是也六四畜初以外制內也有牿之象六五畜九以小制大也有牙之象子曰棖也欲焉得剛又曰君子易祿而難畜夫人之所以不剛且易畜者大抵以欲自纍也童牛豶豕則私欲不行剛而不纍於物剛而不纍於物則難畜矣畜賢之道如牿之駐童牛牙之繫豶豕於是為至故孔子於四曰有喜五曰有慶也禮曰羊曰柔毛豕曰剛鬛羊於毛也柔豕於鬛也剛周官曰豕盲視而交睫腥腥説文音姓以為星見食豕令肉生息肉也今俗謂之腥肉蓋豕有米肉如星則其臭腥而肉不可食故其字又通於腥而內饔辨腥臊羶香之不可食者曰豕肓視而交睫腥也鄭云腥當為星肉有如米者似星不知所謂息肉似星者即腥其實一也説文已象蛇之形亥象豕之形蓋一陽生於子至已而六陽備一隂生於午至亥而六隂備故此二字皆象形也已蛇也亥豕也故子夏之晉過衛有讀史者曰晉師三豕渡河子夏曰非也是己亥也林氏小説曰以其食不潔故名之豕􅛊􅛊獸似猿青身黑頰有髯髯黑其手亦黑性好理髯又愛其類生相序死相赴殺一可以致百故周官素車犬䄙言君臣之道尚微當警備也薻車鹿淺􅍜駹車然􅍜言喪事彌吉而君臣之道滋定故鹿􅍜以明安則相求患難則相衛然􅍜以明安則相敘患難則相赴也舊説􅛊皮五色中為茵毯人取以藥矢射之其偶為拔其矢因以自刺與之俱斃豚曲禮曰豚曰腯肥説文云牛羊曰肥豕曰腯豚曰腯肥蓋兼之也易曰信及豚魚正言豚魚者豚微物而遁逸魚微物而潛逃信所難及故也玉藻曰圈豚行不舉足齊如流端行頥霤如矢辨行剡剡起屨執龜玉舉前曵踵蹜蹜如也先儒以為辨疾也端直也圈轉也豚之言若有所循皆非是蓋畜飬之間曰圈豕子曰豚端讀如端辨之端辨讀如辨冕之辨圈豚臨行不舉足齊如流執龜玉舉前曵踵蹜蹜如也則禮以其物記行容端行頥霤如矢辨行剡剡起屨則禮以其服記行容互相挾也古者祭祀必先擇牲繫而養之於牢君衮冕而臨之則行不舉足齊如流所以致敬且稱其服容也祭義曰天子為籍千畝冕而朱紘躬秉耒諸侯為籍百畝冕而青紘躬秉耒以事天地山川社稷先古以為醴酪齊盛於是乎取之敬之至也古者天子諸侯必有養獸之官及嵗時齊戒沐浴而躬朝之犧牷祭牲必於是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮辨素積朔月月半君巡牲所以致力孝之至也又曰君皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室世婦卒蠶獻繭子夫人夫人副褘而受之以為黼黻文章以祀先王先公敬之至也由是觀之君冕而親耕籍田則冕而豢牲不為過矣皮辨素積卜三宫之夫人世婦之吉者使入蠶于蠶室夫人副褘而受繭則君皮辨卜牲冕而圈之又不為過矣莊子曰祝宗人玄端臨牢策説彘曰吾將三月豢汝十日戒三日齋夫禮祝宗人玄端臨牢策擇彘則天子皮辨召牛納而視之卜之吉然後養之固其禮也或言牛或言彘其實一也擇之以辨則豢之以冕禮又宜然也然則行不舉足齊如流冕行之容也頥霤如矢端行之容也剡剡起屨辨行之容也騶虞騶虞尾參於身白虎黑文西方之獸也王者有至信之德則應不踐生草食自死之肉傳曰白虎仁即此是也夫其色見於白其文見於黑又義獸也而名之曰虎則宜正以殺為事今反不履生草食自死之肉蓋仁之至也故序詩者曰仁如騶虞則王道成也山海經曰騶虞五采畢具尾長於身乘之日行千里犬説文曰狗之有縣蹄者也象形孔子曰視犬之字如畫狗也凡肉豚冝炮犬冝羮故犬曰羮獻而禮有犬羮又楚人烹猴召其鄰以為狗羮而甘之是也禮疏以為犬以餘羮飼之令犬善肥故曰羮獻何其繆也傳曰犬有三種一者田犬二者吠犬三者食犬食犬若今萊牛也五行傳曰雞畜之有冠翼者屬貌犬畜之以口吠者屬言羊畜之逺視者屬視豕畜之居間衛而聼者屬聽牛畜之任重者屬思雜令曰蹄人者絆其足齧人者截其耳此謂犬馬之弗馴者冝示幖幟曉人也説文曰牛觸人角箸橫木所以告人也從口從牛然則示幖幟以告人其來尚矣爾雅曰犬生三猣二師一玂師衆也猣言其叢聚犴犴胡犬也似狐而小黑喙善守其字從干釋言曰干扞也記曰君子狐青裘豹褎麛裘青犴褎豹取制服犴取扞守也周官七射犴侯犴胡犬也其守在夷士以能勝四夷之守為善亦其伏節死制而聼命於主士之事也故射犴侯傳曰桀犬吠堯非堯之罪犬各護其主爾巾車曰漆車藩蔽犴䄙雀飾蓋祥事禫而就吉則其守將在四夷故犴䄙也儀禮曰大侯九十參七十干五十即所謂虎九十弓熊七十弓豹麋皆五十弓者也鄭云參讀為糝糝侯者豹鵠而麋飾干讀為犴犴侯者犴鵠犴飾皆非是王射虎侯則於熊侯豹侯為大故虎侯一名大侯詩傳所謂大侯君侯也參即熊侯言其參於虎侯豹侯之中也干即豹侯言其以下干上又繼熊虎之後也梓人曰張皮侯而棲鵠則春以功張五采之侯則逺國屬張獸侯則王以息燕鄭云皮侯以皮所飾之侯也五采之侯謂以五采畫正之侯也獸侯畫獸之侯也詩曰終日射侯不出正兮正所射也詩傳以為二尺曰正蓋王射采侯九節五正則其居侯中地方丈矣梓人為侯廣與崇方參分其廣而鵠居一焉鄭氏以為鵠方六尺則大射之鵠小而中難賔射之正大而中易理或然也吕子曰射帖者欲中小射獸者欲中大然則大射射鵠賔射射正鄉射射質燕射則因鄉射之侯鄭氏注儀禮以為燕射乃張獸侯而鄉射當張采侯二正又誤矣諸侯之射也必先行燕禮大夫之射也必先行鄉飲酒之禮故其射侯皆相因而記鄉射者正言獸侯如梓人燕禮又以謂若射則大射正為司射如鄉射之禮也司裘職曰王大射則共虎侯熊侯豹侯設其鵠則大射射鵠之證也射人職曰王以六耦射三侯三獲三容樂以騶虞九節五正則賔射射正之證也三侯即虎侯熊侯豹侯其侯中皆以五采畫正所謂五采之侯鄭云三侯五正三正二正之侯又誤矣射人曰王射三侯九節五正則明此三侯皆九節五正下云士射犴侯五節二正則又明犴侯內以二采畫正士射犴侯內以二采畫正則王射五采畫正之侯亦以虎侯熊侯豹侯明矣下云若王大射則以貍步張三侯則又明此五采畫正之侯既不棲鵠又不以貍步張之所以異於大射者如此且王大射則張皮侯而棲鵠又獨張以貍步者蓋於此以擇士則宜擬度而取焉又欲其中微故放貍步而棲鵠也鴻鵠一舉千里射者難中故於大射射之以擇其巧者鄉射禮曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質則鄉射射質之證也質亦所射也詩曰發彼有的傳云的質也後鄭以為白質赤質皆謂采其地亦誤矣蓋禮曰大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質則明凡此布侯畫獸乃射丹質而熊侯白質麋侯赤質非畫者矣鄭氏云丹質謂以丹采其地亦誤也然則皮侯無正有鵠采侯無鵠有正獸侯有質無鵠無正司弓矢曰澤共射椹質之弓矢正弓弧弓以授射甲革椹質則澤射椹質所以選試其力孟子曰其至爾力也其中非爾力夾弓庾弓以授射犴侯鳥獸者蓋犴侯五十步而士以弱弓射之則其力之強弱莫知焉故使於澤宫先射椹質已射於澤而後射於射宫則於是焉張皮侯而棲鵠又以擇其巧巧力不具非所以為善射埤雅卷五
