body:
  text: 欽定四庫全書經部十埤雅小學類一訓詁之屬提要臣等謹案埤雅二十卷宋陸佃撰佃字農師越州山隂人少從學於王安石熙寧三年擢甲科授蔡州推官選為鄆州教授召補國子監直講厯官至尚書左丞未幾罷為中大夫出知亳州卒於官宋史本𫝊稱其精於禮家名數之學著書二百四十二卷如埤雅禮象春秋後𫝊皆𫝊於世王應麟玉海記其修說文解字子宰作埤雅序又稱其有詩講義爾雅注今爾雅新義僅散見永樂大典内餘俱亡佚不見獨是書尚傳其書釋魚二卷釋獸三卷釋鳥四卷釋蟲二卷釋馬一卷釋木二卷釋草四卷釋天二卷刋本釋天之末注後缺字然則原書不止此矣陸宰記佃神宗時預修說文進書召對言及物性因進說魚說木二篇後乃益加筆削初名物生門類後注爾雅畢更修此書易名埤雅言為爾雅之輔也其說諸物大抵畧于形狀而詳於名義尋究偏旁比附形聲務求其得名之所以然而曼衍縱横旁推其理以申之多引王安石字說葢佃以不附新法故後入元祐黨籍其學問則末嘗有異於安石晁公武謂其不専主王氏亦似特立是悞以論其人者論其書也乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
