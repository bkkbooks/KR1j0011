body:
  text: 埤雅卷七音釋鷖醫鳲尸鶌窟隼錐鵜啼鴟尺之鶂逆潨在宗頡結鸍施慤殼鶤昆摰至鉉胡犬跱丈巳郯談皥昊鵙鷩别秸戞雔讎呼霸鵃嘲鷽學泆余質㖡夜鳻分䳕浮鵴掬􅝣唯辟𪆴巨惟鳺夫鴀浮栩香羽嘏古鴮烏鸅澤囮由瞀木輈周磔責鸋寧鷇叩鷊隔之然眄盼澥蟹擭畫阪返貙樞系鴠旦毿參沓踏咮竹救麀憂翯學
