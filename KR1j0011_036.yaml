body:
  text: 欽定四庫全書埤雅卷十九宋陸佃撰釋天天雨雲雪雹風天傳曰尊而君之則稱皇天周道至於泂酌於是為至故稱皇天皇天言乎其道也書曰皇天眷命奄有四海為天下君言堯道格于皇天故皇天眷命也又曰在昔成湯既受命時則有若伊尹格于皇天在大戊時則有若伊陟臣扈格于上帝巫咸乂王家伊尹以道佐人主者故曰格于皇天伊陟臣扈巫咸遞降伊尹一等故伊陟臣扈曰格于上帝巫咸曰乂王家而已上帝亦曰五帝五帝五精之君也周官大宰正言祀五帝者蓋其德以享先王則為有餘以祀大神示則為不足故於祀大神示享先王曰亦如之也蓋能乂王家則可以享先王矣不能格于皇天則不足以正祀昊天昊天者大神也五帝則繼昊天者也夏曰昊天則帝與萬物相見之時故禮於天祀皆主言昊天而已大司冦曰若禋祀五帝則戒之日涖誓百官大宰稱祀不言禋者精意以享曰禋大宰所以佐王事上帝大矣主以道揆無所事意故也然則士師乃言祀五帝則沃尸又不言禋則精意以享非士師所及故也大宰不言禋過禋之言也士師不言禋非過禋之言也不及禋之言也夫言豈一端而已亦各有所當也爾雅曰春為蒼天夏為昊天秋為旻天冬為上天於春言其色於夏言其氣於秋言其情於冬言其位相備也傳曰蒼天以體言之元氣廣大則稱昊天仁覆閔下則稱旻天自上降監則稱上天據逺視之蒼蒼然則稱蒼天春為蒼天則於夏為皥於冬為玄矣莊子曰玄天弗成又曰有而為其易耶易之者皥天不宜玄天者言乎其道也皥天者言乎其德也又曰天之蒼蒼其正色耶逺而無所至極耶故詩於髙逺難訴每稱蒼天黍離曰悠悠蒼天此何人哉巷伯曰蒼天蒼天視彼驕人矜此勞人黃鳥曰彼蒼者天殱我良人是也爾雅曰穹蒼蒼天也穹言形蒼言色也桑柔之詩初曰倬彼昊天寧不我矜言昊天則猶望之以其明也次曰靡有旅力以念穹蒼言方是時厲王無道甚矣天下大亂小人知念土宇而君子反無旅力以念穹蒼也昊天者大以明與玄天反詩曰浩浩昊天不駿其德蓋冬曰上天上天則宜玄其德矣夏曰昊天昊天則宜駿其德矣今曰浩浩昊天不駿其德則失其所以為天矣書曰欽若昊天歷象日月星辰正言昊天則主氣言之故也莊子曰伏戲得之以襲氣母伏戲得之以襲氣母故於昊為大月令曰其帝大皥是也禮曰秋之為言愁也方是時萬物凋落而愁矣天是以閔焉詩序曰旻閔也幽王之詩始曰昊天疾威後曰旻天疾威昊天疾威尚非所宜旻天疾威則尤非所宜矣書曰號泣于旻天正言旻天則望之以其閔也禮曰旻天不弔意亦是也傳曰上天言時無事在上臨下而已詩曰明明上天照臨下土蓋悠悠蒼天貌明明昊天貌髙髙上天貌蒼天悠悠而巧言曰悠悠昊天昊天明明而小明曰明明上天則皆失其所宜非所以為天矣蓋周之興也燕及皇天及其亂也非特萬物失其性雖天猶失其所宜矣故昊天之德不駿而上天之道不玄也昊天者大而明也大所以臨下明所以照下至冬則其於命也復矣故天玄而上地黃而下也天玄而上地黃而下則照臨有所不至矣故是詩名篇曰小明而言其照臨以上天也雨説文曰水從雲下也天地之氣怒而為風和而為雨故凡易稱雨者皆和之象詩曰有淹萋萋興雨祁祁淹隂雲也亦或作淹水氣之雲也傳曰雨雲水氣萋萋盛貌祁祁徐貌蓋雲欲盛盛則雨足雨欲徐徐則入土且亦雲氣不待族而雨者非隂陽之和也故詩雲以萋萋雨以祁祁為善詩曰靈雨既零命彼倌人星言夙駕説于桑田瑞應圖曰靈雨瑞雨也降而應物謂之靈雨星晴也言夜而雨夙而星見於是督勸農桑此傳所謂務材訓農者也鹽鐵論曰周公之時雨不破塊風不鳴條雨則必以夜夜者正雨之時詩曰我來自東零雨其濛濛善沾濡又喜隂結不解羇旅之愁於是為甚故詩以言其情也雨無正曰雨自上下者也衆多如雨而非所以為政也政者正也夫文一止為正衆多如雨則無正矣詩曰月離于畢俾滂沱矣又曰益之以霡霂滂沱大雨也小雨謂之霡霂釋名曰言才霂瀝霑漬如人之沐唯及其上支而已根不濡也蓋霡膏潤入土如人之脈故曰霡也説文曰秋穜厚薶故謂之麥然則霂言其上霡言其下矣詩曰芃芃黍苗隂雨膏之方黍之苗也暑雨暴息無隂雲以覆之日隨蒸焉則苗稿矣將以潤之乃所以害之也故詩正以隂雨為善今俗五月謂之分龍雨曰隔轍言夏雨多暴至龍各有分域雨暘往往隔一轍而異也易曰密雲不雨自我西郊言小畜畜也升氣又自乎西故能為密雲而已傳曰疾雨曰驟雨徐雨曰零雨雨久曰苦雨又曰愁霖雨晴曰霽雨而書晴曰啓雨水曰潦時雨曰澍雲古文雲字作云象雲回轉之形其上從二二者天中之隂也天中之隂應之於上故地中之陽升而為雲蓋隂陽之氣自下而上阻於一則為丂應於二則為亏應於二而盤薄則為雲云旋也亏者象其氣之舒亏莊子曰於亏以蓋衆義蓋取此古文雲字又有雲氣盤薄之形與乃字相類者乃字説文以為象氣出之難氣自下而上至上而不得達所以為氣出之難也春秋傳以為乃者難辭其以此乎今云又為云為之云云有應而言也易曰變化云為吉事有祥象事知器占事知來變化云為聖人之事也故能常與吉會而占事知來象事知器云如雲為象母猴制字之意皆以天事言之故易君子謂之言行聖人謂之云為詩曰洽比其鄰昏姻孔云傳曰云旋也言幽王之時小人有酒食以洽比其鄰里周旋其昏姻云象周旋盤薄之形故云旋也此以形訓詩曰薈兮蔚兮南山朝隮婉兮孌兮季女斯飢言小人在上膏澤不下於民則柔良於是失職薈會也蔚鬱也隂陽鬱而成雲蒸而成雨會而成雲散而成雨傳曰隂凝上結則合而成雲陽散下流則降而為雨地氣上為雲隂中之陽也天氣下為雨陽中之隂也雨出地氣雲出天氣故陽上薄隂隂能固之然後蒸而為雨雨者隂陽之和也然而朝雲喜暘暮雲喜雨故詩言薈蔚不雨之雲又言朝隮也賦曰朝為行雲暮為行雨傳曰日將旦清風發羣隂伏則朝者隂散之時非所以為雨矣淮南子曰山雲草莽水雲魚鱗旱雲煙火涔雲波水詩曰薈兮蔚兮南山朝隮則山雲草莽於此見矣論衡曰大山雨天下小山雨一國南山曹之南山則雨一國之山也故詩主以言之晉天文志曰韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬雲者氣也地氣異矣故雲之成象亦以不同則山雲草莽水雲魚鱗理或然也左傳以為分至啓閉必書雲物蓋吉凶之兆有在於雲者故先王占焉傳曰青為蟲白為兵赤為旱黑為水黃為豐年此五雲吉凶之祲也莊子曰乘雲氣御飛龍而遊乎六合之外神人者乘虛不墜觸實不礙故能狎虎兕貫金石乘雲霧而浮遊如此詩曰上天同雲雨雪氛氛冬曰上天夏則天降而下冬則天升而上燠則雲暘而異寒則雲隂而同故也董子曰太平之世風不鳴條開甲散萌而已矣雨不破塊潤葉津莖而已矣霧不塞望浸淫被泊而已矣雪不封樹凌殄毒害而已矣雲五色而為慶三色而成矞或曰二色曰矞外赤內青謂之矞雲太玄曰紫霓矞雲朋圍日其疾不割紫霓矞雲朋圍日君子小人並進之象也君子小人並進此其疾者所以不割也測曰紫霓矞雲不知刋也言紫霓矞雲並進則以紫霓不刋故也紫霓以象小人矞雲以象君子雪説文曰凝雨説物者從彗蓋雪雨之可掃者也亦能淨坌穢若彗所謂以黍雪桃者以淨為義詩曰雨雪瀌瀌見晛曰消雨雪浮浮見晛曰流言君子體道在上而小人之類易消如此晛日氣也纂要曰日光曰景日影曰晷日氣曰晛日初出曰明日昕曰晞日溫曰煦在午曰亭午在未曰昳日晚曰旰日將暮曰薄暮詩曰上天同雲雨雪氛氛益之以霡霂既優既渥既霑既足氛氛盛也三農之事雪則欲盛而遍也雨則欲微而潤也蓋豐年之冬必有積雪而其春必有小雨故是詩雨言小雪言盛也雪則欲其盛矣然又欲其澤浸之甚周也故繼之曰既優既渥雨則欲其微矣然又欲其膏潤之僅足也故繼之曰既霑既足蓋驟雨不如久雪之入土深且無泛溺又可以覆陽於根著汜勝之書曰雪者五榖之精取汁以漬原蠶之沙和榖種之奈旱今雪寒甚則為粒淺則成華華謂之霙韓詩外傳云雪華曰霙凡草木華多五出雪華獨六出是也詩曰如彼雨雪先集維霰言雪之所加物有死者霰其先至者也霰至則危亡之兆見矣霜霰隂剛之微也霜集而後堅冰至霰集而後雪至故詩易以為始亂之象爾雅曰雨霰為霄雪霰從晛省霄從消省詩曰見晛曰消蓋雪以微溫薄之故散而成霰郭璞所謂氷雪雜下謂之消雪是也説文曰霰稷雪也閩俗謂之米雪言其霰粒如米所謂稷雪義蓋如此今名澀雪亦曰濕雪然臘雪握之輒聚立春以後不復可摶略如霄雪亦以微溫薄之故也里語以為春雪不能蠲壓瘴癘其以此乎夏小正曰農及雪澤言雪澤之無髙下也雹陽散隂為霰隂包陽為雹曽子曰陽之專氣為雹隂之專氣為霰是也申豐以為古者藏冰固隂沍寒而無雹蓋陽無所泄雹之所以生也雹形今似半珠其粒皆三出蓋雪六出而成華雹三出而成實此隂陽之辨也雪霜之類雹冰之類造化權輿曰雹者雨之冰也又曰東方之氣雷南方之氣電西方之氣虹霓北方之氣雲雨雹霰雪傳曰木再華夏有雹豈以陽始無所泄及其晚出也故木至再華而夏有雹歟風天地之氣噓而成雲噫而成風雲陽而出於隂風隂而出於陽爾雅曰南風謂之凱風東風謂之谷風北風謂之涼風西風謂之泰風凱風言其情谷風言其自涼風言其德泰風言其交詩曰大風有隧有空大谷言大谷者大風之自也故曰谷風言其自易曰巽為風巽東南也今風更生於西則與兊之氣交矣故曰泰風言其交谷風風之厚者涼風薄也故谷風以刺俗薄朋友夫婦離絶詩曰習習谷風以隂以雨又曰習習谷風維山崔嵬無草不死無木不萎言谷風之於天不能皆雨也亦或以隂其於地也又不能皆生也亦有萎死者然則人事豈可以責其全哉又曰凱風自南吹彼棘心凱樂也憂釋而為樂怒釋而為凱南風謂之凱風則天地之怒氣於是釋焉故也詩曰北風其涼雨雪其雱北風其喈雨雪其霏風以譬威雪以譬虐雱蓋言聚霏蓋言散涼者其刻也喈者其和也自今觀之雪勢布散無所不加其意或未艾也則風候更和故是詩風以其喈雪以其霏為後喈喈聲和也氣和則聲和矣詩曰終風且暴終風且霾卒曰曀曀其隂虺虺其靁日出而風為暴風而雨土為霾隂而風為曀霾下也曀上也此言州吁之暴逮於上下如風暴矣又增以霾如風霾矣又增以曀如風曀矣又增以雷明有加也傳曰積風成雷其此之謂乎爾雅曰焚輪謂之穨扶搖謂之猋郭璞以為穨暴風從上下也猋暴風從下上也按詩傳云穨風之焚輪者風薄相扶而上也則與璞之意異矣蓋風之鋭而上者為猋風之旋而上者為穨莊子曰摶扶搖羊角而上者九萬里扶搖即猋是也羊角即穨是也今羊角轉旋而上如焰焚輪之象也谷風一章曰維風及雨二章曰維風及穨雨者朋友相與致其道以下達之況也穨者朋友相與致其道以上達之況也蓼莪初曰南山烈烈飄風發發卒曰南山律律飄風弗弗回風謂之飄風荀子所謂輕利僄遫卒如飄風者也發發暴也弗弗亂也烈烈以言幽王不惠律律以言幽王不平詩曰匪風發兮匪車偈兮説曰匪風發兮是非有道之風也發發者匪車偈兮是非有道之車也偈偈者風生於火故物或以風化亦或以火西方之鹽以風化也東方之鹽以火化也易曰風自火出家人取其化自內出之象詩序曰關雎風之始也所以風天下而正夫婦也水生雨雨更以成水火生風風更以成火爾雅曰風與火為庉以此故也風經曰調暢祥和天之喜氣也折揚奔厲天之怒氣也風者氣也得怒之氣則暴得喜之氣則和得金之氣則涼得木之氣則溫得火之氣則炎得水之氣則烈列子曰當春而叩商絃以召南吕涼風忽至草木成實及秋而叩角絃以激夾鐘溫風徐回草木發榮命宫而總四絃則景風翔慶雲浮甘露降醴泉涌爾雅曰四時和為通正謂之景風景風者天地中和之氣也淮南子曰東風至而酒湛溢造化權輿以為東方之氣風也故凍非東風不能解湛非東風不能溢風俗通曰猛風曰颲涼風曰瀏微風曰飉小風曰颼埤雅卷十九
