body:
  text: 埤雅卷一音釋虯求姤古候夬公快殫丹熾昌志赬丑真罶力九鱧里鰋偃鱨市羊魾毗訏吁鱮似吕鰹堅鮦直壟鮵奪鱒才損鯶乎衮罭域覯公候鮅卑吉鮪偉鱣知連淰奴感鰓腮輭乳兗罛孤濊豁鱍市活噞宜檢喁魚凶鮀它鰡流婺離笱古後䱗飱鮒扶句沫亡活鬐其麤粗蚌棒鰌秋鱓它鰼習律􅣜徐占䱇市演豢乎患豻岸
