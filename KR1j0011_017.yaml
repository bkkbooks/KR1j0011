  text: 埤雅卷九音釋鷘勑􅠃式鶪決翪粽鸊布覔獍竟貙樞袚拂臛乎各黮椹鶺即刁虦棧犉而純憋撇雋徂兖鷕以沼呷乎甲哠號漬積巂胡圭鶗題湎免俯俯鉼餅緤絏瞼檢眨插鷊鶂甓闢卭窮鴇保胾恣腯徒骨齝丑之􅟇力唐鴔皮及鵀女林鷸以律矞其律衒胡絹舄昔
