body:
  text: 欽定四庫全書埤雅卷十五宋陸佃撰釋草竹蓬蒿蘩荇蘋藻海藻蕭菱虞蓼卷耳萑芥芡竹竹物之有筋節者也故蒼史制字筋節皆從竹爾雅曰東南之美者有會稽之竹箭焉今竹性亦喜東南引生故古之種法云斸取東南引根於園角西北種之久之自當滿園語曰西家種竹東家治地言其滋引而生來也易曰方以類聚竹引東南則以卦推之巽為竹矣震東方也故震為蒼筤竹而已蒼筤幼竹也今人穿沐叢竹芟其繁亂不使分其勢然後枝幹茂擢俗謂之洗洗竹第如洗華例非用水也傳曰淇衛箘簬又曰淇衛之箭又曰下淇園之竹以為楗又曰伐淇園之竹以為矢蓋淇之産竹土地所宜故風人以此美武公之德也詩曰瞻彼淇奧緑竹猗猗瞻彼淇奧緑竹青青竹之初生其色緑長則緑轉而青矣故是詩如此然其卒章又曰如簀如簀言盛也且曰如簀則又以明其為竹矣禮器曰禮器是故大備大備盛德也其在人也如竹箭之有筠蓋曰如切如瑳如琢如磨則禮至於器矣禮器是故大備大備盛德也故詩曰有匪君子終不可諼兮道盛德至善民之不能忘也國語曰及其沒也謂之睿聖武公然則武公其殆聖矣乎爾雅曰如竹箭曰苞如松柏曰茂苞言其本茂言其末竹性叢生行鞭深逺故曰苞詩曰秩秩斯干幽幽南山如竹苞矣如松茂矣干言原流之長也山言基址之固也竹言根本叢緻松言枝葉繁衍蓋不如是雖有室豈足藥哉故考室之詩首章如此竹譜曰北方寒冰至冬地凍竹根類淺故不能植為是故也爾雅又曰莽數節桃枝四寸有節粼堅中簢筡中凡此皆竹之類一疏一數一虛一實爾雅又曰簜竹孫炎以為濶節為簜按儀禮簜在建鼓之間簜蓋簫屬明非數節者也舊説竹率六十年根輒一易即華實而枯死實落於土復生六年成疃稽聖賦曰竹布實而根枯蕉舒花而株稿禮斬衰杖竹齊衰杖桐説者以為竹圎效天桐方法地又曰竹者蹙也桐者痛也竹外節桐內節喪禮以壓於父故為母期則其節有不得逹於外矣且桐削杖亦以明其眚禮夫父不可亢也然母亦豈可略哉故齊衰杖桐削之使勿充而已檀弓曰竹不成用瓦不成味木不成斫竹言用瓦言味木言斫相備也竹曰不成用主其質言之木曰不成斫主其文言之其曰瓦不成味則言以受飲食又不足以成味也荀子曰木器不成斫陶器不成物薄器不成內變味言物變用言內其義一也説文云竹冬生草也象形下垂者箁箬也蓋竹從倒草竹草也而冬不死故從倒草一曰竹倒種故從倒草其萌曰筍筍從包從日包之日為筍解之日為竹一曰從旬旬內為筍旬外為竹今俗呼竹為妬母草言筍旬有六日而齊母蓬釋草云齧雕蓬薦黍蓬詩曰首如飛蓬蓬蒿屬草之不理者也其葉散生如蓬末大於本故遇風輒拔而旋説苑曰秋蓬惡於根本而美於枝葉秋風一起根且拔矣是以君子務本也騶虞一章曰彼茁者葭二章曰彼茁者蓬葭澤草也蓬陸草也故詩以言庶類蕃殖書曰疇若豫上下草木鳥獸莊子曰夫子猶有蓬之心也夫蓬善轉旋非直逹者也商子曰飛蓬遇飄風而行千里乘風之勢也蓋蓬有利轉之象故古者觀浮木而知為舟觀轉蓬而知為車然蓬雖轉徙無常其相遇往往而有也故其制字從逢東觀漢記曰栗駭蓬轉因遇際會管子曰無儀法程式蜚搖而無所定謂之蜚蓬之問蜚蓬之問明主不聽也故詩曰匪先民是程匪大猷是經大夫以刺幽王蒿晏子曰蒿草之髙者也爾雅曰蘩之醜秋為蒿蓋蘩之類至秋則髙大矣故通呼為蒿也又曰蒿菣蔚牡菣今人呼青蒿香中炙啖者為菣青蒿蒿背之不白者也詩曰蓼蓼者莪匪莪伊蒿蓼蓼者莪匪莪伊蔚以言憂思亂其精神故目視昏華視莪以為蒿蔚也蔚大於蒿故前曰蒿後曰蔚也莊子所謂蒿目放於此乎説文耄從蒿省蓋五十象艾六十象蓍七十象蒿艾治也蒿亂也莊子曰是其於辨也將妄鑿垣墻而殖蓬蒿也蓬蒿以言穢亂管子曰今鳳皇麒麟不來嘉榖不生而蓬蒿藜莠茂鴟梟數至蒿之類至多如青蒿一類自有兩種有黃色者有青色者本草謂之青蒿亦恐有別也陜西綏銀之間有青蒿在蒿叢之間時有一兩株逈然青色土人謂之香蒿莖葉與常蒿悉同但比常蒿色青翠一如松檜之色至深秋餘蒿並黃此蒿猶青氣稍芬香恐古人所用以此為勝蘩蒿青而髙蘩白而繁爾雅曰蘩皤蒿白蒿也葉粗於青蒿從初生至枯白於衆蒿欲似細艾者所在有之故曰皤蒿也今俗謂之蓬蒿可以為菹箋云豆薦蘩菹是也一曰由胡廣雅曰由胡白蒿也北海謂之旁勃夏小正曰蘩由胡由胡旁勃也詩曰于以采蘩于沼于沚蘩所以祭也于沼于水之外也于沚于水之內也荇采之左右蘩采之內外蘋藻采之上下則其位彌下者其事亦彌繁故也傳曰夫人執蘩菜以助祭神饗德與信不求備焉王后則荇菜也國語曰王后親織玄紞公侯之夫人加以紘綎卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫與此同意七月之詩曰春日遲遲采蘩祁祁傳曰采蘩所以生蠶也蓋農功有早晚蠶事有先後故言求桑于前以箸蠶之早者采蘩于後以箸蠶之晚者今覆蠶種尚用蒿云仙經曰白蒿白兔食之仙爾雅曰蘩菟蒵豈謂是歟采蘩先言于沼于沚後言于澗之中言夫人於事有進而無退采蘋言澗在前米蘩言澗在後夫人嫌於事不勤大夫妻嫌於德不劭也荇爾雅曰莕接余其葉苻蓋荇一名接余亦或謂之鳬葵叢生水中莖如叉股葉在莖端隨水淺深詩曰參差荇菜左右流之三相參為參兩相差為差參差言其出之無類左右言其求之無方王文公曰菨餘詩雖以比淑女然后妃所求皆同德者則菨餘惟后妃可比焉其德行如此可以妾餘草矣若蘩蘋藻所謂餘草舊説藻華白荇華黃顔氏家訓云今荇菜是水悉有之黃華似蓴是也夫后祭荇夫人祭蘩大夫妻祭蘋藻而詩之言荇止於芼之而已蘩則曰于以用之蘋藻則至于盛之湘之奠之無所不為焉亦其位彌髙者其事亦彌略之證也又后妃言河夫人大夫妻言澗后妃言洲夫人言沼言沚大夫妻言瀕言潦亦言之殺也且蘋蘩蕰藻溪澗沼沚之毛也而荇則異矣故后妃采荇詩傳以為夫人執蘩菜以助祭神饗德與信不求備焉沼沚溪澗之草猶可以薦后妃則荇菜也據此荇菜厚於蘋蘩故曰后妃有關雎之德乃能共荇菜備庶物以事宗廟荇之言行也蘋言賔藻言澡蘩言盛然則荇菜言采言芼是亦共之而已故教成之祭芼用蘋藻以成婦順易曰德言盛禮言恭又曰君子以成德為行然則后妃采荇夫人采蘩大夫妻采蘋藻固有次第哉且后妃夫人采一大夫妻采二二而足非其至也許大夫妻者不一而足蘋昏義曰教成祭之牲用魚芼之以蘋藻所以成婦順也蘋之言賔也藻之言澡也魚亦柔巽隱伏故此三者昏禮以成婦順韓詩曰沈者曰蘋浮者曰藻蓋藻萍類也似槐葉而連生生道旁淺水中與萍雜至秋則紫今俗謂之馬薸亦呼紫薸故曰于以采藻于彼行潦而傳云藻聚藻也吕覽曰菜之美者崑崙之蘋髙誘謂蘋大蘋水藻也據此蘋即所謂藻水深潔處乃有故曰于以采蘋南澗之濵也先言于以采蘋南澗之濵後言于以采藻于彼行潦亦言大夫妻之德有隆而無殺左傳曰潢汙行潦之水蘋蘩蕰藻之菜可薦於鬼神可羞於王公淮南子曰容華生蔈蔈生萍藻萍藻生浮草謂是歟蓋非蒲藻之藻萍藻之藻浮蒲藻之藻沈草木疏以為葉似蓬蒿莖如叉股而大謂之聚藻類矣按顔氏家訓云莙牛藻也即璣所謂如蓬者也郭璞注三蒼亦云蕰藻之類則明非蕰藻蕰藻一名聚藻蕰聚也藻出乎水之上蘋出乎水之下故大夫妻采之然而采蘩曰可以奉祭祀而采蘋言共者蓋曰于以用之公侯之宫則所謂奉也于以奠之宗室牖下則是共之而已若然誰其尸之有齊季女者祭主也蓋非大夫妻春秋傳曰濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也説者以為季蘭季女佩蘭者也然則大夫之妻教成之祭共蘋藻為於是使女之季者佩蘭主而奉之故傳以為季女微主也藻藻水草之有文者出乎水下而不能出水之上其字從澡言自潔如澡也書曰藻火粉米藻取其清火取其明也周官希冕四章自藻而下其章不足道也故謂之希冕希冕言其數也玄冕二章自黼而下其數不足道也故謂之玄冕玄冕言其色也先儒以為希冕三章玄冕一章非是也孔子曰黼衣黻裳者不茹葷非不能食也服使然也蓋玄冕繪黼於衣繡黻於裳大祭則王服以齊故曰不茹葷也中祭而下則服玄端然則禮曰齊之玄也以幽隂思也玄冕亦爾非特玄端而已禮曰玄冕齊戒詩曰又何子之玄衮及黼黼玄冕也以衮舉上以黼舉下蓋言之法也由此觀之玄冕兩章則希冕四章明矣蓋子男之服毳冕五章則人君所服盡於此矣人君所服盡於毳冕則希冕而下臣服也故禮自毳冕而上章數皆以竒自希冕而下章數皆以偶竒陽也偶隂也孔子曰管仲鏤簋而朱紘山節而藻梲賢大夫也而難為上也説者以為藻取其文蓋藻非特為取其文亦以禳火今屋上覆橑謂之藻井取象於此亦曰綺井又謂之覆海亦或謂之罳項風俗通曰殿堂宫室象東井形刻作荷菱荷菱水草也所以厭火與此同義詩曰魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈蓋魚性食藻王者德至淵泉則藻茂而魚肥故以頒首莘尾為得其性莊子曰在之也者恐天下之淫其性也故三章皆曰魚在在藻王在在鎬也且周之興也憂勤在豐其豈樂在鎬豈樂在鎬其嘉樂在洛故是詩正言樂豈蓋憂釋而為樂怒釋而為豈尚書大傳曰周書自泰誓就召誥而盛於洛誥傳曰士卒鳬藻言其和睦歡恱如鳬之戲於水藻也或言魚藻亦以其如此海藻爾雅曰􅙛海薻如水藻而大似髮黑色生深海中陳藏器本草以為爾雅所謂綸似綸組似組東海有之正為二藻也善療瘤癭夫頸處險而癭今汝洛間多焉而浙右閩廣山嶺重阻人鮮病之者按本草海藻昆布青苔紫菜皆療瘤癭結氣被海之邦食此故能療之也蕭蕭可以祭故其字從肅亦秋風之過蕭意象肅然故蕭一名荻其字從肅也爾雅曰蕭荻蕭似白蒿莖粗科生有香氣故祭祀以脂爇之詩曰取蕭祭脂凡祭灌鬯求諸隂焫蕭求諸陽奏樂求諸隂陽之間故禮曰聲音之號所以告詔於天地之間也又曰見以蕭光以報氣也加以鬱鬯以報魄也凡祭言鬯常先於蕭今祭義言鬯更在蕭後則以言商禮故也蓋周人先求諸隂故先灌鬯焫蕭在後商人先求諸陽故先焫蕭灌鬯在後且周祭肺商祭肝故祭義言商禮先舉肝所謂羞肝肺首心是也郊特牲言周禮先舉肺所謂祭肺肝心是也詩曰洌彼下泉浸彼苞蕭民者上之所恃以事宗廟社稷蕭之象也又曰蓼彼蕭斯零露湑兮蕭微物也而其香能上逹故詩亦以況四海之諸侯蕭今俗謂之牛尾蒿菱爾雅曰菱蕨攗其葉似荇白華實有紫角刺人可食一名芰屈到嗜芰即此是也亦名薢茩説文云楚謂之芰秦謂之薢茩今俗但言菱芰諸盜朱書亦不分別惟武陵記云四角三角曰芰兩角曰菱其花紫色晝合宵炕隨月轉移猶葵之隨日也羣説鏡謂之菱華以其靣平光影所成如此庾信鏡賦云照壁而菱華自生是也虞蓼此即蓼之生水澤者也似蓼莖赤味辛一名薔爾雅曰薔虞蓼是也詩曰其鏄斯趙以薅荼蓼荼陸草也蓼水草也以薅荼蓼則髙下無所不治且因暑雨化之則草不復生而地美蓋非特去草之害亦以醲其田疇故荼蓼朽止於是黍稷茂止也月令季夏燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆此之謂也詩曰未堪家多難豫又集于蓼成王初惑管蔡而疑周公四國之亂幾毁王室則嘗集于蓼矣悟而毖後患故曰未堪家多難豫又集于蓼豫又集于蓼言辛苦也離騷曰蓼蟲不能從乎葵藿則葵藿甘而蓼苦故也吳越春秋曰越王念復吳怨卧則切之以蓼冬則抱冰夏則附火言其刻志如此卷耳爾雅曰菤耳苓耳廣雅曰即枲耳也幽州人謂之爵耳或曰形似鼠耳故有耳之號也或曰白華細莖子如婦人耳璫故名云荆楚記曰卷耳一名璫草亦云蒼耳叢生如盤今人以葉覆麥作黃衣者所在有之詩曰采采卷耳不盈頃筐嗟我懷人置彼周行言后妃持是器采是物而不滿焉則以志在彼不在此也問者曰后妃貴矣今曰采卷耳何也曰是詩也非是之謂也詩人借此以寫后妃之志焉耳故曰説詩者不以文害詞不以詞害意以意逆志是為得之荀子曰頃筐易滿也卷耳易得也然而不可以二周行昔秦穆公謂伯樂曰子姓有可使求馬者乎伯樂對曰良馬可形容筋骨相也天下之馬若滅若沒若亡若失有九方臯此其於馬非臣之下也穆公使行求馬三月而反報曰已得之矣穆公曰何馬也對曰牝而黃使人往取之牡而驪穆公不説召伯樂而謂之曰敗矣子所使求馬者物色牝牡尚弗能知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也若臯之所觀天機也得其精而忘其粗在其內而忘其外若臯之相者乃有貴乎馬者也馬至果天下之馬然則善讀書者若九方臯之相馬可也舊説千嵗之龜巢於蓮葉遊於卷耳之上萑爾雅曰萑蓷荒蔚也葉形似荏方莖白華華生節間如雞冠子黑色細長三稜一名蔚臭劉歆云萑臭穢是也一名益母故曽子見益母而悲也一名蓷詩曰中谷有蓷暵其乾矣旱乾曰暵蓷者能暵之草今曰暵其乾矣則非一日之亢也故序以為凶年飢饉室家相棄爾芥芥似菘而有毛其子如粟傳曰磁石引針琥珀拾芥即此是也或曰草謂之芥琥珀所脅謂草爾故類從以為琥珀脅草也方言曰蘇芥草也江淮南楚之間曰蘇自關而西或曰草或曰芥孟子曰君之視臣如手足則臣視君如腹心君之視臣如土芥則臣視君如寇讎手足有之也土芥曼之也芥辛菜也今人望梅生津食芥墮淚此五液之自外至也慕而涎垂愧而汗發此五液之自內至也化書曰琥珀不能呼腐芥蓋芥腐矣雖琥珀不能呼也故同氣相求乾之二五利焉二五皆龍德故也本草經曰尋萬物之性皆有離合虎嘯風生龍吟雲起磁石引針琥珀拾芥漆得蟹而散麻得漆而湧桂得蔥而軟樹得桂而枯戎鹽纍卵獺膽分杯其氣爽有相關感多如此類其理不可得而思也芡芡葉似荷而大其上有數十蹙衄如沸梂生而有芒刺其中有米可以濟飢傳云蓮芡之屬有橐韜一名雞頭蓋其蓬鐏似雞首故曰雞頭一名雞壅莊子曰藥也其實堇也桔梗也雞壅也豕零也是時為帝者也此言貴賤更事也當其所須則貴雖用而緩則賤豈有常也哉俗云荷華日舒夜斂芡華晝合宵炕此隂陽之異也方言曰北燕謂之䓈青徐淮泗之間謂之芡南楚江淮之間謂之雞頭或謂之鴈頭狀蓋似禽鳥之首故博以名之周官籩人加籩之實菱芡栗脯菱芡取之水栗脯取之陸所謂籩豆之實水陸之品也埤雅卷十五
