body:
  text: 欽定四庫全書埤雅卷二宋陸佃撰釋魚龜蟹烏鰂鼉鱉黿蟾蜍蚌蝸蜃貝鰻鱟嘉魚龜龜舊也外骨內肉腸屬于首廣肩無雄與蛇為匹故龜與蛇合謂之玄武類從玄龜不咽粟蓋龜善藏久能行氣導引其背微傴韓子謂之穹龜相法以為強脊如龜有後之人也又龜背微坼如皺剝故莊子云宋人有善為不龜手之藥也語曰龜思鱉望今龜鱉皆隔津望卵易曰定天下之吉凶成天下之亹亹者莫大乎蓍龜蓋蓍老龜舊故古以龜卜蓍筮白虎通曰蓍龜者天地之間夀考物也故問之龜象也天産也蓍數也地産也占人曰凡卜筮君占體大夫占色史占墨卜人占坼説文曰兆龜坼也龜灼之而坼坼而後墨與色可知卜人先占坼史占墨次之大夫占色又次之衆占備焉而後君占體以斷吉凶卜之序也故玉藻云卜人定龜史定墨君定體今禮以尊卑之序言之故先占體後占坼與玉藻之序異也墨謂以墨畫龜占其食否洛誥所謂我卜澗水東瀍水西惟洛食傳曰卜必先墨畫龜然後灼之兆順食墨故卜師云揚火以作龜致其墨也筮人曰國之大事先筮而後卜則卜筮必相參用以定吉凶占人所謂以八筮占八頌者也傳曰上有叢蓍下有伏龜則龜筮之必相為用非特人故抑天理也書曰三龜一習吉此龜從也啓籥見書乃并是吉則言蓍從焉而筮書與龜又并吉也公曰體王其無害則言卜筮之體并吉故王其無害矣詩曰爾卜爾筮體無咎言此之謂也先儒引此證君占體之事而又以書為龜書則亦誤矣且開籥案視龜書然後知吉則先曰三龜一習吉是今日適越而昔至也明堂位曰周以黃目黃目蓋以龜目飾尊今龜目黃而許慎解字説罍亦曰龜目酒尊是也化書曰牝牡之道龜龜相顧神交也鶴鶴相唳氣交也言龜雖與蛇合亦有以神交者易曰舍爾靈龜蓋龜有靈德伏匿而噎善潛而不志於養故古者簠簋皆為龜形於其上而大臣以貪墨坐廢者曰簠簋不飾也史氏龜經曰龜生百嵗故居鵲尾之上蟹蟹八跪而二敖水蟲殼堅而脆團臍者牝尖者牡也八月腹內有芒真稻芒也未被霜食之有毒外骨內肉旁行故今里語謂之旁蟹梓人注云却行蚓屬仄行蟹屬是也易曰離為蟹言離卦外剛內柔而性又火燥故為蟹也荀子曰蟹六跪而二敖非蛇鱓之穴無所寄託者用心燥也太玄曰蟹之郭索敖蓋蟹首二鉗如鉞者今蟹皆八跪二敖敖蓋其兵也所以自衛神農本草以為蟹性敗漆燒之致鼠蟹性走明漆見之而輒解名之曰蟹似出於此淮南子曰漆見蟹而不乾此類之不推者也一曰蟹解殼故曰蟹禮曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰言蟹甲象匡其衰之不為兄死猶蟹之有匡豈為蠶之續也哉造化權輿曰龍易骨蛇易皮麋鹿易角蟹易敖折其敖足隨後更生蟹類甚多若蝤蛑擁劒彭螖彭蜞之類凡十數種蝤蛑大者長尺餘兩敖至強能與虎鬭虎不如也隨大潮退殼一退一長擁劒一名桀步豈非以其橫行故謂之桀步歟一敖極小以大者鬭小者食彭蜞有毛海人亦食之蔡謨初渡江食之瀕於死歎曰讀爾雅不熟幾為勸學所誤烏鰂烏鰂八足絶短者集足在口縮喙在腹懷板含墨每遇大魚輒噀墨周其波以衛身害若小蝦魚過其前即吐墨涎惹之南越志曰烏鰂懷墨而知禮江東人或取其墨書契以紿人財物書迹如淡墨逾年自消唯空紙爾舊説烏鰂有矴遇風則虯前一鬚下矴一名纜魚風波稍急即以其鬚黏石為纜蓋此魚每遇大風逺岸則虯前一鬚為矴近岸則黏前一鬚為纜炙轂子曰此魚每遇漁舟即吐墨染水令黑以混其身漁人見水黑則知是網之大獲傳曰欲蓋而彰思存而亡此之謂也肉白皮黑無鱗有鬚鬛甚長蜀本草圖經云􅖂即此是也故義訓云寒烏入水謂之烏鰂鼉鼉具十二少肉蛇肉最後在尾其枕瑩淨魚枕弗如皮中冒鼓夏小正曰剝鼉以為鼓也今豚將風則踴鼉欲雨則鳴故里俗以豚讖風以鼉讖雨詩曰鼉鼓逢逢先儒以為鼉皮堅厚取以冒鼓故曰鼉鼓蓋鼉鼓非特有取於皮亦其鼓聲逢逢然象鼉之鳴故謂之鼉鼓也晉安海物記曰鼉宵鳴如桴鼓今江淮之間謂鼉鳴為鼉鼓亦或謂之鼉更更則以其聲逢逢然如鼓而又善夜鳴其數應更故也今鼉象龍形一名鱓夜鳴應更吳越謂之鱓更蓋如初更輒一鳴而止二即再鳴也舊云鼉性嗜睡目睛常閉能吐霧致雨力亦酋健善頽坎岸一曰獨鳴早鼉鳴夜趙辟公雜説曰鼉聞鼓聲則鳴續博物志曰鼉長一丈一名土龍鱗甲黑色能橫飛不能上騰其聲如鼓鱉鱉以眼聽穹脊連脅甲蟲也水居陸生養魚經曰魚滿三百六十則龍為之長而引飛出水內鱉則魚不復去故鱉一名神守天地之性細腰純雄大腰純雌大腰龜鱉之屬以蛇為雄荀子曰跬步不休跛鱉千里言鱉行蹣跚而又跛焉今其卒致千里則亦不輟焉爾故學不可以已也詩曰炮鱉鮮魚鮮魚中鱠者也又曰炮鱉膾鯉言熟則有炮鱉腥則有膾鯉也假成式云甲蟲影伏羽蟲體伏今鱉伏於淵而卵剖於陵此思化也內典曰鶴影生鱉思生是則思生又與影伏異矣今帽乳卵大如彈丸亦望卵而蔭一如龜鱉呼為護卵世云鱉伏隨日謂隨日光所轉朝首東鄉夕首西鄉也又云鱉之所在其上必有浮沫謂之鱉津捕者以此占之韋氏燕山録曰煮羊以𪕋煮鱉以蚊蓋物之相感如此雖有明智弗能推也黿黿大鱉也鱉以為雄故黿鳴而鱉應所謂雄蟲鳴於上風雌蟲應於下風而風化即此之類是也淮南子曰燒黿致鱉此以其類求之舊説黿亦思化其脂得火可以然鐵一曰黿亦卵生而伏影顔籀稽聖賦曰黿鱉伏乎其隂鸕鷀孕乎其口是也王子年拾遺記曰禹濟巨海黿鼉為梁此與黃帝以虎豹為前驅雕鶡為旗幟無異皆德之所感殆未足多怪也蟾蜍蟾蜍吐生腹大背黑皮上多痱磊跳行舒遲其肪塗玉則軟刻削如蠟本草所謂能合玉石者也又曰蝦蟆一名蟾蜍蓋蝦蟆背有黑點身小能跳接百蟲善鳴與蟾蜍不類故淮南子以為釋大道而任小數無以異於使蟹捕鼠蟾蜍捕蚤不足以禁姦塞邪也酉陽雜爼曰蝦蟆無腸又曰鸛影抱蝦蟆聲抱今里俗聞其春鳴謂之聒子聒子即段所謂聲抱其子謂之科斗大盡生前兩足小盡生後兩足今其一種似蝦蟆而長踦瞋目如怒謂之蛙越王揖怒蛙而武士歸之即此是也蓋其鳴聲哇淫故曰蛙傳曰紫色蛙聲餘分閏位物理論曰虛無之談尚其華藻此猶春蛙秋蟬聒耳而已莊子曰言隱於榮華良有以也抱朴子曰蟾蜍夀至千嵗者頭上有角頷下有丹書八字自然論曰蟾蜍擲糞自其口出又俗説蝦蟆懷土雖取以置逺郊一夕復還其所字説云雖或遐之常慕而反又云黽善怒故音猛而謂怒力為黽詩曰黽勉同心亦蛙善踊故謂之猛今􅪁䗥一名蜢􅪁䗥長瘦善跳言窄而猛也蚌鱉孚乳以夏蚌孚乳以秋蚌聞雷聲則㾭其孕珠若懷妊然故謂之珠胎與月盈朒淮南子所謂日至而糜鹿角解月死而螺蚌膲者也蚌一名蜃墨子曰周之靈圭出於土石楚之明月生於蚌蜃由是觀之士之賢不肖豈有種哉蓋物有非其類而化者若牡礪蚌蛤無隂陽牝牡須雀鴿以化故蚌之久者能生珠專一於隂也海物異名記曰蜃布泥有疆界其蒸氣也為樓莊子曰夫愛馬者以筐盛矢以蜃盛溺適有蛟虻僕緣而拊之不時則缺銜毁首碎胸言矢溺至賤而以禮器盛之愛馬之至也然掩其不意而驚以致敗則失其所以愛矣故意有所至而愛有所亡不可不慎也易曰離為蚌為螺蓋螺之形鋭蚌之形剡且皆外剛內柔而性又善麗故也鬯人曰凡祭祀社壝用大罍禜門用瓢句齎廟用修凡山川四方用蜃凡埋事用概凡疈事用散齎之為言升也修爵也概斗也蓋祭祀罍以盛鬯瓢以酌之修以受之社壝言罍禜門言瓢齎廟言修相備也蜃以盛鬯概以酌之散以受之山川四方言蜃埋事言概疈事言散亦相備也鄭氏讀修為卣誤矣修爵名也荀子曰修爵無數裴頠崇有論曰鳥無胃肺蛤蜃無臟蛭以空中而生蠶以無胃而育蝸釋魚曰蚹螺螔蝓璞云即蝸牛也孫炎正義以為負螺而行因以名之蓋蝸背負殼狀如小螺驚則縮入殼中如螺閉户其肉中醢內則曰蝸醢是也頭有小角故又一名蝸牛莊子所謂戰於蝸角舊説蝸涎規蝎每為蝸牛所食先以涎畫地規之蝎不復去雀豹古今注曰蝸牛陵螺也形如螔蝓殼如小螺熱則自縣於葉下野人為圓舍如蝸牛之殼故曰蝸舍亦曰蝸牛之舍然則螔蝓與蝸牛異矣先儒以為螔蝓無殼蝸似螔蝓而有殼今亦有一種生於卑濕大於蝸牛無殼而有角蓋螔蝓之類也南方積雨蝸涏書畫屋壁悉成銀迹其卑濕如此蜃雜兵書曰東海出氣如鱉渭水出氣如蜃蜃形如蛇而大腰以下鱗盡逆一曰狀似螭龍有耳有角背鬛作紅色噓氣成樓臺望之丹碧隱然如在煙霧髙鳥倦飛就之以息喜且至氣輒吸之而下今俗謂之蜃樓將雨即見史記曰海旁蜃氣成樓臺野氣成宫闕即此是也世云雉與蛇交而生蜃蓋得其脂和蠟為燭香聞百步煙出其上皆成樓閣之狀矣又曰蛇之求於龜則為龜求於雉則為蜃故三物常異而同感也又曰鹿食龜􅕱食蛇蜃食燕子蛟食犀角蛇食茱萸筆談云登州海中時有雲氣如宫室臺觀城堞人物車馬冠蓋之狀謂之海市或云蛟蜃之氣貝獸二為友貝二為朋詩曰錫我百朋百云者言錫貝之多也又曰萋兮斐兮成是貝錦錦文如貝謂之貝錦言讒人因寺人之近嫌而成其罪猶之因萋斐之形而文致之則成是貝錦也貝中肉如科斗而有首尾以其背用故謂之貝貝背也貝之字從目從八言貝目之所背也先王靣朝後市以此古者相背有經其經曰朱仲受之於琴髙琴髙乘魚浮于河海水産必究仲學仙於髙而得其法又獻珠於武帝去不知所之嚴助為會稽太守仲又出遺助以徑尺之貝并致此文於助曰黃帝唐堯夏禹三代之正瑞靈竒之祕寶其有次此者貝盈尺狀如赤電黑雲謂之紫貝素質紅黑謂之珠貝青地緑文謂之綬貝黑文黃畫謂之霞貝紫愈疾珠明目綬消氣障霞服蛆蟲雖不能延齡增夀其禦害一也復有下此者鷹喙蟬脊以逐溫去水無竒功貝大者如輪文王請大秦貝徑半尋穆王得其殼縣於昭觀秦穆公以遺燕鼂可以明目逺察宜玉宜金南海貝如珠礫白駮其性寒其味甘止水毒浮貝使人寡無以近婦人黑白各半是也濯貝使人善驚無以親童子黃脣點齒有赤駮是也雖貝使人病瘧黑鼻無皮是也嚼貝使胎消勿以示孕婦赤帶通脊是也惠貝使人善忘勿以近人赤熾內殼赤絡是也醟貝使童子愚婦人淫有青脣赤鼻是也碧貝使童子盜脊上有縷句脣是也雨則重霽則輕委貝使人志強夜行伏迷鬼狼豹百獸赤中圓是也雨則輕霽則重然則爾雅大者魧小者鰿餘貾黃白文餘泉白黃文蜠大而險􅜽小而橢亦其略也鹽鐵論曰教與俗改敝與世易夏后氏以玄貝周人以紫石鰻鰻無鱗甲白腹似鱔而大青色焚其煙氣辟蠧有雄無雌以影漫鱧而生子趙辟公雜説云凡聒抱者鵂鶹鸛雀也影抱者龜鱉黿也有鰻鱺者以影漫於鱧魚則其子皆附鱧之鬐鬛而生故謂之鰻鱺也一曰鮎亦産鰻蓋其乳子三分之二為鮎其一鰻也鱟鱟狀如便靣骨眼眼在背上口在腹下其血碧雌常負雄而行雄者多肉失雄則不能獨活漁者拾之必得其雙在海中羣行輒相積於背髙尺餘如帆乘風而逰其藏伏沙上亦輒飛躍常逺行迹數步如兔擺蹤今鱟青黑色十二足似蟹腹中有子如粟而大中醢殼上有物如角常偃髙七八寸每遇風至即舉扇風而行俗呼鱟帆舊云視鴟創柂觀鱟制帆是也皮殼甚堅然性畏蚊蚊小螫之輒斃未知其故也又暴之日中往往無恙隙光射之即死嶺表異録云雄小雌大置之水中雄者浮雌者沈嘉魚嘉魚鯉質鱒鱗肌肉甚美食乳泉出於丙穴故南都賦云嘉魚出於丙穴先儒言丙穴在漢中沔南縣北有乳穴二常以三月取之穴口向丙故曰丙也舊言尾象篆文丙字故曰丙穴蓋爾雅魚枕謂之丁魚腸謂之乙魚尾謂之丙則魚尾象丙豈特嘉魚而已禮曰魚去乙乙腸也詩曰南有嘉魚蒸然罩罩言嘉魚欲逸則罩之使入也南有嘉魚蒸然汕汕言嘉魚欲伏則汕之使出也求賢之道如此而已爾雅曰罺謂之汕今之撩罟是也太平君子樂與賢者共之而所以求者上籠之如罩下撩之如汕此至誠之道也淮南子曰罩者抑之罾者舉之為之雖異得魚一也埤雅卷二
