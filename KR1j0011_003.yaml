body:
  text: 欽定四庫全書埤雅卷二宋陸佃撰釋魚龜蠏烏鰂鼉鼈黿蟾蜍蚌蝸蜃貝鰻鱟嘉魚龜龜舊也外骨内肉腸屬于首廣肩無雄與蛇為匹故龜與蛇合謂之𤣥武類從𤣥龜不咽粟蓋龜善藏乆能行氣導引其背微傴韓子謂之穹龜相法以為强脊如龜有後之人也又龜背㣲坼如皺剥故莊子云宋人有善為不龜手之藥也語曰龜思鼈望今龜鼈皆隔津望卵易曰定天下之吉凶成天下之亹亹者莫大乎蓍龜葢蓍老龜舊故古以龜卜蓍筮白虎通曰蓍龜者天地之間夀考物也故問之龜象也天産也蓍數也地産也占人曰凡卜筮君占體大夫占色史占墨卜人占坼說文曰兆龜坼也龜灼之而坼坼而後墨與色可知卜人先占坼史占墨次之大夫占色又次之衆占備焉而後君占體以斷吉凶卜之序也故玉藻云卜人定龜史定墨君定體今禮以尊卑之序言之故先占體後占坼與玉藻之序異也墨謂以墨畫龜占其食否洛誥所謂我卜澗水東瀍水西惟洛食傳曰卜必先墨畫龜然後灼之兆順食墨故卜師云揚火以作龜致其墨也筮人曰國之大事先筮而後卜則卜筮必相參用以定吉凶占人所謂以八筮占八頌者也傳曰上有叢蓍下有伏龜則龜筮之必相為用非特人故抑天理也書曰三龜一習吉此龜從也啓籥見書乃并是吉則言蓍從焉而筮書與龜又并吉也公曰體王其無害則言卜筮之體并吉故王其無害矣詩曰爾卜爾筮體無咎言此之謂也先儒引此證君占體之事而又以書為龜書則亦誤矣且開籥案視龜書然後知吉則先曰三龜一習吉是今日適越而昔至也明堂位曰周以黃目黃目葢以龜目飾尊今龜目黃而許慎解字說罍亦曰龜目酒尊是也化書曰牝牡之道龜龜相顧神交也鶴鶴相唳氣交也言龜雖與蛇合亦有以神交者易曰舎爾靈龜葢龜有靈徳伏匿而噎善潛而不志於養故古者簠簋皆為龜形於其上而大臣以貪墨坐廢者曰簠簋不飾也史氏龜經曰龜生百嵗故居鵲尾之上蠏蠏八跪而二敖水蟲殻堅而脆團臍者牝尖者牡也八月腹内有芒真稻芒也未被霜食之有毒外骨内肉旁行故今里語謂之旁蠏梓人注云却行螾屬仄行蠏屬是也易曰離為蠏言離卦外剛内柔而性又火燥故為蠏也荀子曰蠏六跪而二敖非蛇鱓之穴無所寄託者用心燥也太𤣥曰蠏之郭索敖葢蠏首二鉗如鉞者今蠏皆八跪二敖敖蓋其兵也所以自衛神農本草以為蠏性敗漆燒之致鼠蠏性走明漆見之而輙解名之曰蠏似出於此淮南子曰漆見蠏而不乾此類之不推者也一曰蠏解殻故曰蠏禮曰蠶則績而蠏有匡范則冠而蟬有緌兄則死而子臯為之衰言蠏甲象匡其衰之不為兄死猶蠏之有匡豈為蠶之續也哉造化權輿曰龍易骨蛇易皮麋鹿易角蠏易敖折其敖足隨後更生蠏類甚多若蝤蛑擁劒彭螖彭蜞之類凡十數種蝤蛑大者長尺餘兩敖至强能與虎鬭虎不如也隨大潮退殻一退一長擁劒一名桀歩豈非以其横行故謂之桀歩歟一敖極小以大者鬭小者食彭蜞有毛海人亦食之蔡謨初渡江食之瀕於死歎曰讀爾雅不熟幾為勸學所誤烏鰂烏鰂八足絶短者集足在口縮喙在腹懐板含墨毎遇大魚輙噀墨周其波以衛身害若小鰕魚過其前即吐墨涎惹之南越志曰烏鰂懷墨而知禮江東人或取其墨書契以紿人財物書迹如淡墨逾年自消唯空紙爾舊説烏鰂有矴遇風則虯前一鬚下矴一名纜魚風波稍急即以其鬚黏石為纜葢此魚毎遇大風逺岸則虯前一鬚為矴近岸則黏前一鬚為纜炙轂子曰此魚毎遇漁舟即吐墨染水令黒以混其身漁人見水黒則知是網之大獲傳曰欲葢而彰思存而亡此之謂也肉白皮黑無鱗有鬚鬛甚長蜀本草圖經云􅖂即此是也故義訓云寒烏入水謂之烏鰂鼉鼉具十二少肉蛇肉最後在尾其枕瑩浄魚枕弗如皮中冒鼓夏小正曰剥鼉以為鼓也今㹠將風則踴鼉欲雨則鳴故里俗以㹠䜟風以鼉䜟雨詩曰鼉鼔逢逢先儒以為鼉皮堅厚取以冒鼔故曰鼉鼔葢鼉鼔非特有取於皮亦其鼓聲逢逢然象鼉之鳴故謂之鼉鼔也晉安海物記曰鼉宵鳴如桴鼔今江淮之間謂鼉鳴為鼉鼔亦或謂之鼉更更則以其聲逢逢然如鼔而又善夜鳴其數應更故也今鼉象龍形一名鱓夜鳴應更吳越謂之鱓更蓋如初更輙一鳴而止二即再鳴也舊云鼉性嗜睡目睛常閉能吐霧致雨力亦酋健善頽坎岸一曰獨鳴早鼉鳴夜趙辟公雜説曰鼉聞鼔聲則鳴續博物志曰鼉長一丈一名土龍鱗甲黒色能横飛不能上騰其聲如鼔鼈鼈以眼聽穹脊連脅甲蟲也水居陸生養魚經曰魚滿三百六十則龍為之長而引飛出水内鼈則魚不復去故鼈一名神守天地之性細腰純雄大腰純雌大腰龜鼈之屬以蛇為雄荀子曰跬歩不休跛鼈千里言鼈行蹣跚而又跛焉今其卒致千里則亦不輟焉爾故學不可以已也詩曰炰鼈鮮魚鮮魚中鱠者也又曰炰鼈膾鯉言熟則有炰鼈腥則有膾鯉也叚成式云甲蟲影伏羽蟲體伏今鼈伏於淵而卵剖於陵此思化也内典曰鶴影生鼈思生是則思生又與影伏異矣今帽乳卵大如彈丸亦望卵而䕃一如龜鼈呼為䕶卵世云鼈伏隨日謂隨日光所轉朝首東郷夕首西郷也又云鼈之所在其上必有浮沫謂之鼈津捕者以此占之韋氏燕山録曰煑羊以䶉煑鼈以蚊蓋物之相感如此雖有明智弗能推也黿黿大鼈也鼈以為雄故黿鳴而鼈應所謂雄蟲鳴於上風雌蟲應於下風而風化即此之類是也淮南子曰燒黿致鼈此以其類求之舊說黿亦思化其脂得火可以然鐵一曰黿亦卵生而伏影顔籀稽聖賦曰黿鼈伏乎其隂鸕鷀孕乎其口是也王子年拾遺記曰禹濟巨海黿鼉為梁此與黃帝以虎豹為前驅鵰鶡為旗幟無異皆徳之所感殆未足多怪也蟾蜍蟾蜍吐生腹大背黒皮上多痱磊跳行舒遲其肪塗玉則軟刻削如蠟本草所謂能合玉石者也又曰蝦蟆一名蟾蜍葢蝦蟆背有黒㸃身小能跳接百蟲善鳴與蟾蜍不類故淮南子以為釋大道而任小數無以異於使蠏捕鼠蟾蜍捕蚤不足以禁姦塞邪也酉陽雜爼曰蝦蟆無腸又曰鸛影抱蝦蟆聲抱今里俗聞其春鳴謂之聒子聒子即段所謂聲抱其子謂之科斗大盡生前兩足小盡生後兩足今其一種似蝦蟆而長踦瞋目如怒謂之鼃越王揖怒蛙而武士歸之即此是也蓋其鳴聲哇滛故曰蛙傳曰紫色蛙聲餘分閏位物理論曰虚無之談尚其華藻此猶春蛙秋蟬聒耳而已莊子曰言隠於榮華良有以也抱朴子曰蟾蜍夀至千嵗者頭上有角頷下有丹書八字自然論曰蟾蜍擲糞自其口出又俗説蝦蟆懷土雖取以置逺郊一夕復還其所字説云雖或遐之常慕而反又云黽善怒故音猛而謂怒力為黽詩曰黽勉同心亦蛙善踊故謂之猛今􅪁䗥一名蜢􅪁䗥長瘦善跳言窄而猛也蚌鼈孚乳以夏蚌孚乳以秋蚌聞雷聲則㾭其孕珠若懷妊然故謂之珠胎與月盈朒淮南子所謂日至而糜鹿角解月死而螺蚌膲者也蚌一名蜃墨子曰周之靈珪出於土石楚之明月生於蚌蜃由是觀之士之賢不肖豈有種哉蓋物有非其類而化者若牡礪蚌蛤無隂陽牝牡須雀鴿以化故蚌之乆者能生珠專一於隂也海物異名記曰蜃布泥有疆界其蒸氣也為樓莊子曰夫愛馬者以筐盛矢以蜃盛溺適有蛟蝱僕縁而拊之不時則缺銜毁首碎胷言矢溺至賤而以禮器盛之愛馬之至也然掩其不意而驚以致敗則失其所以愛矣故意有所至而愛有所亡不可不慎也易曰離為蚌為螺蓋螺之形鋭蚌之形剡且皆外剛内柔而性又善麗故也鬯人曰凡祭祀社壝用大罍禜門用瓢句齎廟用脩凡山川四方用蜃凡埋事用概凡疈事用散齎之為言升也脩爵也概斗也蓋祭祀罍以盛鬯瓢以酌之脩以受之社壝言罍禜門言瓢齎廟言脩相備也蜃以盛鬯概以酌之散以受之山川四方言蜃埋事言概疈事言散亦相備也鄭氏讀脩為卣誤矣脩爵名也荀子曰脩爵無數裴頠崇有論曰鳥無胃肺蛤蜃無臓蛭以空中而生蠶以無胃而育蝸釋魚曰蚹蠃螔蝓璞云即蝸牛也孫炎正義以為負螺而行因以名之蓋蝸背負殻狀如小螺驚則縮入殻中如螺閉户其肉中醢内則曰蝸醢是也頭有小角故又一名蝸牛莊子所謂戰於蝸角舊說蝸涎規蝎毎為蝸牛所食先以涎畫地規之蝎不復去雀豹古今注曰蝸牛陵螺也形如螔蝓殻如小螺熱則自縣於葉下野人為圓舍如蝸牛之殻故曰蝸舎亦曰蝸牛之舍然則螔蝓與蝸牛異矣先儒以為螔蝓無殻蝸似螔蝓而有殻今亦有一種生於卑濕大於蝸牛無殻而有角蓋螔蝓之類也南方積雨蝸涏書畫屋壁悉成銀迹其卑濕如此蜃雜兵書曰東海出氣如鼈渭水出氣如蜃蜃形如蛇而大腰以下鱗盡逆一曰狀似螭龍有耳有角背鬛作紅色嘘氣成樓臺望之丹碧隠然如在煙霧髙鳥倦飛就之以息喜且至氣輒吸之而下今俗謂之蜃樓將雨即見史記曰海旁蜃氣成樓臺野氣成宫闕即此是也世云雉與蛇交而生蜃蓋得其脂和蠟為燭香聞百歩煙出其上皆成樓閣之狀矣又曰蛇之求於龜則為龜求於雉則為蜃故三物常異而同感也又曰鹿食龜􅕱食蛇蜃食燕子蛟食犀角蛇食茱萸筆談云登州海中時有雲氣如宫室臺觀城堞人物車馬冠蓋之狀謂之海市或云蛟蜃之氣貝獸二為友貝二為朋詩曰錫我百朋百云者言錫貝之多也又曰萋兮斐兮成是貝錦錦文如貝謂之貝錦言讒人因寺人之近嫌而成其罪猶之因萋斐之形而文致之則成是貝錦也貝中肉如科斗而有首尾以其背用故謂之貝貝背也貝之字从目从八言貝目之所背也先王靣朝後市以此古者相背有經其經曰朱仲受之於琴髙琴髙乗魚浮于河海水産必究仲學仙於髙而得其法又獻珠於武帝去不知所之嚴助為㑹稽太守仲又出遺助以徑尺之貝并致此文於助曰黄帝唐堯夏禹三代之正瑞靈竒之秘寳其有次此者貝盈尺狀如赤電黑雲謂之紫貝素質紅黑謂之珠貝青地緑文謂之綬貝黒文黃畫謂之霞貝紫愈疾珠明目綬消氣障霞服蛆蟲雖不能延齡増夀其禦害一也復有下此者鷹喙蟬脊以逐温去水無竒功貝大者如輪文王請大秦貝徑半尋穆王得其殻縣於昭觀秦穆公以遺燕鼂可以明目逺察宜玉宜金南海貝如珠礫白駮其性寒其味甘止水毒浮貝使人寡無以近婦人黑白各半是也濯貝使人善驚無以親童子黄脣㸃齒有赤駮是也雖貝使人病瘧黒鼻無皮是也嚼貝使胎消勿以示孕婦赤帶通脊是也惠貝使人善忘勿以近人赤熾内殻赤絡是也醟貝使童子愚婦人淫有青脣赤鼻是也碧貝使童子盗脊上有縷句脣是也雨則重霽則輕委貝使人志强夜行伏迷鬼狼豹百獸赤中圓是也雨則輕霽則重然則爾雅大者魧小者鰿餘貾黃白文餘泉白黃文蜠大而險􅜽小而橢亦其略也鹽鐵論曰教與俗改敝與世易夏后氏以𤣥貝周人以紫石鰻鰻無鱗甲白腹似鱔而大青色焚其煙氣辟蠧有雄無雌以影漫鱧而生子趙辟公雜説云凡聒抱者鵂鶹鸛雀也影抱者龜鼈黿也有鰻鱺者以影漫於鱧魚則其子皆附鱧之鬐鬛而生故謂之鰻鱺也一曰鮎亦産鰻蓋其乳子三分之二為鮎其一鰻也鱟鱟狀如便靣骨眼眼在背上口在腹下其血碧雌常負雄而行雄者多肉失雄則不能獨活漁者拾之必得其雙在海中羣行輙相積於背髙尺餘如帆乗風而逰其藏伏沙上亦輙飛躍常逺行迹數歩如兔擺蹤今鱟青黑色十二足似蠏腹中有子如粟而大中醢殻上有物如角常偃髙七八寸毎遇風至即舉扇風而行俗呼鱟帆舊云視鴟創柂觀鱟制帆是也皮殻甚堅然性畏蚊蚊小螫之輙斃未知其故也又暴之日中徃徃無恙隙光射之即死嶺表異録云雄小雌大置之水中雄者浮雌者沈嘉魚嘉魚鯉質鱒鱗肌肉甚美食乳泉出於丙穴故南都賦云嘉魚出於丙穴先儒言丙穴在漢中沔南縣北有乳穴二常以三月取之穴口向丙故曰丙也舊言尾象篆文丙字故曰丙穴蓋爾雅魚枕謂之丁魚腸謂之乙魚尾謂之丙則魚尾象丙豈特嘉魚而已禮曰魚去乙乙腸也詩曰南有嘉魚烝然罩罩言嘉魚欲逸則罩之使入也南有嘉魚蒸然汕汕言嘉魚欲伏則汕之使出也求賢之道如此而已爾雅曰罺謂之汕今之撩罟是也太平君子樂與賢者共之而所以求者上籠之如罩下撩之如汕此至誠之道也淮南子曰罩者抑之罾者舉之為之雖異得魚一也埤雅卷二
