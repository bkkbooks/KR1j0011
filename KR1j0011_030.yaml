body:
  text: 欽定四庫全書埤雅卷十六宋陸佃撰釋草韭薤菘壷瓠匏蒲盧瓜蘢長楚蔏蔞蘪蕪蘋芣苡蓍葦菼韭説文曰一種而久者故謂之韭象形在一之上一地也論衡曰地性生草山性生木故地種葵韭山種棗栗名曰美園茂林也韭者久也一種永生故禮祭宗廟韭曰豐本且其本豐則末殺瘦矣蓋薤之美在白韭之美在黃皆惡其末之盛也齊民要術曰韭髙三寸便翦其以此乎又曰翦如蔥法一嵗之中不過五翦凡翦不用日中故諺曰觸露不搯葵日中不翦韭也韭性內生根喜上跳故種與葵同法而畦欲極深詩曰獻羔祭韭開氷春祭也故獻羔祭韭禮曰春行羔豚又曰春薦韭是也內則曰膾春用蔥秋用芥豚春用韭秋用蓼蔥與芥隂物也韭與蓼陽物也傳曰政道得則隂物變為陽物鄭玄云若蔥為韭是也薤薤宜白軟良地種法一本率七八支諺曰蔥三薤四言種蔥者三支一科薤即四之也支多者科輒圓大故以七八為率爾雅曰薤鴻薈即此是也內則曰脂用蔥膏用薤蔥亦薤屬然葷菜也傳曰五葷錬形蔥者其一也齊民要術以為種蔥良地三翦薄地再翦八月止不止則蔥無袍而損白蓋蔥肉曰白其青謂之袍爾雅曰青謂之蔥詩曰有瑲蔥珩蔥竊青也淮南子曰君子之於善也猶采薪者見青蔥則拔之言無所不取矣崔實曰三月別小蔥六月別大蔥夏蔥曰小冬蔥曰大今其袍皆中虛故脈如蔥葉謂之浮其字從匆今俗米䈡謂之蔥則亦以逹氣故也傳曰鬱鬱蔥蔥佳哉氣也鬱鬱塞也蔥蔥通也菘菘性陵冬不雕四時長見有松之操故其字會意而本草以為交耐霜雪也舊説菘菜北種初年半為蕪菁二年菘種都絶蕪菁南種亦然蓋菘之不生北土猶橘柚之變於淮北矣蕪菁似菘而小有臺一名葑一名須爾雅曰須薞蕪也今俗謂之臺菜方言曰陳楚之間謂之豐趙魏之郊謂之大芥其紫華者謂之蘆蔔一名來蔔所謂溫菘是也來蔔言來牟之所服也壷似匏而圎曰壷壷圜器也故謂之壷亦曰壷盧古今注曰壷盧瓠之無柄者也玄蜂若壷蓋取諸此壷性善浮要之可以涉水南人謂之要舟鶡冠子曰賤生於無所用中流失船一壷千金以此故也詩曰八月斷壷壷性蔓生披蔓斬之故曰斷也今其收法八月冷露降輒先斷其根令其餘蔓飲之已日乃收尤為堅成可用莊子曰今子有五石之瓠何不慮以為大樽而浮乎江湖壷之為樽其來尚矣春秋傳曰樽以魯壷司尊彞曰秋嘗冬蒸祼用斝彞黃彞其朝獻用兩箸尊其饋獻用兩壷尊壷尊箸尊皆以質為貴者記曰器用陶匏貴其質也蓋壷與用匏同義而箸尊箸地無足反本之象玄冬素秋質略之時故其用尊如此又曰凡六彞六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌蓋曰凡酒修酌言凡以殊之則非蒙上之文矣然則六彞鬱尊也其礿祠朝踐用兩獻尊醴齊之尊也再獻用兩象尊盎齊之尊也蒸嘗朝獻用兩箸尊亦醴齊之尊也饋獻用兩壷尊亦盎齊之尊也凡四時之間祀醴齊在兩大尊盎齊在兩山尊凡六尊由是觀之灌用鬱齊朝用醴齊饋用盎齊獻之正也禮運曰醴盞以獻蓋朝事之時也故曰然後退而合亨體其犬豕牛羊此當饋食之節矣其餘三齊陳之以祭而已詩曰清酒以祭是也鄭氏謂唯大事於大廟備五齊三酒誤矣蓋酒正曰凡祭祀以法共五齊三酒以實八尊謂之凡祭祀共五齊三酒則豈特大事於大廟而已瓠瓠狀要類於首尾類於要微鋭緣蔓而生詩曰南有樛木甘瓠纍之言樛木下逮故甘瓠得以纍之則賢者以貴下賤之况也序曰南有嘉魚廢則賢者不安下不得其所矣以此故也傳曰苦匏不材於人苦匏不材於人則明此甘瓠譬其材也記曰取賢斂材則賢進於材矣故此賢者在上材者在下又曰幡幡瓠葉采之亨之瓠葉庶人之菜也菜無微於瓠葉肉無薄於兔首故詩以箸古人不以微薄廢禮如此相馬經曰頭欲少肉如剝兔首爾雅曰瓠棲瓣詩曰齒如瓠犀犀瓠瓣也相法齒瓣白如瓠犀青如榴子者貴故詩主言之風俗通曰八月秋穰可以殺瓠取其色澤而堅類從以為瓠死燒穰瓜亡煮漆即此是也今俗蓄瓠之家不燒穰種瓜之家不焚漆物類相感志曰牛踏蔓上則苦乘者以瓠盛酒冬即暖夏即冷匏長而瘦上曰瓠短頸大腹曰匏傳曰匏謂之瓠誤矣蓋匏苦瓠甘復有長短之殊定非一物也子曰吾豈匏瓜也哉焉能繫而不食繫而不食以苦故也詩曰匏有苦葉濟有深涉匏記時也言匏有苦葉則濟有深涉矣莊子以謂秋水時至百川灌河秋水漲之時也冬水縮之時也匏亦正以濟水故詩以記濟有深涉之時國語曰穆子曰豹之業及匏有苦葉矣叔向曰苦匏不材於人共濟而已魯叔孫賦匏有苦葉必將涉矣是也詩曰酌之用匏酌之用匏言其質也言其質如此則亦厚於民故也郊特牲曰器用陶匏以象天地之性陶匏蓋取其質古今注曰匏之有柄者曰懸瓠可用為笙用則漆其裏蒲盧細要曰蒲一曰蒲盧細要土蜂謂之蒲盧義取諸此中庸曰夫政也者蒲盧也亦或謂之果裸今蒲其根箸在土而浮蔓常緣於木故亦或謂之果裸也傳曰在地為蓏在木為果詩曰不流束蒲蒲性輕揚善浮故此亦或謂之蒲蒲亦善浮故也淮南子曰百人抗浮説者曰蒲一名浮蓋是矣本草云瓠類小者名瓢瓢取諸薸蒲取諸蒲其義一也瓜瓜性惡香尤忌聞麝麝氣觸之乃至一蒂不收制字象其實在鬚蔓之間詩曰綿綿瓜瓞大曰瓜小曰瓞爾雅曰其紹瓞蓋瓜之繼本為紹今驗近本之瓜常小末則復大故曰其紹瓞也詩曰中田有廬疆埸有瓜廬言於天無露者瓜言於地無曠者且田之大界曰疆其小者埸也埸言至此而易主矣至此易主今種瓜於其上者以明百姓親睦利與同井共之也蓋古之人禮有讓畔義有灌瓜者由是而已爾雅曰瓜曰華之桃曰膽之華取譬於華膽取譬於膽禮為天子削瓜副之巾以絺為國君削瓜華之巾以綌蓋華若草木之華然副絶而不屬華析而不絶也郊特牲曰天子樹瓜華不斂藏之種也瓜曰華之故謂之瓜華而瓜性少延輒腐故禮以戒諸侯畜藏又曰瓜祭上環舊説其忖謂之環環瓜之脫華處也其當謂之蒂蒂瓜繫蔓處也蒂味小苦墨子曰甘瓜苦蒂天下物無全美也稽聖賦曰瓜寒於曝油冷於煎蘢蘢紅草也爾雅曰紅蘢古其大者蘬一名馬蓼莖大而赤生水澤中髙丈餘詩曰山有扶蘇隰有荷華山有橋松隰有遊龍蓋山性宜木隰性宜草而扶蘇荷華橋松遊龍皆山隰之所飬以自美者也橋髙也遊縱也以縱故謂之龍上聳曰橋山海經曰其上多橋木而鄭讀曰稿誤矣傳曰扶蘇扶胥木也荷華扶渠也其華菡蓞是詩先言木扶胥於上草扶渠於下後言木橋聳於上草遊縱於下則山隰之所養以自美者至矣今忽不見子都乃見狂且不見子充乃見狡童則曽是之不如也孟子曰子都天下莫不知其姣也又曰充實之謂美長楚爾雅曰長楚銚芅今羊桃也白華子如小麥其葉與實皆似桃故有桃之號也詩曰隰有萇楚猗儺其枝猗儺其華猗儺其實猗倚也儺節也萇楚柔弱又生下濕然其枝其華其實有倚以立故雖卑濕而不淫有節以生故雖柔弱而不恣國人疾其君之淫恣曽是之不如曰樂子之無知無家無室也人含隂陽之情豈可以無知無知非所宜樂也又况於無家無家非所宜樂也又况於無室樂無知無家無室則甚疾其君之淫恣也孔子曰疾之已甚亂也今其詩如此而不嫌已甚則更以疾亂故也一曰有兩羊桃一種華實皆連理故詩以刺淫恣蔏蔞蔏蔞一名購莖髙丈餘蒿屬也其葉似艾白色初生可啖江東采以羹魚詩曰翹翹錯薪言刈其蔞之子于歸言秣其駒言文王之化行乎江漢之域昏姻能以禮行而男子亷婦人貞雖芻蕘者以錯薪相讓言刈其蔞而已即序所謂美化者也蓋關雎之化行始於雉兔終於芻蕘之卑可謂至矣故是詩言刈楚蔞者汝墳一章曰伐其條枚二章曰伐其條肄也一曰蔞言微者之猶有才駒言寠者之猶有禮也管子曰葉下於􅡿􅡿下於莧莧下於蒲蒲下於葦葦下於雚雚下於蔞蔞下於荓荓下於蕭蕭下於薜薜下於萑萑下於茅凡彼草物有十二衰蘪蕪爾雅曰蘄茞蘪蕪一名江蘺今似蛇牀而香葉如小萎狀蓋楚謂之蘺晉謂之虈齊謂之茞汜論曰夫亂人者若芎藭之與藁本蛇牀之與蘪蕪是也使人相去也若玉之與石也葵之與莧也則論人易矣故曰大聖之與大佞難知也是故周公忠勤而被流言王莽折節以致虛譽字説曰茞可以養鼻又可以養體者養也蘋蘋一名蓱無根而浮常與水平故曰蘋也江東謂之薸言無定性漂流隨風而已周官萍氏掌水禁鄭氏云以不沉溺取名蓋使之幾酒謹酒也詩曰呦呦鹿鳴食野之蘋則飲且食也序曰既飲食之又實幣帛筐篚以將其厚意又實幣帛以將其厚意則承筐是將也月令季春曰蓱始生舊説萍善滋生一夜七子一曰萍浮於流水則不生於止水則一夕生九子故謂之九子萍也淮南子曰夫萍樹根於水木樹根於土天地之性也故萍飄聚根反日暴則死矣蘋之殖根以水為地也世説楊華入水化為浮萍芣苡芣苡一名馬舄一名車前一名當道大葉長穗好生牛馬迹中故曰馬舄車前當道也神仙服食法曰車前之實雷之精也善療孕婦難産及令人有子故詩曰采之有之掇之捋之袺之襭之而序者以為和平則婦人樂有子也按本草云生平澤丘陵阪道中然則一名勝舄亦或謂之陵舄以此列子曰若蛙為鶉得水為繼得水土之際則為蛙蠙之衣生於陵屯則為陵舄陵舄車前也故或謂之蝦蟆衣韓詩傳曰直曰車前瞿曰芣苡蓋生於兩旁謂之瞿芣從草從不苡從草從以芣苡樂有子者所以和平然後婦人樂有子則芣苡或不或以按草最易生然他草所在或無唯車前蒼耳所至有之故芣苡卷耳之詩正言此二物蓋不如是不足以箸志不在焉與樂有子也蓍蓍蒿屬也從耆草之夀者也六十曰耆卦之別六十有四蓍數窮於此且蓍所指非極數也博物志曰以老故知吉凶生千嵗三百莖同本其上常有黃雲覆之易以為數天子蓍長九尺諸侯七尺大夫五尺士三尺亦有美惡如龜焉故周官簭人上春相簭也易曰蓍之德圓而神卦之德方以知又曰神以知來知以藏往其孰能與此哉古之聰明睿知神武而不殺者夫古之聰明睿知神武而不殺者蓋主文王言之文王重易六爻故繫辭主意如此爾説者以為泛論聖人誤矣文王以文治所謂神武而不殺者也或曰重卦伏羲爾今曰文王重卦奈何曰伏羲重卦重三畫於前文王重卦重六爻於後何用知伏羲重卦重三畫於前以書曰卜五占用二曰貞曰悔周官曰大卜掌三易之法其經卦皆八其別皆六十有四知之也故曰八卦成列象在其中矣因而重之爻在其中矣何用知文王重卦重六爻於後以司馬遷曰伏羲至純厚作易八卦蓋西伯拘而演易揚雄曰易始八卦而文王六十四知之也故曰易之興也其當殷之末世周之盛德耶當文王與紂之事耶按乾鑿度曰垂皇䇿者羲伏羲用蓍則卦固已重矣然而世質民淳占法惟用七八六十四卦皆不動若乾止於乾坤止於坤不能變也夏商因之皆以七八為占連山歸藏是已後至文王世益澆薄占法始用九六蓋不如此不足應天下之變也今易是已六十四卦皆動若乾六爻皆九初九可變而之姤九二可變而之同人坤六爻皆六初六可變而之復六二可變而之臨所謂重卦於是為至左傳曰周易有之在乾之姤曰潛龍勿用其同人曰見龍在田又曰遇艮之八是謂艮之隨傳曰周易以變者為占是也然則伏羲重七八文王重九六由是觀之伏羲亦重卦而馬遷揚雄但言伏羲作易八卦文王六十四蓋各以其盛者言之也葦爾雅曰葦醜芀言其華皆有芀秀今風輒吹揚如雪其聚於地如絮也淮南子曰蔏苗類絮而不可以為絮葦即今之蘆一名葭葭葦之未秀者也萑即今之荻一名蒹蒹萑之未秀者也葭一名華蒹一名薕薕髙數尺今人以為簾箔因此為名也至秋堅成謂之萑葦詩曰八月萑葦莊子曰欲惡之孽為性萑葦蒹葭始萌以扶吾形尋擢吾性則明此幼曰蒹葭長曰萑葦矣先儒以為萑如葦而細按禮曰土鼓蕢桴葦籥伊祁氏之樂也葦管中籥則萑小而葦大矣是故謂之偉其字從韋則韋緩故也荀子曰柔從若蒲葦非怯懾也葦可緯為簿席萑亦可緯唯完而用不如蘆之或析也故音完舊云雞羽焚而清飈起蘆灰缺而月暈移説者以為取蘆草灰隨牖下月光中令圎畫缺其一靣則月暈亦缺於上也詩曰蒹葭蒼蒼白露為霜蒹葭凄凄白露未晞蒹葭采采白露未已露敷施以生之霜刻制以成之霜露所以譬禮之成禮至於周而成故也厭浥行露言貞信之教興則白露為霜象禮之成矣采采言其色鮮而未凄凄凄言其色慘而未蒼蒹葭凄凄白露未晞蒹葭采采白露未已則未能用周禮將無以固其國之譬也郊居賦曰編霜菼葺寒茅蓋茅菼醜霜降收縮萬物然後堅成可用故詩取况如此菼廣雅云萑荻也荻之初生曰菼薕其未秀者也説文曰萑之初生一曰薍一曰隼按釋言曰菼騅也菼薍也則萑之初生一曰薍一曰隼是矣詩曰葭菼揭揭蓋葭菼上擢則鱣鮪依焉而為罛之患詩以譬妾之上僭又曰大車檻檻毳衣如菼大車啍啍毳衣如璊大車聽訟者之車也毳衣聽訟者之服也檻檻言檻而收制之也故曰畏子不敢啍啍言訊而誥戒之也故曰畏子不奔説文曰􅣞騅帛也引此毳衣如菼又曰以毳為􅖯色如虋故謂之􅨷虋禾之赤苗也引此毳衣如璊明非毳冕矣且毳冕作繪宗彛非所以聽訟又其衣不得如菼青璊赤如説文之義是或一服也蓋青者如菼故謂之􅣞其赤者如璊故謂之􅨷故緂從菼省􅨷從璊省一曰菼玄色言其衣如之璊纁色言其裳如之大夫玄冕今曰毳冕者蓋禮所謂上大夫卿也傳曰菼騅也蘆之初生蘆黑也隼在青黑之間今按郭璞注以為蒹似萑而細者又曰似葦而小實中為菼則蒹菼又蘆之一種也蓋蒹萑之小者菼葦之小者故其醜似萑而細與如葦而小者亦或謂之蒹菼爾雅曰蔈荂荼猋藨芀萑苕謂之荼葦苕謂之芀詩曰豫所捋荼傳曰荼萑苕也今女匠亦以萑荼絮巢其色白故傳曰望而視之欲其荼白也又曰旗斾皆赤望之如日旗斾皆白望之如荼字説曰蘆謂之葭其小曰萑荻謂之蒹其小曰葦其始生曰菼又謂之薍荻強而葭弱荻髙而葭下故謂之荻菼中赤始生末黑黑已而赤故謂之菼其根旁行牽揉槃互其行無辨矣而又強焉故又謂之薍薍之始生常以無辨唯其強也乃能為亂埤雅卷十六
