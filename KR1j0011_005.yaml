  text: 埤雅卷三音釋麟麟麕君驨胡圭椓捉迒剛􅚵狃町挺噇土緩啖啖蛻稅噬視制虺灰麈主蒨茜黦鬱􆒓虓許交兕徐姊麙巖麃白交麇君繢丘謂剸團豝巴殪意觥古橫觩求獱婢賔旟于褎布刀幨尺占濈側立訛五戈瀐纎羸雷箠捶瘯族毳芮阤豕牷全躁皂燥先道犉而純睫接窖窖脰豆𤸈猶茢列
