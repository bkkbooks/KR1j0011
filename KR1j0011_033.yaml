body:
  text: 埤雅卷十七音釋菡胡敢􅣿淡蕅五口繖思旦臽陷蕸何加蔤美筆搴九輦闉於神闍都飴翼之菽叔穗遂蔠終珽梃葴至諶澱殿蓄五六剶丑緣襜尺占𦾰力稔洳如庶觱畢蜇折蘠才良褖他亂縠胡木袒袒袡如亷掃蘇道瞬舜羭與朱莔盲翳於計蓫抽六搜搜藘旅居墠常演栲靠枸舉楰俞主耇古候耋迭耄茂蓐乳屬叟蘇后虉鶂黥巨京劓魚器
