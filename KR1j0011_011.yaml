body:
  text: 埤雅卷六音釋蹌七羊鵲鵲駮布角雓余喈皆瞰看睨詣曛許云阞來得絙胡官礜弋庶毈段垤徒結雚貫鴚歌脰豆鳱干蜮胡國鵙狊躑直炙􅕯歌咮竹救唼妾妒丹故瀰奴禮鷕委猋標蹼撲隼錐鷚繆鷃晏翬暉揄與珠褕余招浣汗鳶員屰以專攜戶圭驅區鴧以出芘祕直由亶多簡團磔責瞼檢跖之石胅迭矰曾噰雍遰遞燠於六冸判䳸麻鷙執鴘匹免暍於歇於陵鷞爽述鵁交鶄青鳽五革䴉似宣鴋方嶼與𦐄胡郎鶯於耕鶂午的鷧郁祕
