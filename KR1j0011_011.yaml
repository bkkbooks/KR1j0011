body:
  text: 埤雅卷六音釋蹌七羊䧿鵲駮布角雓余喈皆瞰看睨詣曛許云阞來得絙胡官礜弋庻毈段垤徒結雚貫鴚歌脰豆鳱干蜮胡國鵙狊躑直炙􅕯歌咮竹救唼妾妒丹故瀰奴禮鷕委猋標蹼撲鵻錐鷚繆鷃晏翬暉揄與珠褕余招澣汗鳶員屰以專攜戸圭敺區鴧以出芘祕直由亶多簡團磔責瞼檢蹠之石胅迭矰曾噰雍遰逓燠於六冸判䳸麻鷙執鴘匹免暍於歇於陵鷞爽述鵁交鶄青鳽五革䴉似宣鴋方嶼與䀪胡郎鸎於耕鶂午的鷧郁秘
