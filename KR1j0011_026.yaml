body:
  text: 欽定四庫全書埤雅卷十四宋陸佃撰釋木栗柳楸櫻桃柏梧桐柘椒梓榛椔檖桂枌椇栗栗味醎北方之果也有莍蝟自裹故先賢云皂者柞栗之屬膏者楊柳之屬覈者李梅之屬國語曰婦摯不過棗栗以告䖍也先儒以為棗取早敬栗取恂栗東觀書曰栗駭蓬轉蓋今栗房秋孰罅發其實驚躍如爆去根榦甚逺所謂栗駭其以此歟詩曰山有樞隰有榆山有栲隰有杻山有漆隰有栗言國君有財而不能用猶之山隰不能自用其材故人卒取之以為用也然則秦詩曰阪有漆隰有栗何以為美曰是詩也非是之謂也秦仲既見君子有禮樂之好故道此以為戒言宜並坐鼓簧今不能及時以自虞樂則壮者其耋老者其亡矣此其所以為美也耋之為言跌也易曰日昃之離不鼓缶而歌則大耋之嗟凶與此同義𫝊曰其言一也言者異則人心變矣自母言之則為賢母自妻言之則未免為妬妻蓋言之異有如此者相法曰白如截肪黄如烝栗今黄玉謂之栗玉義蓋取此内則曰棗曰新之栗曰撰之按儀禮曰棗烝栗擇蓋烝之之謂新撰之之謂擇柳柳柔脆易生之木與楊同類雖縱横顛倒植之皆生然使十人植之一人揺之則無生柳矣立賢之道何以異此又況植之之人寡而揺之之人衆乎松柏醜茂桑柳醜菀詩曰菀彼桑柔又曰菀彼柳斯是也蓋凡物發而成暢茂積而成菀結故桑柳醜條而其詩謂之菀也菀柳曰有菀者柳不尚息焉言柳之菀非若松柏之茂未㡬而衰矣然人尚庶㡬息焉以言幽王之不可朝事曽菀柳之不如也東方朔集曰首陽為拙柳下為工一作柱下為工柱下老子柳下展禽也二說皆通大戴禮曰正月柳梯梯者發孚也本草曰柳華一名絮抱朴子曰柳柞速朽燎以為炭則億載不敗此言養生之經有益如此故廣成子以謂我修身千二百嵗矣而吾形未甞衰也中朝故事云天街兩畔槐木俗號為槐衙曲江池畔多柳亦號為柳衙意謂其成行列如排衙也今言宫腰細瘦謂之柳腰楸釋木云大而皵楸小而皵榎楸梧早脫故楸謂之秋楸美木也故曰山居千章之楸其人與千户侯等董子曰木名三時草命一嵗若椿从春楸从秋榎从夏所謂木名三時芓从子蔩从寅茆从卯莤从酉荄从亥艼从丁茂从戊芑从巳莘从辛葵从癸之類命以一嵗支榦故曰草命一嵗也夢書曰榆為人君楊為使者楸為讃謁今柳謂之絲楸謂之線按楸有行列莖榦喬聳凌雲華髙可愛至秋垂條如線俗謂之楸線述異記云越人多橘柚園嵗出橘稅謂之橙橘户中山又有楸户著名楸籍者也櫻桃櫻桃為木多䕃其果先熟一名荆桃一名含桃許慎曰鸎之所含食故曰含桃也謂之鸎桃則亦以鸎之所含食故謂之鸎桃也月令仲夏之月天子羞以含桃言薦新也其顆大者或如彈丸小者如珠璣南人語其小者謂之櫻珠字說云櫻主實么穉柔澤如嬰者栲主材成就堅乆如考者柏柏一名椈雜記所謂暢臼以椈者是也柏性堅緻有脂而香故古人破為暢臼用以𢷬鬱詩曰汎彼柏舟在彼中河言柏非不可以為舟特非柏之所宜故共姜守義引以自況也共姜守義所以自誓如此則欲奪而嫁之者特牽於天性之愛而已故曰母也天只不諒人只𫝊云天謂父也蓋毛讀序者所謂父母欲奪而嫁之之誤也且女子從母而已故稱母焉何必言父然後如序王文公曰槐黄中其華又黄懐其美以時發者也故公位焉松華猶槐也而實亦𤣥然華以春非公所以事上之道柏視松也猶伯視公伯用詘所執躬圭者以此公用直所執桓圭者以此檜柏葉松身則業與身皆曲樅松葉柏身則葉與身皆直樅以直而放之檜以曲而㑹之世云柏之指西猶磁之指南也梧梧一名櫬即梧桐也今人以其皮青號曰青桐華淨妍雅極為可愛故多近齋閤種之梧櫜鄂皆五焉其子似乳綴其櫜鄂生多或五六少或二三故飛鳥喜巢其中荘子所謂空穴來風桐乳致巢是也今亦謂之梧子詩曰鳳皇鳴矣于彼髙岡梧桐生矣子彼朝陽蓋梧桐以譬才之柔令朝陽以譬徳之温厚荘子曰師曠之枝策也惠子之據梧也此言精大用則竭神大用則弊故二子疲或枝策而立昬或據梧而瞑也桐此即白桐華而不實賈思勰曰白桐無子冬結似子者乃是明年之華房爾雅曰榮桐木即此是也桐木華而不實故曰榮桐木也今亦謂之華桐華則以其華而不實賈思勰曰桐葉華而不實者曰白桐實而皮青者曰梧桐今炒其實噉之味似菱芡桐有三軰青白之外復有岡桐即油桐也生於髙岡今亦謂之岡梧蓋梧性便濕不生於岡故此桐有岡之號毛詩𫝊曰梧桐不生山岡太平而後生朝陽陶氏云桐有四種青桐葉皮青似梧而無子梧桐色白葉似青桐而有子白桐與岡桐無異唯有華子爾岡桐無子是作琴瑟者皆不足據按青桐即今梧桐白桐又與岡桐全異白桐無子才中琴瑟岡桐子大有油與陶氏之說正反詩曰湛湛露斯在彼杞棘愷悌君子莫不令徳其桐其椅其實離離愷悌君子莫不令儀把棘剛木故詩以況令徳椅桐柔木故詩以況令儀淮南子曰梧桐斷角馬氂截玉言柔弱之勝剛強如此論衡曰楓桐速長故其皮肌不能堅也老子曰大器晚成豈不信哉孟子曰豈愛身不若桐梓哉又曰舎其梧檟養其樲棘則為賤場師焉梧雖桐軰也而梧下桐上檟雖梓軰也而檟下梓上故桐梓者愛身之譬也梧檟以況眉背而已蔡邕月令云桐始華桐木名木之後華者也穉之故曰始易緯曰桐枝濡毳而又空中難成易傷湏成氣而後華淮南子曰桐木成雲言其升氣可以造雲云遁甲曰梧桐不生則九州異名之曰桐似本於此桐柔木也而虚其心若能同者父喪杖竹母喪杖桐竹有節父道也桐能同母道也母從子者也舊說梧桐以知日月正閏生十二葉一邉有六葉從下敷一葉為一月有閏則生十三葉視葉小者則知閏何月不生則九州異君柘柘宜山石柞宜山阜楮宜澗谷柳宜下田竹宜髙平之地崔豹古今註曰杼實曰橡棘實曰棗桑實曰葚柘實曰佳佳言佳鳥性所食也考工記曰弓人取材柘為上檍次之檿桑次之橘次之木𤓰次之荆次之竹為下蓋弓材莫良於檿尤良於柘故皇矣先其檿後其柘也蠶書曰柘葉飼蠶其絲作琴瑟弦清鳴響亮勝於凡絲逺矣椒椒似茱萸而小赤色内含黒子如㸃今謂椒目木有針刺葉堅而滑澤爾雅曰椒榝醜莍桃李醜核言桃李屬皆内核椒榝屬皆外莍也酉陽雜爼曰椒可以來水銀茱茰氣好上椒氣好下蓋椒氣性不上逹故詩以譬沃也言沃盛強能修其政然其馨香下逹而已詩曰椒聊之實蕃衍盈升椒聊之實蕃衍盈匊沃以支子受邑其後遂将盛大則猶之椒也其實蕃衍而至於盈升盈匊也先盈升後盈匊則古者匊大而升小升之所容不足以盈匊故也或曰廣雅以為兩手謂之匊匊一升也故是詩先言升後言匊相備而已荘子曰韋以裒椒雖踰絺綌然乆則臭椒故天下之理有初雖若佳後更為害不可不察也梓𫝊曰橋者父道也梓者子道也舊說椅即是梓梓即是楸蓋楸之疏理而白色者為梓梓實桐皮曰椅其實兩木大類同而小別也今呼牡丹謂之華王梓為木王蓋木莫良於梓故書以梓材名篇禮以梓人名匠也書曰若作梓材既勤樸斵惟其塗丹雘言王者造始作為典則以授諸侯則既勤樸斵之譬也諸侯致飾嗣其功而終之則惟其塗丹雘之譬也詩曰樹之榛栗椅桐梓漆言其宫中所植皆能預備禮樂之用語曰一年之計莫如種榖十年之計莫如種木故文公於𥘉作宫室之時早計如此又曰維桑與梓必恭敬止言桑梓父之所植尚或敬之也禮曰見君之几杖則起其類是乎尸子曰荆有長松文梓榛榛似梓實如小栗栗屬也先王以為女摯詩曰營營青蠅止于樊止于棘止于榛者言圃有樊園有棘山有榛明欲逺而止之彌逺也又曰鳲鳩在桑其子在梅其子在棘其子在榛者蓋先實者梅後實者棘先實者棘後實者榛故其序如此亦其榛卑小於棘棘卑小於梅詩以刺之故毎況愈下也賦云榛栗罅發江南有小栗謂之茅栗此讀芧為茅之誤也荘子曰狙公賦芧朝三而暮四衆狙皆怒芧小栗也椔木卧死為翳立死椔荀子曰周公之状身如斷菑臯陶之状色如削𤓰以此非相蓋不足以非之詩曰作之屏之其菑其翳修之平之其灌其栵啓之辟之其檉其椐攘之剔之其檿其柘言周公之新民刋除林木以治田作室其始作之屏之者椔翳而已既又就者衆民無所居焉則其修之平之也及於灌栵其啓之辟之也及於檉椐至其尤衆也無以處之則攘之剔之至於檿柘檿柘材之美者人之所恃以蠶也蓋論道則木以不材生議政則木以不材死故荘子言散樗以不材終其天年而是詩又言刋除材木始於椔翳不得已而去之然後及於檿柘此古之人所以處乎才與不才之間猶曰似之而非也檖釋木云檖羅檖一名羅其文細宻如羅故曰羅也又有白者赤羅文棘白羅文緩雖皆所謂文木然而赤羅為上故穆公植之秦詩初曰晨風卒曰樹檖者言人君所以用賢之道始於能致之終於能立之梀謂之綾杉謂之紗檖謂之羅羅亦有華者俗謂之羅錦羅錦猶言杉錦梀綾也羅錦明杉錦暗今外域有梀綾器其文如綾綺状又下於杉錦矣爾雅曰桋赤梀白者梀桂蘇秦曰楚國食貴於玉薪貴於桂謁者難見於鬼王難見於帝蓋桂藥之長也凡木葉皆一脊惟桂三脊桂之軰三一曰菌桂葉似柿葉而尖滑鮮淨蜀都賦所謂菌桂臨崖者即此桂也二曰牡桂葉似枇杷而大爾雅所謂梫木桂者即此桂也菌桂無骨正圓如竹故此云木桂也三曰桂舊云葉如柏葉者即此桂也皆生南海山谷間冬夏常青故桂林桂嶺皆以桂為名也本草言桂宣導百藥無所畏又云菌桂為諸藥先聘通使故說文以為百藥之長也荘子曰桂可食故伐之漆可用故割之言此皆以其能苦其生者也桂猶圭也乆服通神若服以祀宣道諸藥為之先聘若執以使又謂之梫能侵他木斃之談苑記江南後主患清暑閣前草生徐鍇令以桂屑布磚縫中宿草盡死吕氏春秋云桂枝之下無雜木蓋桂味辛螫故也然桂之殺草木自是其性不為辛螫也雷公炮炙論云以桂為丁以釘木中其木即死一丁至微未必能螫大木自其性相制爾越絶書曰人固不同慧種生聖癡種生狂桂實生桂桐實生桐以鯀生禹考之殆不然矣異書云月中有桂下有一人常斫之木瘡隨合枌枌白榆先敷葉後著夾榆性扇地所扇各與木等故其隂下五榖不植而古之人就以息焉東門之枌一章曰東門之枌宛邱之栩子仲之子婆娑其下言風化之所行大夫氏之子道舞也二章曰榖旦于差南方之原不績其麻市也婆娑言風化之所行大夫氏之女市舞也男子道舞尚非所宜女子市舞尤非所宜矣且東門人所出入宛丘之道人所徃來國之交㑹也於是有枌栩之隂焉則人之所趨而聚也管子曰桓公之時而衢之民桑麻不種繭縷不治衣多弊屨多穿管仲請沐途旁之枝使無尺寸之隂為是故也内則曰堇荁枌榆兔薧滫瀡以滑之兔新生者薧其乾也堇荁枌榆初生其葉蓋象兔目故謂之兔也淮南子曰槐之生也五日而兔目十日而䑕耳字說曰榆瀋滑故謂之俞荎俞而有刺所以為至枌俞而已安可長也以俞為合乃卒乎分夫很如羒俞如枌皆分之道椇木髙大似白楊多枝而曲飛鳥喜巢其上賦曰枳句來巢是也子依房生著枝端大如指長數寸状如珊瑚噉之甘美如飴今俗謂之枅栱古今註曰一名樹蜜一名木餳實形卷曲核在實外以其木為屋近酒能令酒味薄曲禮曰婦人之摯椇榛脯脩棗栗椇取卷曲榛言至棗言早栗言恂栗故曰以告䖍也埤雅卷十四
